# Runs the skills eval agent (.github/skill-eval/skills_eval_agent.py) on
# every push to a pull-request/<N> mirror branch that touches anything
# under skills/ or the eval harness. See .github/skill-eval/AGENTS.md
# for the agent's system prompt and behaviour.

name: Skills Eval

on:
  # No top-level `paths:` filter: GitHub evaluates `paths:` against the
  # diff of the *pushed commits*, not the cumulative PR diff against
  # base. That silently skipped the workflow when CPR-bot updated a
  # mirror branch with a merge commit that didn't itself touch
  # skills/** (observed on PR #188: 16 skills/ files in the PR, but
  # the latest mirror push was a develop-merge carrying only 2 RTVI
  # files). The path gate is now done inside the job by
  # `dorny/paths-filter`, which diffs the cumulative head...base range.
  #
  # The `on: create:` trigger that previously worked around the
  # initial-mirror all-zero-`before`-SHA case is no longer needed:
  # `dorny/paths-filter` computes its diff from the PR base regardless
  # of how the branch came to exist, so the very first push (whether
  # branch-create or normal push) gets the same correct answer.
  push:
    branches:
      - "pull-request/[0-9]+"
  # Manual full-sweep trigger. Runs every eval spec on every changed-and-
  # unchanged skill, regardless of diff. There's no PR to comment on, so
  # the agent writes its per-spec results table to $GITHUB_STEP_SUMMARY
  # (rendered on the Actions run page) instead of `gh pr comment`. See
  # .github/skill-eval/AGENTS.md § "Manual full-sweep mode".
  workflow_dispatch:
    inputs:
      skills:
        # `type: string` rather than `type: choice` because the skills/
        # tree has more than 10 entries — GitHub caps `choice` options
        # at 10. The scope-resolution step below sanity-checks the value
        # before passing it to the agent.
        #
        # Valid values (skills/<name>/ on develop):
        #   *  (sweep every skill)
        #   vss-ask-video
        #   vss-deploy-dense-captioning
        #   vss-deploy-detection-tracking-2d
        #   vss-deploy-profile
        #   vss-deploy-video-embedding
        #   vss-generate-video-calibration
        #   vss-generate-video-report
        #   vss-generate-video-report-rag
        #   vss-manage-alerts
        #   vss-manage-video-io-storage
        #   vss-query-analytics
        #   vss-search-archive
        #   vss-setup-behavior-analytics
        #   vss-setup-video-analytics-api
        #   vss-summarize-video
        description: "Which skill to eval (single-select). `*` sweeps every skill. Otherwise type the bare skill dir name (e.g. `vss-deploy-profile`). Keep aligned with .github/skill-eval/adapters/."
        required: false
        default: "*"
        type: string

# Authenticate as github-actions[bot] for all GitHub operations (gh pr
# comment, gh pr create, git push of eval-bot/* branches). The agent
# inherits this via env.GH_TOKEN on the run step below. Mirrors how
# helm-sync.yml does it — no PAT, no rotation, no personal-account
# binding. The skill-eval bot PRs hit the source PR's headRefName branch
# in this same repo, so contents:write is enough; pull-requests:write
# covers gh pr comment + gh pr create.
permissions:
  contents: write
  pull-requests: write

# Push-mode (PR mirror branches): one eval per PR at a time. A fresh
# push cancels the in-flight run — the previous head's results are
# stale the moment a new commit lands. The per-box flocks
# (/tmp/brev/<INSTANCE_NAME>.lock) release automatically when the
# agent process dies (POSIX flock(2) semantics — no userspace trap
# needed). Any stale containers / volumes / marker that the cancelled
# run left on a box are reconciled by the NEXT run's
# `BrevEnvironment._ensure_prerequisite_deployed`: the active-deploy
# marker carries `<profile_tag>|<run_id>`, so a marker from this run
# never matches the next run's desired marker and the next run always
# tears down + redeploys. Same path handles SIGKILL (the 12h
# timeout-minutes terminator) and host reboots — there's no exit-side
# cleanup machinery to bypass.
#
# Manual dispatch: each `workflow_dispatch` gets a unique group
# (keyed on run_id) so two operators dispatching sweeps in parallel
# don't cancel each other. Contention is handled per-box by the
# flocks above: a second run picks an idle `vss-eval-*` box, or
# waits at `flock -w` for one to free up. The validator host runs
# multiple GH Actions worker processes labeled
# `vss-skill-eval-runner`, so concurrent jobs actually start in
# parallel rather than queueing at the runner level.
concurrency:
  group: >-
    ${{ github.event_name == 'workflow_dispatch'
      && format('skills-eval-manual-{0}', github.run_id)
      || format('skills-eval-{0}', github.ref) }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

defaults:
  run:
    shell: bash

jobs:
  eval:
    name: Eval changed skills against PR
    runs-on: [self-hosted, vss-skill-eval-runner]

    # 12-hour hard cap on the whole job. A full PR touching every currently
    # evaluable skill queues ~14 trials (5 vss-deploy-profile +
    # 3 vss-manage-video-io-storage + 4 vss-search-archive +
    # 2 vss-deploy-dense-captioning). Observed avg trial wall-clock is
    # ~30m once /vss-deploy-profile + ingest + judge per-check gather
    # complete; 14 × 30m = 420m typical. The per-trial agent-exec
    # ceiling is now 1h (AGENTS.md `--agent-timeout-multiplier 6.0`,
    # raised from 30m), so a run with several cold-box trials hitting
    # the ceiling can push past the prior 480m cap. 720m absorbs that
    # without uncapping retries: e.g. (4 × 60m at ceiling) + (10 × 30m
    # typical) = 540m, comfortably inside. No teardown cooldown — the
    # vss-eval-* pool is operator-managed and stays warm across runs.
    # The lock-hold timeout in AGENTS.md (flock -w) is set in lockstep
    # below.
    timeout-minutes: 720

    # Allow mirror-branch pushes OR manual full-sweep dispatch. Never run
    # on develop/main pushes — those aren't covered by either trigger.
    if: startsWith(github.ref, 'refs/heads/pull-request/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout mirror head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # agent needs full history to diff against base (push mode)

      - name: Extract PR number + base
        id: pr
        if: github.event_name == 'push'
        run: |
          REF="${{ github.ref_name }}"         # "pull-request/100"
          PR="${REF##pull-request/}"
          echo "number=$PR" >> "$GITHUB_OUTPUT"
          # Query the source PR for its base branch (never hardcode develop).
          BASE=$(gh pr view "$PR" --json baseRefName --jq .baseRefName)
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "PR #$PR, base=$BASE"
        env:
          # Repo-scoped token from the workflow context is fine for `gh pr view`.
          GH_TOKEN: ${{ github.token }}

      - name: Detect relevant changes vs PR base
        id: changes
        if: github.event_name == 'push'
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          base: ${{ steps.pr.outputs.base }}
          filters: |
            relevant:
              - 'skills/**'
              - '.github/skill-eval/**'
              - '.github/workflows/skills-eval.yml'

      - name: Load coordinator env (Anthropic, NGC, Brev, remote endpoints)
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.relevant == 'true'
        run: |
          # The runner lives on vss-skill-validator-v2; the coordinator keeps
          # its secrets in a single .env file there. Don't echo contents.
          set -a
          source /home/ubuntu/eval-coordinator/.env
          set +a
          printf "COORDINATOR_ENV=loaded\n" >> "$GITHUB_ENV"
          # Safety: Anthropic path for claude-agent-sdk in the trial + judge.
          printf "CLAUDE_CODE_DISABLE_THINKING=1\n" >> "$GITHUB_ENV"

      - name: Run skills eval agent
        id: agent
        if: github.event_name == 'workflow_dispatch' || steps.changes.outputs.relevant == 'true'
        env:
          # Auto-injected workflow token, authenticates as
          # github-actions[bot]. Scoped by the permissions: block at
          # workflow level (contents:write + pull-requests:write). All
          # gh / git operations the agent runs (pr comment, pr create,
          # push eval-bot/* branches) use this — no PAT in the
          # coordinator .env, no personal-account auth.
          GH_TOKEN: ${{ github.token }}
          # gh CLI checks `~/.config/gh/hosts.yml` BEFORE GH_TOKEN; if
          # the self-hosted runner host has a stored OAuth from a prior
          # `gh auth login` (e.g. migrated from the operator's
          # vss-skill-validator coordinator setup), that token wins
          # over the env GH_TOKEN and bot-PR comments end up authored
          # by the personal account. Same gotcha helm-sync.yml solved
          # by pointing gh at a per-run scratch dir with no hosts.yml.
          GH_CONFIG_DIR: ${{ runner.temp }}/gh-skill-eval-${{ github.run_id }}
          # Route the workflow_dispatch input through env: instead of
          # ${{ inputs.skills }} inline in the run: script. The input is
          # now `type: string` (free-form) so this matters more — the
          # run: body sanity-checks INPUT_SKILLS below before passing it
          # to the agent, keeping any user-controllable string out of the
          # templated shell context.
          INPUT_SKILLS: ${{ inputs.skills }}
        run: |
          mkdir -p "$GH_CONFIG_DIR"
          set -a
          source /home/ubuntu/eval-coordinator/.env   # Anthropic / NGC / Brev secrets only
          set +a
          # PR_NUMBER/PR_BASE are blank for workflow_dispatch — the agent
          # script detects MANUAL_FULL_SWEEP and skips the diff path.
          export PR_NUMBER="${{ steps.pr.outputs.number }}"
          export PR_BASE="${{ steps.pr.outputs.base }}"
          export PR_HEAD_SHA="${{ github.sha }}"
          export PR_REPO="${{ github.repository }}"
          export GITHUB_RUN_ID="${{ github.run_id }}"
          # Manual sweep passthrough. Agent reads MANUAL_FULL_SWEEP +
          # MANUAL_SKILLS_FILTER and swaps its user prompt: no diff,
          # enumerate skills/<skill>/eval/*.json under the picked skill
          # (or every skill when `*`), write results to
          # $GITHUB_STEP_SUMMARY instead of `gh pr comment`. All specs on
          # the chosen skill(s) run — no spec-level filter knob.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Sanity-check INPUT_SKILLS now that the input is `type: string`
            # (free-form). Either `*`, blank, or a bare skill-dir name
            # — reject anything with slashes / dots that could escape the
            # skills/ scope.
            if [ "${INPUT_SKILLS}" != "*" ] && [ -n "${INPUT_SKILLS}" ]; then
              if ! [[ "${INPUT_SKILLS}" =~ ^[a-zA-Z0-9_][a-zA-Z0-9_-]*$ ]]; then
                echo "::error::skills='${INPUT_SKILLS}' is not a valid skill-dir name. Type a bare name like 'vss-deploy-profile' or '*' to sweep all."
                exit 1
              fi
              if [ ! -d "skills/${INPUT_SKILLS}" ]; then
                echo "::error::skills/${INPUT_SKILLS}/ does not exist on this ref."
                exit 1
              fi
            fi
            export MANUAL_FULL_SWEEP=1
            export MANUAL_SKILLS_FILTER="${INPUT_SKILLS}"
          fi
          # `.github` isn't a valid Python package prefix, so we expose the
          # harness via PYTHONPATH. `envs.brev_env:BrevEnvironment` is what
          # `uvx harbor run --environment-import-path` expects.
          export PYTHONPATH="${GITHUB_WORKSPACE}/.github/skill-eval:${PYTHONPATH:-}"
          mkdir -p /tmp/brev /tmp/skill-eval
          python3 .github/skill-eval/skills_eval_agent.py

      - name: Collect results for workflow artifact
        if: always() && (github.event_name == 'workflow_dispatch' || steps.changes.outputs.relevant == 'true')
        env:
          # Scope the tar + find to THIS run's subtree. Parallel
          # workflow_dispatch sweeps share /tmp/skill-eval/results/ and
          # archiving the parent dir would splice peer runs' trial
          # outputs into this run's artifact (and vice versa). The
          # harbor convention is /tmp/skill-eval/results/<run_id>/ so
          # the per-run subdir name == github.run_id.
          RUN_RESULTS: /tmp/skill-eval/results/${{ github.run_id }}
        run: |
          # Agent writes harbor output to $RUN_RESULTS (runtime-only;
          # not tracked under the repo). Blocker paths
          # (missing_platforms_declaration, missing_probe, etc.) finish
          # without producing a results dir — that's a success, not a failure.
          if [ ! -d "$RUN_RESULTS" ]; then
            echo "no results dir for this run — agent blocked before running trials (expected for blocker outcomes)"
            exit 0
          fi
          # Exclude per-trial agent/ subdirs from the artifact tarball
          # (NOT from the runner-local tree). The trajectory files
          # inside (claude-code.txt, trajectory.json, sessions/) capture
          # every tool_use → tool_result pair verbatim — so when the
          # agent reads a `.env` file, runs `docker compose config`, or
          # cats a resolved compose YAML, the secret env values land in
          # the trajectory and then ride along into the public artifact.
          # PR #516's artifact carried NGC_CLI_API_KEY for ~2 days
          # before deletion + rotation; this exclusion prevents the next
          # occurrence regardless of whether downstream agents / skills
          # tighten their own logging.
          #
          # `tar --exclude='agent'` removes those subdirs from the
          # archive only — the on-disk `/tmp/skill-eval/results/` tree
          # is left intact, so the harbor-view systemd unit serving
          # `/tmp/skill-eval/results/_viewer/` keeps rendering the full
          # trajectory (`Trace` tab) for operators who hit
          # `https://harbor-<BREV_ENV_ID>.brevlab.com/jobs/...`.
          # Reward, judge, and result.json — which the report builder
          # actually consumes — stay in the artifact.
          RESULTS=$(find "$RUN_RESULTS" -maxdepth 2 -name "result.json" 2>/dev/null | head -50 || true)
          if [ -n "$RESULTS" ]; then
            tar czf /tmp/skills-eval-results.tar.gz \
              -C /tmp/skill-eval/results --exclude='agent' "${{ github.run_id }}"
            echo "archived $(echo "$RESULTS" | wc -l) result.json files (agent/ trajectories excluded; on-disk tree preserved for harbor view)"
          else
            echo "results dir exists but empty — nothing to archive"
          fi

      - name: Upload results artifact
        if: always() && (github.event_name == 'workflow_dispatch' || steps.changes.outputs.relevant == 'true')
        uses: actions/upload-artifact@v4
        with:
          # `pr-<N>-<run>` for push, `manual-<run>` for workflow_dispatch.
          # Folded scalar to stay under yamllint's 200-char line cap.
          name: >-
            ${{ github.event_name == 'workflow_dispatch'
              && format('skills-eval-results-manual-{0}', github.run_id)
              || format('skills-eval-results-pr-{0}-{1}', steps.pr.outputs.number, github.run_id) }}
          path: /tmp/skills-eval-results.tar.gz
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload benchmark report artifact
        # Built by skills_eval_agent.py::build_benchmark_md — concatenates
        # the per-spec result comments the agent posted to the PR (or to
        # $GITHUB_STEP_SUMMARY in manual mode) into a single sanitized
        # markdown report. Published as its own artifact so reviewers can
        # download just the report without unpacking the full results
        # tarball.
        if: always() && (github.event_name == 'workflow_dispatch' || steps.changes.outputs.relevant == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: >-
            ${{ github.event_name == 'workflow_dispatch'
              && format('skills-eval-benchmark-manual-{0}', github.run_id)
              || format('skills-eval-benchmark-pr-{0}-{1}', steps.pr.outputs.number, github.run_id) }}
          path: /tmp/skill-eval/${{ github.run_id }}/benchmark.md
          if-no-files-found: ignore
          retention-days: 7
