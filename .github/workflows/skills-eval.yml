# Skills eval — matrix dispatch. See .github/skill-eval/docs/matrix-dispatch-design.md.
#
# push to pull-request/<N>:
#   plan  -> computes the (skill, spec) matrix from the PR diff
#   eval  -> one leg per (spec, platform), each leg runs skills_eval_agent.py
#            in single-spec mode (foreground agent, one synchronous harbor
#            run), posts its own PR comment per AGENTS.md.
# workflow_dispatch:
#   plan + eval -> manual full sweep, fanned per (spec, platform) just like
#                  a push; each leg writes its result to its job summary
#                  (no PR to comment on). Scoped by the `skills` input.

name: Skills Eval

on:
  # No top-level `paths:` filter: GitHub evaluates `paths:` against the
  # diff of the *pushed commits*, not the cumulative PR diff against
  # base. That silently skipped the workflow when CPR-bot updated a
  # mirror branch with a merge commit that didn't itself touch skills/**
  # (observed on PR #188). The diff gate is done inside the `plan` job by
  # plan_matrix.py, which compares the cumulative head...base range.
  push:
    branches:
      - "pull-request/[0-9]+"
  # Manual full-sweep trigger. The `plan` job enumerates the picked skill's
  # specs (or all skills) instead of diffing, and the `eval` matrix fans them
  # per (spec, platform) like a push. No PR to comment on, so each leg writes
  # its result to its own job summary.
  workflow_dispatch:
    inputs:
      skills:
        # `type: string` rather than `type: choice` because the skills/
        # tree has more than 10 entries — GitHub caps `choice` at 10.
        # plan_matrix.py validates the value (skill-dir name or `*`).
        description: "Which skill to eval. `*` sweeps all. Otherwise a bare skill-dir name (e.g. `vss-deploy-profile`)."
        required: false
        default: "*"
        type: string

# Authenticate as github-actions[bot] for all GitHub operations (gh pr
# comment + git push of the adapter commit to the contributor's branch).
# Mirrors helm-sync.yml — no PAT, no rotation. contents:write covers the
# adapter push; pull-requests:write covers the PR comment.
permissions:
  contents: write
  pull-requests: write

# One eval generation per PR (or manual sweep) at a time. A fresh push
# cancels every in-flight matrix leg of the prior push for this ref;
# run_leg.py holds /tmp/brev/<INSTANCE_NAME>.lock while Harbor runs, and
# the kernel releases it automatically when the wrapper process dies
# (POSIX flock(2) — no userspace trap).
# Stale containers/volumes a cancelled leg left on a box are reconciled by
# the next trial's own deploy step (the harness no longer pre-deploys or
# tracks an active-deploy marker). Same path handles SIGKILL (the
# timeout-minutes terminator) and host reboots.
concurrency:
  group: >-
    ${{ github.event_name == 'workflow_dispatch'
      && format('skills-eval-manual-{0}', github.run_id)
      || format('skills-eval-{0}', github.ref) }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------------
  # plan — compute the dispatch matrix from the PR diff (push only).
  # Lightweight: gh + python3, no GPU, no brev, no flock.
  # ---------------------------------------------------------------------
  plan:
    name: Plan eval matrix
    if: startsWith(github.ref, 'refs/heads/pull-request/') || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, vss-skill-eval-runner]
    timeout-minutes: 15
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
      has_targets: ${{ steps.plan.outputs.has_targets }}
      pr_number: ${{ steps.pr.outputs.number }}
      pr_base: ${{ steps.pr.outputs.base }}
    steps:
      - name: Checkout mirror head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # plan diffs the cumulative head...base range

      - name: Extract PR number + base
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual sweep: no PR. Leave number empty — the eval legs detect
            # "manual" and write results to their job summary instead of a PR
            # comment; base is just this ref, for logging.
            echo "number=" >> "$GITHUB_OUTPUT"
            echo "base=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "manual sweep on ${{ github.ref_name }}"
          else
            REF="${{ github.ref_name }}"          # "pull-request/100"
            PR="${REF##pull-request/}"
            echo "number=$PR" >> "$GITHUB_OUTPUT"
            # Query the source PR for its base branch (never hardcode develop).
            BASE=$(gh pr view "$PR" --json baseRefName --jq .baseRefName)
            echo "base=$BASE" >> "$GITHUB_OUTPUT"
            echo "PR #$PR, base=$BASE"
          fi

      - name: Compute matrix
        id: plan
        env:
          GH_TOKEN: ${{ github.token }}
          PR_REPO: ${{ github.repository }}
          PR_BASE: ${{ steps.pr.outputs.base }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          # Manual sweep (workflow_dispatch): enumerate the picked skill('s)
          # specs instead of diffing (plan_matrix validates the value).
          # Empty on push, so plan diffs as usual.
          # Blank input → `*` (sweep all), matching the dropdown default and
          # the old behavior — never blank, which would fall through to the
          # diff path and silently produce an empty matrix.
          MANUAL_SKILLS_FILTER: ${{ github.event_name == 'workflow_dispatch' && (inputs.skills || '*') || '' }}
        run: python3 .github/skill-eval/plan_matrix.py

  # ---------------------------------------------------------------------
  # eval — one leg per (spec, platform). Each leg runs the agent once.
  # ---------------------------------------------------------------------
  eval:
    name: ${{ matrix.name }}
    needs: plan
    if: needs.plan.outputs.has_targets == 'true'
    runs-on: [self-hosted, vss-skill-eval-runner]
    strategy:
      # One slow/failed spec must not cancel its siblings.
      fail-fast: false
      # Cap concurrent legs near the vss-eval-* box count so legs don't
      # all grab a runner slot only to wait inside run_leg.py. Excess legs queue.
      max-parallel: 4
      matrix: ${{ fromJSON(needs.plan.outputs.matrix) }}
    # Per-leg cap. One spec, but a multi-step spec runs step-1..N as
    # sequential harbor invocations, each up to the 1 h agent ceiling
    # (AGENTS.md `--agent-timeout-multiplier 6.0`). 360m covers a ~4-step
    # cold-box spec plus deploy/dataset/comment overhead without the
    # whole-sweep 12 h cap the single-job design needed. AGENTS.md's
    # box-lock wait (run_leg.py --lock-timeout-sec 21000 ≈ 5.8 h) is kept strictly under this
    # 360 m ceiling so a lock-starved leg emits `BLOCKED: lock timeout`
    # before the job-killer fires (a 43200 s / 12 h wait would be
    # silently killed while waiting on a box with no verdict — the exit-4 trap).
    timeout-minutes: 360
    steps:
      - name: Checkout mirror head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # agent needs full history to fetch + commit to the contributor's branch (§ 3c)

      - name: Load coordinator env (Anthropic, NGC, Brev, remote endpoints)
        run: |
          # The runner host (vss-skill-validator-v2) keeps coordinator
          # secrets in a single .env. Don't echo contents.
          set -a
          source /home/ubuntu/eval-coordinator/.env
          set +a
          printf "COORDINATOR_ENV=loaded\n" >> "$GITHUB_ENV"
          printf "CLAUDE_CODE_DISABLE_THINKING=1\n" >> "$GITHUB_ENV"

      - name: Run skills eval agent (single spec)
        id: agent
        env:
          # github-actions[bot] token; scoped by the permissions: block.
          GH_TOKEN: ${{ github.token }}
          # gh checks ~/.config/gh/hosts.yml BEFORE GH_TOKEN; point it at a
          # per-leg scratch dir with no hosts.yml so a stored OAuth on the
          # host can't reauthor bot comments. Same fix helm-sync.yml uses.
          GH_CONFIG_DIR: ${{ runner.temp }}/gh-skill-eval-${{ github.run_id }}-${{ matrix.slug }}
          # Raise the Bash-tool timeout cap above the worst-case foreground
          # run_leg.py call. The wrapper can spend most of the job waiting
          # for a box lock and then run one or more Harbor subprocesses.
          # Without this the runtime auto-backgrounds the foreground wrapper
          # call at the default cap and the agent falls into polling its task
          # output — silently defeating the "block on Harbor" wait contract
          # (the PreToolUse hook can't catch a
          # runtime-initiated background; it only inspects call input). Both
          # stay under the job's timeout-minutes so the call can't outlive it.
          BASH_DEFAULT_TIMEOUT_MS: "21600000"
          BASH_MAX_TIMEOUT_MS: "21600000"
        run: |
          mkdir -p "$GH_CONFIG_DIR"
          set -a
          source /home/ubuntu/eval-coordinator/.env   # Anthropic / NGC / Brev
          set +a
          export PR_NUMBER="${{ needs.plan.outputs.pr_number }}"
          export PR_BASE="${{ needs.plan.outputs.pr_base }}"
          export PR_HEAD_SHA="${{ github.sha }}"
          export PR_REPO="${{ github.repository }}"
          export GITHUB_RUN_ID="${{ github.run_id }}"
          # Single-spec mode — plan already decided this leg's target, so
          # the agent skips the diff and processes exactly one (skill, spec).
          export EVAL_KIND="${{ matrix.kind }}"
          export EVAL_SKILL="${{ matrix.skill }}"
          export EVAL_SPEC_PATH="${{ matrix.spec_path }}"
          export EVAL_SPEC_STEM="${{ matrix.spec_stem }}"
          export EVAL_PLATFORM="${{ matrix.platform }}"
          # Per-leg scratch scope. Every leg keys its datasets/results/
          # viewer under <slug>/<run_id> (slug = skill__spec_stem__platform)
          # so concurrent legs — and concurrent PR runs on the same host —
          # never collide (AGENTS.md § "Per-leg scratch isolation").
          export EVAL_SLUG="${{ matrix.slug }}"
          # `.github` isn't a valid Python package prefix; expose the
          # harness via PYTHONPATH for `uvx harbor --environment-import-path`.
          export PYTHONPATH="${GITHUB_WORKSPACE}/.github/skill-eval:${PYTHONPATH:-}"
          mkdir -p /tmp/brev /tmp/skill-eval
          python3 .github/skill-eval/skills_eval_agent.py

      - name: Collect results for workflow artifact
        if: always()
        env:
          EVAL_SLUG: ${{ matrix.slug }}
        run: |
          # This leg's harbor output lives under its own scratch scope,
          # /tmp/skill-eval/results/<slug>/<run_id>/, so the artifact
          # carries only this (spec,platform)'s trials. missing_adapter /
          # blocker legs finish without a results dir — a valid outcome.
          LEG_RESULTS="/tmp/skill-eval/results/${EVAL_SLUG}/${GITHUB_RUN_ID}"
          if [ ! -d "$LEG_RESULTS" ]; then
            echo "no results dir for this leg — blocked before running a trial (expected for blocker outcomes)"
            exit 0
          fi
          # Exclude per-trial agent/ trajectory subdirs from the tarball
          # (NOT from the on-disk tree the Harbor viewer serves). Those
          # files capture every tool_use/tool_result verbatim, so a `.env`
          # read or `docker compose config` dump would otherwise carry
          # secret values into the public artifact (PR #516 leaked
          # NGC_CLI_API_KEY this way). Reward / judge / result.json — what
          # the report consumes — stay in.
          # Per-leg tarball path scoped by slug + run_id. `max-parallel`
          # places multiple legs on one runner host, so a fixed
          # /tmp/skills-eval-results.tar.gz would let overlapping legs
          # overwrite each other's archive before upload — each leg then
          # uploads whichever sibling wrote last. The slug makes the path
          # unique per (skill,spec,platform).
          LEG_TARBALL="/tmp/skills-eval-results-${EVAL_SLUG}-${GITHUB_RUN_ID}.tar.gz"
          RESULTS=$(find "$LEG_RESULTS" -maxdepth 3 -name "result.json" 2>/dev/null | head -50 || true)
          if [ -n "$RESULTS" ]; then
            tar czf "$LEG_TARBALL" \
              -C "/tmp/skill-eval/results/${EVAL_SLUG}" --exclude='agent' "$GITHUB_RUN_ID"
            echo "archived $(echo "$RESULTS" | wc -l) result.json files (agent/ trajectories excluded)"
          else
            echo "results dir exists but empty — nothing to archive"
          fi

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skills-eval-results-pr-${{ needs.plan.outputs.pr_number }}-${{ matrix.slug }}-${{ github.run_id }}
          path: /tmp/skills-eval-results-${{ matrix.slug }}-${{ github.run_id }}.tar.gz
          if-no-files-found: ignore
          retention-days: 7
