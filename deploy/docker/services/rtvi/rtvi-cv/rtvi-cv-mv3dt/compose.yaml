services:
  perception:
    image: ${PERCEPTION_IMAGE:-nvcr.io/nvidia/vss-core/vss-rt-cv}:${PERCEPTION_TAG:-3.2.0}
    network_mode: "host"
    runtime: nvidia
    container_name: vss-rtvi-cv-mv3dt
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 2
      resources:
        reservations:
          devices:
          - capabilities: [gpu]
            device_ids: ["${RT_CV_DEVICE_ID:-0}"]
    environment:
      STREAM_TYPE: ${STREAM_TYPE:-kafka}
      DEEPSTREAM_ENABLE_SENSOR_ID_EXTRACTION: "0"
      GST_ENABLE_CUSTOM_PARSER_MODIFICATIONS: 1
      OTEL_SERVICE_NAME: "rtvi-cv-mv3dt"
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4318}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-otlp}

  measurement-fusion:
    image: ${BEV_FUSION_MV3DT_IMAGE:-nvcr.io/nvidia/vss-core/vss-rt-cv-mv3dt-bev-fusion}:${BEV_FUSION_MV3DT_TAG:-3.2.0}
    network_mode: "host"
    container_name: vss-rtvi-cv-bev-fusion
    restart: always
    environment:
      BROKER_TYPE: ${STREAM_TYPE:-kafka}
      KAFKA_BOOTSTRAP: "localhost:9092"
      REDIS_HOST: "localhost"
      REDIS_PORT: "6379"
      RAW_TOPIC: "mdx-raw"
      FUSED_TOPIC: "mdx-bev"
      SENSOR_TIMEOUT_MS: "100"
      MAX_EXPECTED_SENSORS: ${NUM_STREAMS:-4}
      BUFFER_DURATION_S: "2.0"
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,sys; sys.exit(0 if os.path.isfile('/tmp/fusion_ready') else 1)"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 10s
