services:
  sensor-bp-wait-bp-configurator:
    image: busybox:1.37.0
    profiles: ["bp_wh_kafka_2d","bp_wh_redis_2d","bp_wh_2d","bp_wh_kafka_3d","bp_wh_redis_3d","bp_wh_kafka_mv3dt","bp_wh_redis_mv3dt","bp_wh_auto_calib_2d","bp_wh_auto_calib_3d","bp_wh_auto_calib_mv3dt"]
    network_mode: host
    container_name: sensor-bp-wait-bp-configurator
    restart: "no"
    volumes:
      - ${VSS_APPS_DIR}/services/vios/initiator/scripts/sensor-bp-wait-bp-configurator.sh:/scripts/sensor-bp-wait-bp-configurator.sh:ro
    environment:
      BP_CONFIGURATOR_READYZ_URL: ${BP_CONFIGURATOR_READYZ_URL:-http://127.0.0.1:5001/readyz}
      SENSOR_BP_WAIT_BP_CONFIGURATOR_MAX_SEC: ${SENSOR_BP_WAIT_BP_CONFIGURATOR_MAX_SEC:-300}
    command: ["/bin/sh", "/scripts/sensor-bp-wait-bp-configurator.sh"]

  sensor-ms:
    image: ${VST_SENSOR_IMAGE}
    profiles:
      - bp_developer_base_2d
      - bp_developer_search_2d
      - bp_developer_lvs_2d
      - bp_developer_alerts_2d_cv
      - bp_developer_alerts_2d_vlm
    user: "0:0"
    runtime: nvidia
    entrypoint: ["/bin/bash", "-c", "exec /home/vst/vst_release/launch_vst"]
    environment:
      - ADAPTOR=${VST_ADAPTOR:-vst_rtsp}
      - NEED_RECORDING=false
      - NEED_RTSPSERVER=false
      - NEED_STORAGE=false
      - NEED_STREAM_MONITORING=true
      - HTTP_PORT=${SENSOR_HTTP_PORT:-30000}
      - CENTRALIZE_DB_NAME=${CENTRALIZE_DB_NAME}
      - CENTRALIZE_DB_USERNAME=${CENTRALIZE_DB_USERNAME}
      - STREAM_PROCESSOR_MODULE_ENDPOINT=${STREAM_PROCESSOR_MODULE_ENDPOINT}
    volumes:
      - ${VST_CONFIG_PATH:-${VSS_APPS_DIR}/services/vios/configs}:/home/vst/vst_release/configs
      - ${VST_DATA_PATH}:/home/vst/vst_release/vst_data
      - ${VST_VIDEO_STORAGE_PATH}:/home/vst/vst_release/vst_video
    network_mode: host
    container_name: vss-vios-sensor
    restart: on-failure    # Restart only if the container exits with non-zero status
    healthcheck:
      test: ["CMD-SHELL", "bash -ec 'exec 3<>/dev/tcp/127.0.0.1/$${HTTP_PORT:-30000}'"]
      timeout: 3s
      interval: 10s
      retries: 20
      start_period: 5s
    depends_on:
      centralizedb:
        condition: service_healthy
      sensor-bp-wait-bp-configurator:
        condition: service_completed_successfully
        required: false
      sdr-controller:
        condition: service_started
        required: false

  sensor-ms-2d:
    image: ${VST_SENSOR_IMAGE}
    profiles:
      - bp_wh_kafka_2d
      - bp_wh_redis_2d
      - bp_wh_2d
