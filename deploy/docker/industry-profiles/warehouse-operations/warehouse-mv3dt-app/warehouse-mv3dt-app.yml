include:

services:
  vss-behavior-analytics-mv3dt:
    extends:
      file: ${VSS_APPS_DIR}/services/analytics/behavior-analytics/compose.yml
      service: vss-behavior-analytics-base
    profiles: ["bp_wh_kafka_mv3dt", "bp_wh_redis_mv3dt"]
    volumes:
      - $VSS_APPS_DIR/industry-profiles/warehouse-operations/warehouse-mv3dt-app/calibration/sample-data/$SAMPLE_VIDEO_DATASET/calibration.json:/resources/calibration.json
      - $VSS_APPS_DIR/industry-profiles/warehouse-operations/warehouse-mv3dt-app/vss-behavior-analytics/configs/vss-behavior-analytics-config.json:/resources/vss-behavior-analytics-config.json
    container_name: vss-behavior-analytics-mv3dt
    command: python3 apps/analytics/main_analytics_3d_app.py --config /resources/vss-behavior-analytics-config.json --calibration /resources/calibration.json
    depends_on:
      broker-health-check:
        condition: service_completed_successfully

  vss-behavior-analytics-playback-mv3dt:
    extends:
      file: ${VSS_APPS_DIR}/services/analytics/behavior-analytics/compose.yml
      service: vss-behavior-analytics-base
    profiles: ["playback_kafka_mv3dt", "playback_redis_mv3dt"]
    volumes:
      - $VSS_APPS_DIR/industry-profiles/warehouse-operations/warehouse-mv3dt-app/vss-behavior-analytics/configs/vss-behavior-analytics-config.json:/resources/vss-behavior-analytics-config.json
      - $VSS_DATA_DIR/playback/warehouse_20x20_playback.txt:/opt/mdx/playback/warehouse_20x20_playback.txt
    container_name: vss-behavior-analytics-playback-mv3dt
    command: python3 apps/playback/playback_frames.py --config /resources/vss-behavior-analytics-config.json --playback-filepath /opt/mdx/playback/warehouse_20x20_playback.txt

  nvstreamer-mv3dt:
    container_name: vss-vios-nvstreamer-mv3dt
    image: nvcr.io/nvidia/vss-core/vss-vios-nvstreamer:${NVSTREAMER_IMAGE_TAG}
    user: "0:0"
    runtime: nvidia
    profiles: ["bp_wh_kafka_mv3dt", "bp_wh_redis_mv3dt", "bp_wh_auto_calib_mv3dt"]
    entrypoint: ["/bin/bash", "-c", "if [ \"$$NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES\" = \"true\" ]; then /home/vst/vst_release/tools/user_additional_install.sh; fi && exec /home/vst/vst_release/launch_vst"]
    environment:
      - NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES=${NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES}
      - ADAPTOR=streamer
      - HTTP_PORT=${NVSTREAMER_HTTP_PORT}
    network_mode: "host"
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 2
      resources:
        reservations:
          devices:
          - capabilities:
            - gpu
            device_ids:
            - "${RT_CV_DEVICE_ID:-0}"
    volumes:
      - $VSS_APPS_DIR/industry-profiles/warehouse-operations/warehouse-mv3dt-app/nvstreamer/configs/vst-config.json:/home/vst/vst_release/configs/vst_config.json
      - $VSS_APPS_DIR/industry-profiles/warehouse-operations/warehouse-mv3dt-app/nvstreamer/configs/vst-storage.json:/home/vst/vst_release/configs/vst_storage.json
      - $VSS_DATA_DIR/videos/$SAMPLE_VIDEO_DATASET:/tmp/nv_streamer/videos
      - $VSS_APPS_DIR/services/vios/scripts/user_additional_install.sh:/home/vst/vst_release/tools/user_additional_install.sh
    depends_on:
      bp-configurator-mv3dt:
        condition: service_healthy

  bp-configurator-mv3dt-init:
    build:
      context: $VSS_APPS_DIR/services/infra
      dockerfile: Dockerfiles/${STREAM_TYPE}-health-check.Dockerfile
      network: host
    profiles: ["bp_wh_kafka_mv3dt", "bp_wh_redis_mv3dt", "bp_wh_auto_calib_mv3dt"]
    container_name: vss-configurator-mv3dt-init
    network_mode: "host"
    environment:
      BP_PROFILE: $BP_PROFILE
      STREAM_TYPE: $STREAM_TYPE
      MAX_RETRIES: 60
      RETRY_INTERVAL: 2
      BOOTSTRAP_HOST: localhost
      KAFKA_PORT: 9092
      REDIS_PORT: 6379
      KAFKA_TOPICS: '[{"name": "mdx-raw"},
        {"name": "mdx-bev"},
        {"name": "mdx-space-utilization"},
        {"name": "mdx-alerts"},
        {"name": "mdx-behavior"},
        {"name": "mdx-behavior-plus"},
        {"name": "mdx-frames"},
        {"name": "mdx-mtmc"},
        {"name": "mdx-rtls"},
        {"name": "mdx-rtls-region-1"},
        {"name": "mdx-amr"},
        {"name": "mdx-vlm-alerts"},
        {"name": "mdx-notification"},
        {"name": "mdx-events"},
        {"name": "mdx-incidents"},
        {"name": "mdx-vlm-incidents"},
        {"name": "mdx-vlm"},
        {"name": "mdx-vlm-captions"},
        {"name": "mdx-structured-events-summary"},
        {"name": "mdx-embed"},
        {"name": "mdx-embed-filtered"}]'
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        if [ "$${BP_PROFILE}" = "bp_wh_auto_calib" ]; then
          echo "BP_PROFILE is bp_wh_auto_calib. Broker health check is not required"
        else
          exec /scripts/check-$${STREAM_TYPE}-health.sh
        fi

  bp-configurator-mv3dt:
    image: nvcr.io/nvidia/vss-core/vss-configurator:3.2.0
    container_name: vss-configurator-mv3dt
    network_mode: "host"
    profiles: ["bp_wh_kafka_mv3dt", "bp_wh_redis_mv3dt", "bp_wh_auto_calib_mv3dt"]
    user: "0:0"
    environment:
      SENSOR_INFO_SOURCE: ${SENSOR_INFO_SOURCE:-nvstreamer}
      ENABLE_PROFILE_CONFIGURATOR: ${ENABLE_PROFILE_CONFIGURATOR:-true}
      ENABLE_SENSOR_CONFIGURATOR: ${ENABLE_SENSOR_CONFIGURATOR:-true}
      ENABLE_REDIS_DUPLICATOR_THREAD: false
      CALL_SENSOR_ADD_API: true
      PROFILE_CONFIG_FILE: $VSS_APPS_DIR/industry-profiles/warehouse-operations/blueprint-configurator/blueprint_config.yml
      HARDWARE_PROFILE: $HARDWARE_PROFILE
      NUM_STREAMS: ${NUM_STREAMS:-4}
      MODE: $MODE
      LOG_LEVEL: INFO
      NVSTREAMER_STREAMS_ENDPOINT: http://${NVSTREAMER_IP}:${NVSTREAMER_HTTP_PORT}/api/v1/sensor/streams
      NVSTREAMER_SENSOR_STATUS_ENDPOINT: http://${NVSTREAMER_IP}:${NVSTREAMER_HTTP_PORT}/api/v1/sensor/status
      VST_CAMERA_ADD_ENDPOINT: http://${VST_IP}:${VST_PORT}/vst/api/v1/sensor/add
      CALIBRATION_MODE: mount
      CALIBRATION_DIR_MOUNT_PATH: /opt/data
      CALIBRATION_FILE_NAME: calibration.json
      PORT: 5001
      VSS_DATA_DIR: $VSS_DATA_DIR
      VSS_APPS_DIR: $VSS_APPS_DIR
      DS_CONFIG_DIR: $VSS_APPS_DIR/industry-profiles/warehouse-operations/warehouse-mv3dt-app/deepstream/configs
      NVSTREAMER_CONFIG_DIR: $VSS_APPS_DIR/industry-profiles/warehouse-operations/warehouse-mv3dt-app/nvstreamer/configs
      MESSAGE_BROKER_TYPE: $STREAM_TYPE
      WDM_REDIS_HOST: localhost
      WDM_REDIS_PORT: 6379
      WDM_REDIS_STREAM_NAME: vst.event
      WDM_REDIS_MSG_KEY: sensor.id
      WDM_KFK_MSG_KEY: vst.event
      WDM_KFK_BOOTSTRAP_URL: localhost:9092
      WDM_KFK_TOPIC: mdx-notification
      WDM_WL_ID_FIELD: camera_id
      WDM_WL_EVENT_FIELD: event
      RECOMPUTE_BEV_CENTERS_ENABLED: true
      SENSOR_FILE_PATH: ${SENSOR_FILE_PATH:-$VSS_APPS_DIR/industry-profiles/warehouse-operations/camera_configs/camera_info.json}
      CHECK_SENSOR_IN_CALIBRATION_FILE: true
    env_file: ${BP_CONFIGURATOR_ENV_FILE:-$VSS_APPS_DIR/industry-profiles/warehouse-operations/.env}
    command:
      - python
      - -c
      - |
        import os
        import sys

        os.environ["SEND_CONFIG_TO_SDR"] = (
            "false" if os.environ.get("BP_PROFILE") == "bp_wh_auto_calib" else "true"
        )
        os.environ["ENABLE_CALIBRATION_PROCESS"] = (
            "false" if os.environ.get("BP_PROFILE") == "bp_wh_auto_calib" else "true"
        )
        os.execvp(sys.executable, [sys.executable, "entrypoint.py"])
    volumes:
      - $VSS_APPS_DIR:$VSS_APPS_DIR:rw
      - $VSS_DATA_DIR:$VSS_DATA_DIR:rw
      - $VSS_APPS_DIR/industry-profiles/warehouse-operations:$VSS_APPS_DIR/industry-profiles/warehouse-operations:rw
      - $VSS_APPS_DIR/industry-profiles/warehouse-operations/warehouse-mv3dt-app/calibration/sample-data/$SAMPLE_VIDEO_DATASET:/opt/data
    depends_on:
      bp-configurator-mv3dt-init:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:5001/readyz', timeout=3).getcode()==200 else sys.exit(1)"
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  kibana-init-container-mv3dt:
    build:
      context: $VSS_APPS_DIR/industry-profiles/warehouse-operations/warehouse-mv3dt-app
      dockerfile: Dockerfiles/kibana-dashboard.Dockerfile
    network_mode: "host"
    profiles: ["bp_wh_kafka_mv3dt${MINIMAL_PROFILE:+_extended}", "bp_wh_redis_mv3dt${MINIMAL_PROFILE:+_extended}"]
    container_name: vss-kibana-init-mv3dt
    volumes:
      - $VSS_APPS_DIR/industry-profiles/warehouse-operations/warehouse-mv3dt-app/kibana-dashboard/warehouse-mv3dt-kibana-objects.ndjson:/opt/vss/kibana-objects.ndjson
    command: bash /opt/vss/init-scripts/kibana-import-dashboard.sh
    depends_on:
      kibana:
        condition: service_healthy

  vss-video-analytics-api-mv3dt:
    extends:
      file: $VSS_APPS_DIR/services/analytics/video-analytics-api/compose.yml
      service: vss-video-analytics-api
    profiles: ["bp_wh_kafka_mv3dt${MINIMAL_PROFILE:+_extended}", "bp_wh_redis_mv3dt${MINIMAL_PROFILE:+_extended}"]
    container_name: vss-video-analytics-api-mv3dt
    depends_on:
      broker-health-check:
        condition: service_completed_successfully
      elasticsearch-init-container:
        condition: service_completed_successfully

  import-calibration-output-container-mv3dt:
    build:
      context: $VSS_APPS_DIR/industry-profiles/warehouse-operations/warehouse-mv3dt-app
      dockerfile: Dockerfiles/import-calibration.Dockerfile
    network_mode: "host"
    profiles: ["bp_wh_kafka_mv3dt${MINIMAL_PROFILE:+_extended}", "bp_wh_redis_mv3dt${MINIMAL_PROFILE:+_extended}"]
    container_name: vss-import-calibration-output-mv3dt
    volumes:
      - $VSS_APPS_DIR/industry-profiles/warehouse-operations/warehouse-mv3dt-app/calibration/sample-data/$SAMPLE_VIDEO_DATASET/calibration.json:/opt/vss/calibration.json
      - $VSS_APPS_DIR/industry-profiles/warehouse-operations/warehouse-mv3dt-app/calibration/sample-data/$SAMPLE_VIDEO_DATASET/images:/opt/vss/images/
    command: bash /opt/vss/init-scripts/calibration-import.sh
    depends_on:
      - vss-video-analytics-api-mv3dt

  vss-rtvi-cv-bev-fusion:
    extends:
      file: $VSS_APPS_DIR/services/rtvi/rtvi-cv/rtvi-cv-mv3dt/compose.yaml
      service: measurement-fusion
    image: ${BEV_FUSION_MV3DT_IMAGE:-nvcr.io/nvidia/vss-core/vss-rt-cv-mv3dt-bev-fusion}:${BEV_FUSION_MV3DT_TAG:-3.2.0}
    profiles: ["bp_wh_kafka_mv3dt", "bp_wh_redis_mv3dt"]
    depends_on:
      broker-health-check:
        condition: service_completed_successfully

  vss-rtvi-cv-mv3dt:
    extends:
      file: $VSS_APPS_DIR/services/rtvi/rtvi-cv/rtvi-cv-mv3dt/compose.yaml
      service: perception
    image: ${PERCEPTION_IMAGE:-nvcr.io/nvidia/vss-core/vss-rt-cv}:${PERCEPTION_TAG:-3.2.0}
    profiles: ["bp_wh_kafka_mv3dt", "bp_wh_redis_mv3dt"]
    container_name: vss-rtvi-cv-mv3dt

    volumes:
      - $VSS_DATA_DIR/models/mtmc/:/opt/storage/
      - $VSS_DATA_DIR/models/mv3dt/BodyPose3DNet/:/opt/storage/BodyPose3DNet/
      - $VSS_APPS_DIR/industry-profiles/warehouse-operations/warehouse-mv3dt-app/calibration/sample-data/$SAMPLE_VIDEO_DATASET/camInfo/:/tmp/camInfo/
      - $VSS_APPS_DIR/industry-profiles/warehouse-operations/warehouse-mv3dt-app/deepstream/init-scripts/ds-start-mv3dt.sh:/opt/nvidia/deepstream/deepstream/sources/apps/sample_apps/metropolis_perception_app/ds-start-mv3dt.sh
      - $VSS_APPS_DIR/industry-profiles/warehouse-operations/warehouse-mv3dt-app/deepstream/configs:/opt/nvidia/deepstream/deepstream/sources/apps/sample_apps/metropolis_perception_app/configs

    environment:
      INSTANCE_ID: "0"
      DS_HTTP_PORT: "9000"
      BATCH_SIZE: "${NUM_STREAMS:-4}"
      MAX_BATCH_SIZE: "${NUM_STREAMS:-4}"
      MQTT_HOST: "${MQTT_HOST:-localhost}"
      MQTT_PORT: "${MQTT_PORT:-1883}"
      DEEPSTREAM_ENABLE_SENSOR_ID_EXTRACTION: "0"
      STREAM_TYPE: ${STREAM_TYPE}
      GST_ENABLE_CUSTOM_PARSER_MODIFICATIONS: 1
      OTEL_SERVICE_NAME: "rtvi-cv-mv3dt"
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4318}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-otlp}
    command: ["bash", "-c", "./ds-start-mv3dt.sh"]
    depends_on:
      sensor-ms-mv3dt:
        condition: service_started
      broker-health-check:
        condition: service_completed_successfully
      vss-rtvi-cv-bev-fusion:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
