# ========================================================================================================
#
# This YAML file defines hardware-specific configurations for GPU profiles and deployment modes.
# It controls how the Configurator generates configuration files based on provided profile

# Example: Custom profile for L4 GPU with specific tuning for 3D mode and default tuning for 2D mode
#
# L4:
#   2d:
#     max_streams_supported: 4
#
#   3d:
#     max_streams_supported: 2
#     use_commons:
#       variables: true        # Use commons 3d variables
#       file_operations: true  # Use commons 3d file_operations
#     variables:
#       # Additional L4-specific variables (appended to commons)
#       - timeout_multiplier: "2"
#       - adjusted_timeout: "${timeout_multiplier} * 25000"
#     file_operations:
#       # Additional L4-specific operations (appended to commons)
#       - operation_type: "text_config_update"
#         target_file: "${DS_CONFIG_DIR}/ds-main-config.txt"
#         backup: true        # Create backup before updating (optional, default: true)
#         updates:
#           batched-push-timeout: "${adjusted_timeout}"
#           enable-gpu-utilization-check: "1"
#
# ========================================================================================================
# COMMONS
# ========================================================================================================
# Common variables and file operations are defined here and can be reused across multiple hardware profiles.

# ========================================================================================================

commons:
  # Prerequisites: Count video files and set NUM_STREAMS variable
  # This runs before variables are processed, so NUM_STREAMS can be used in variable expressions
  # To enable file count, set enabled: true on the operation below
  prerequisites:
    2d:
      - operation_type: "file_management"
        enabled: false
        target_directories:
          - "${VSS_DATA_DIR}/videos/${SAMPLE_VIDEO_DATASET}"
        file_management:
          action: "file_count"       # Count files matching pattern
          parameters:
            pattern: "*.mp4"          # File pattern to match
          output_variable: NUM_STREAMS # Output the number of files matching the pattern to the NUM_STREAMS variable

    3d:
      - operation_type: "file_management"
        enabled: false
        target_directories:
          - "${VSS_DATA_DIR}/videos/${SAMPLE_VIDEO_DATASET}"
        file_management:
          action: "file_count"       # Count files matching pattern
          parameters:
            pattern: "*.mp4"          # File pattern to match
          output_variable: NUM_STREAMS # Output the number of files matching the pattern to the NUM_STREAMS variable
    mv3dt:
      - operation_type: "file_management"
        enabled: false
        target_directories:
          - "${VSS_DATA_DIR}/videos/${SAMPLE_VIDEO_DATASET}"
        file_management:
          action: "file_count"       # Count files matching pattern
          parameters:
            pattern: "*.mp4"          # File pattern to match
          output_variable: NUM_STREAMS # Output the number of files matching the pattern to the NUM_STREAMS variable
  variable_validation:
    2d:
      # VSS path variables must be set to real paths, not placeholders or empty
      - variable: VSS_APPS_DIR
        required: true
        disallowed_values: ["", "/path/to/deploy/docker"]
        error_message: "VSS_APPS_DIR must be set to a valid deployment path and must not be empty or the placeholder '/path/to/deploy/docker'"
      - variable: VSS_DATA_DIR
        required: true
        disallowed_values: ["", "/path/to/vss-warehouse-app-data"]
        error_message: "VSS_DATA_DIR must be set to a valid data path and must not be empty or the placeholder '/path/to/vss-warehouse-app-data'"
      - variable: HOST_IP
        required: true
        disallowed_values: ["", "<HOST_IP>"]
        error_message: "HOST_IP must be set to the host IP address and must not be empty or the placeholder '<HOST_IP>'"
      - variable: MINIMAL_PROFILE
        required: false
        allowed_values: ["true", ""]
        error_message: "MINIMAL_PROFILE must be either 'true' or '' (empty)"

      - variable: BP_PROFILE
        allowed_values: ["bp_wh", "bp_wh_kafka", "bp_wh_redis", "bp_wh_auto_calib"]

      # bp_wh 2d profile is not supported on IGX-THOR or DGX-SPARK
      - variable: HARDWARE_PROFILE
        condition:
          variable: BP_PROFILE
          equals: "bp_wh"
        disallowed_values: ["IGX-THOR", "DGX-SPARK"]
        error_message: "BP_PROFILE=bp_wh in 2d mode is not supported on IGX-THOR or DGX-SPARK"

      # STREAM_TYPE can only be "kafka" or "redis"
      - variable: STREAM_TYPE
        allowed_values: ["kafka", "redis"]
  
      # LLM_MODE can only be "none", "local", "local_shared" or "remote"
      - variable: LLM_MODE
        # required: false
        allowed_values: ["none", "local", "local_shared", "remote"]

      # VLM_MODE can only be "none", "local", "local_shared" or "remote"
      - variable: VLM_MODE
        # required: false
        allowed_values: ["none", "local", "local_shared", "remote"]

      # Conditional validation - if STREAM_TYPE=redis, validate COMPOSE_PROFILES
      - variable: COMPOSE_PROFILES
        condition:
          variable: STREAM_TYPE
          equals: "redis"
        allowed_patterns:
          - "*redis*"

      # Conditional validation - if STREAM_TYPE=kafka, validate COMPOSE_PROFILES
      - variable: COMPOSE_PROFILES
        # required: false
        condition:
          variable: STREAM_TYPE
          equals: "kafka"
        disallowed_patterns:
          - "*redis*"

      # When HARDWARE_PROFILE=DGX-SPARK, image tags must contain 'sbsa'
      - variable: PERCEPTION_TAG
        condition:
          variable: HARDWARE_PROFILE
          equals: "DGX-SPARK"
        allowed_patterns:
          - "*sbsa*"
        error_message: "When HARDWARE_PROFILE is DGX-SPARK, PERCEPTION_TAG must contain 'sbsa'"

      - variable: SAMPLE_VIDEO_DATASET
        when_equals: "nv-warehouse-4cams"
        validate_conditions:
          and:
            - variable: MODE
              equals: "2d"
            - variable: NUM_STREAMS
              equals: "4"
            - variable: COMPOSE_PROFILES
              matches: "bp_wh_2d,*"

      - variable: SAMPLE_VIDEO_DATASET
        when_equals: "warehouse-loading-dock-3cams-synthetic"
        validate_conditions:
          and:
            - variable: MODE
              equals: "2d"
            - variable: NUM_STREAMS
              equals: "3"
            - or:
                - variable: COMPOSE_PROFILES
                  matches: "bp_wh_kafka_2d,*"
                - variable: COMPOSE_PROFILES
                  matches: "bp_wh_redis_2d,*"
                - variable: COMPOSE_PROFILES
                  matches: "bp_wh_auto_calib_2d,*"

    3d:
      # VSS path variables must be set to real paths, not placeholders or empty
      - variable: VSS_APPS_DIR
        required: true
        disallowed_values: ["", "/path/to/deploy/docker"]
        error_message: "VSS_APPS_DIR must be set to a valid deployment path and must not be empty or the placeholder '/path/to/deploy/docker'"
      - variable: VSS_DATA_DIR
        required: true
        disallowed_values: ["", "/path/to/vss-warehouse-app-data"]
        error_message: "VSS_DATA_DIR must be set to a valid data path and must not be empty or the placeholder '/path/to/vss-warehouse-app-data'"
      - variable: HOST_IP
        required: true
        disallowed_values: ["", "<HOST_IP>"]
        error_message: "HOST_IP must be set to the host IP address and must not be empty or the placeholder '<HOST_IP>'"
      - variable: MINIMAL_PROFILE
        required: false
        allowed_values: ["true", ""]
        error_message: "MINIMAL_PROFILE must be either 'true' or '' (empty)"

      # BP_PROFILE can only be "bp_wh_kafka", "bp_wh_redis", or "bp_wh_auto_calib"
      - variable: BP_PROFILE
        allowed_values: ["bp_wh_kafka", "bp_wh_redis", "bp_wh_auto_calib"]

      # STREAM_TYPE can only be "kafka" or "redis"
      - variable: STREAM_TYPE
        allowed_values: ["kafka", "redis"]

      # LLM_MODE can only be "none", "local", "local_shared" or "remote"
      - variable: LLM_MODE
        # required: false
        allowed_values: ["none"]

      # VLM_MODE can only be "none", "local", "local_shared" or "remote"
      - variable: VLM_MODE
        # required: false
        allowed_values: ["none"]

      # Conditional validation - if STREAM_TYPE=redis, validate COMPOSE_PROFILES
      - variable: COMPOSE_PROFILES
        # required: false
        condition:
          variable: STREAM_TYPE
          equals: "redis"
        allowed_patterns:
          - "*redis*"

      # Conditional validation - if STREAM_TYPE=kafka, validate COMPOSE_PROFILES
      - variable: COMPOSE_PROFILES
        # required: false
        condition:
          variable: STREAM_TYPE
          equals: "kafka"
        disallowed_patterns:
          - "*redis*"

      # When HARDWARE_PROFILE=DGX-SPARK, image tags must contain 'sbsa'
      - variable: PERCEPTION_TAG
        condition:
          variable: HARDWARE_PROFILE
          equals: "DGX-SPARK"
        allowed_patterns:
          - "*sbsa*"
        error_message: "When HARDWARE_PROFILE is DGX-SPARK, PERCEPTION_TAG must contain 'sbsa'"

      - variable: SAMPLE_VIDEO_DATASET
        when_equals: "warehouse-4cams-20mx20m-synthetic"
        validate_conditions:
          and:
            - variable: MODE
              equals: "3d"
            - variable: NUM_STREAMS
              equals: "4"
            - or:
                - variable: COMPOSE_PROFILES
                  matches: "bp_wh_kafka_3d,*"
                - variable: COMPOSE_PROFILES
                  matches: "bp_wh_redis_3d,*"
                - variable: COMPOSE_PROFILES
                  matches: "bp_wh_auto_calib_3d,*"

    mv3dt:
      # MDX path variables must be set to real paths, not placeholders or empty
      - variable: VSS_APPS_DIR
        required: true
        disallowed_values: ["", "/path/to/deployments"]
        error_message: "VSS_APPS_DIR must be set to a valid deployment path and must not be empty or the placeholder '/path/to/deployments'"
      - variable: VSS_DATA_DIR
        required: true
        disallowed_values: ["", "/path/to/vss-warehouse-app-data"]
        error_message: "VSS_DATA_DIR must be set to a valid data path and must not be empty or the placeholder '/path/to/vss-warehouse-app-data'"
      - variable: HOST_IP
        required: true
        disallowed_values: ["", "<HOST_IP>"]
        error_message: "HOST_IP must be set to the host IP address and must not be empty or the placeholder '<HOST_IP>'"
      - variable: MINIMAL_PROFILE
        required: false
        allowed_values: ["true", ""]
        error_message: "MINIMAL_PROFILE must be either 'true' or '' (empty)"

      # BP_PROFILE can only be "bp_wh_kafka", "bp_wh_redis", or "bp_wh_auto_calib"
      - variable: BP_PROFILE
        allowed_values: ["bp_wh_kafka", "bp_wh_redis", "bp_wh_auto_calib"]

      # STREAM_TYPE can only be "kafka" or "redis"
      - variable: STREAM_TYPE
        allowed_values: ["kafka", "redis"]

      # LLM_MODE can only be "none"
      - variable: LLM_MODE
        allowed_values: ["none"]

      # VLM_MODE can only be "none"
      - variable: VLM_MODE
        allowed_values: ["none"]

      # Conditional validation - if STREAM_TYPE=redis, validate COMPOSE_PROFILES
      - variable: COMPOSE_PROFILES
        condition:
          variable: STREAM_TYPE
          equals: "redis"
        allowed_patterns:
          - "*redis*"

      # Conditional validation - if STREAM_TYPE=kafka, validate COMPOSE_PROFILES
      - variable: COMPOSE_PROFILES
        condition:
          variable: STREAM_TYPE
          equals: "kafka"
        disallowed_patterns:
          - "*redis*"

      # When HARDWARE_PROFILE=DGX-SPARK, image tags must contain 'sbsa'
      - variable: PERCEPTION_TAG
        condition:
          variable: HARDWARE_PROFILE
          equals: "DGX-SPARK"
        allowed_patterns:
          - "*sbsa*"
        error_message: "When HARDWARE_PROFILE is DGX-SPARK, PERCEPTION_TAG must contain 'sbsa'"

      - variable: SAMPLE_VIDEO_DATASET
        when_equals: "warehouse-4cams-20mx20m-synthetic"
        validate_conditions:
          and:
            - variable: MODE
              equals: "mv3dt"
            - variable: NUM_STREAMS
              equals: "4"
            - or:
                - variable: COMPOSE_PROFILES
                  matches: "bp_wh_kafka_mv3dt,*"
                - variable: COMPOSE_PROFILES
                  matches: "bp_wh_redis_mv3dt,*"
                - variable: COMPOSE_PROFILES
                  matches: "bp_wh_auto_calib_mv3dt,*"

  variables:
    2d:
      - effective_max_streams_supported: 'int("${max_streams_supported}") if "${max_streams_supported}" != "$" + "{max_streams_supported}" and "${max_streams_supported}" != "" else ${NUM_STREAMS}'
      - final_stream_count: "min(${NUM_STREAMS}, ${effective_max_streams_supported})"
      # pre_cluster_threshold: 0.6 for nv-warehouse-4cams, else 0.5 (used in ds-pgie-config.yml)
      - pre_cluster_threshold: '"0.6" if "${SAMPLE_VIDEO_DATASET}" == "nv-warehouse-4cams" else "0.5"'
      - person_detection_threshold: '"0.85" if "${SAMPLE_VIDEO_DATASET}" == "warehouse-loading-dock-3cams-synthetic" else "0.6"'
      - msg-broker-conn-str: '"localhost;6379;" if "${STREAM_TYPE}" == "redis" else "localhost;9092;mdx-raw"'
      - msg-broker-config: '"ds-redis-config.txt" if "${STREAM_TYPE}" == "redis" else "ds-kafka-config.txt"'
      - msg-broker-proto-lib: '"/opt/nvidia/deepstream/deepstream/lib/libnvds_redis_proto.so" if "${STREAM_TYPE}" == "redis" else "/opt/nvidia/deepstream/deepstream/lib/libnvds_kafka_proto.so"'
      # vss-behavior-analytics app.sourceType / app.sinkType (MDX uses "redisStream", not "redis")
      - warehouse_source_sink_type: '"redisStream" if "${STREAM_TYPE}" == "redis" else "kafka"'
      # vss-video-analytics-api: kafka.brokers null when using Redis streams; broker list when using Kafka
      - vss_video_analytics_kafka_brokers: 'None if "${STREAM_TYPE}" == "redis" else ["localhost:9092"]'
    3d:
      - effective_max_streams_supported: 'int("${max_streams_supported}") if "${max_streams_supported}" != "$" + "{max_streams_supported}" and "${max_streams_supported}" != "" else ${NUM_STREAMS}'
      - final_stream_count: "min(${NUM_STREAMS}, ${effective_max_streams_supported})"
      - msg-broker-conn-str: '"localhost;6379;" if "${STREAM_TYPE}" == "redis" else "localhost;9092;mdx-bev"'
      - msg-broker-config: '"ds-redis-config.txt" if "${STREAM_TYPE}" == "redis" else "ds-kafka-config.txt"'
      - msg-broker-proto-lib: '"/opt/nvidia/deepstream/deepstream/lib/libnvds_redis_proto.so" if "${STREAM_TYPE}" == "redis" else "/opt/nvidia/deepstream/deepstream/lib/libnvds_kafka_proto.so"'
      # vss-behavior-analytics app.sourceType / app.sinkType (MDX uses "redisStream", not "redis")
      - warehouse_source_sink_type: '"redisStream" if "${STREAM_TYPE}" == "redis" else "kafka"'
      # vss-video-analytics-api: kafka.brokers null when using Redis streams; broker list when using Kafka
      - vss_video_analytics_kafka_brokers: 'None if "${STREAM_TYPE}" == "redis" else ["localhost:9092"]'
    mv3dt:
      - effective_max_streams_supported: 'int("${max_streams_supported}") if "${max_streams_supported}" != "$" + "{max_streams_supported}" and "${max_streams_supported}" != "" else ${NUM_STREAMS}'
      - final_stream_count: "min(${NUM_STREAMS}, ${effective_max_streams_supported})"
      - msg-broker-conn-str: '"localhost;6379;" if "${STREAM_TYPE}" == "redis" else "localhost;9092;mdx-bev"'
      - msg-broker-config: '"ds-redis-config.txt" if "${STREAM_TYPE}" == "redis" else "ds-kafka-config.txt"'
      - msg-broker-proto-lib: '"/opt/nvidia/deepstream/deepstream/lib/libnvds_redis_proto.so" if "${STREAM_TYPE}" == "redis" else "/opt/nvidia/deepstream/deepstream/lib/libnvds_kafka_proto.so"'
      # vss-behavior-analytics app.sourceType / app.sinkType (MDX uses "redisStream", not "redis")
      - warehouse_source_sink_type: '"redisStream" if "${STREAM_TYPE}" == "redis" else "kafka"'
      # vss-video-analytics-api: kafka.brokers null when using Redis streams; broker list when using Kafka
      - vss_video_analytics_kafka_brokers: 'None if "${STREAM_TYPE}" == "redis" else ["localhost:9092"]'

  file_operations:
    2d:
      # Update DeepStream main config 
      - operation_type: "text_config_update"
        target_file: "${VSS_APPS_DIR}/industry-profiles/warehouse-operations/warehouse-2d-app/deepstream/configs/ds-main-config.txt"
        backup: true
        updates:
          num-source-bins: "0"
          max-batch-size: "${final_stream_count}"
          batch-size: "${final_stream_count}"
          msg-broker-conn-str: "${msg-broker-conn-str}"
          msg-broker-config: "${msg-broker-config}"
          msg-broker-proto-lib: "${msg-broker-proto-lib}"

      - operation_type: "json_update"
        target_file: "${VSS_APPS_DIR}/industry-profiles/warehouse-operations/warehouse-2d-app/nvstreamer/configs/vst-config.json"
        backup: true 
        updates:
          data.nv_streamer_sync_file_count: ${final_stream_count}

      # Update the VST Configs
      - operation_type: "json_update"
        target_file: "${VSS_APPS_DIR}/industry-profiles/warehouse-operations/warehouse-2d-app/vst/configs/vst_config.json"
        backup: true
        updates:
          notifications.use_message_broker_consumer: "${STREAM_TYPE}"      
          onvif.max_devices_supported: ${effective_max_streams_supported}
          data.always_recording: true

      # Warehouse: source/sink driver — kafka vs redisStream (see warehouse_source_sink_type)
      - operation_type: "json_update"
        target_file: "${VSS_APPS_DIR}/industry-profiles/warehouse-operations/warehouse-2d-app/vss-behavior-analytics/configs/vss-behavior-analytics-config.json"
        backup: true
        array_kv_updates:
          - list_key: app
            match_field: name
            updates:
              - match: sourceType
                set_key: value
                set_value: "${warehouse_source_sink_type}"
              - match: sinkType
                set_key: value
                set_value: "${warehouse_source_sink_type}"

      # vss-video-analytics-api (compose mounts VSS_APPS_DIR/services/analytics/video-analytics-api/configs/...)
      - operation_type: "json_update"
        target_file: "${VSS_APPS_DIR}/services/analytics/video-analytics-api/configs/vss-video-analytics-api-config.json"
        backup: true
        updates:
          kafka.brokers: "${vss_video_analytics_kafka_brokers}"

      # Update DeepStream YAML config
      - operation_type: "yaml_update"
        target_file: "${DS_CONFIG_DIR}/ds-pgie-config.yml"
        backup: true
        updates:
          property.model-engine-file: /opt/storage/rtdetr_warehouse_v1.0.2.fp16.onnx_b${final_stream_count}_gpu0_fp16.engine
          class-attrs-all.pre-cluster-threshold: "${pre_cluster_threshold}"
          class-attrs-0.pre-cluster-threshold: "${person_detection_threshold}"
        
      - operation_type: "file_management"
        target_directories:
          - "${VSS_DATA_DIR}/videos/${SAMPLE_VIDEO_DATASET}"
        file_management:
          action: "keep_count" # Keep only the last ${final_stream_count} videos in the directory
          parameters:
            count: ${final_stream_count}
            pattern: "*.mp4"

    3d:
      # Update DeepStream YAML config
      - operation_type: "yaml_update"
        target_file: "${DS_CONFIG_DIR}/config.yaml"
        backup: true
        updates:
          num_sensors: ${final_stream_count}

      # Update DeepStream main config
      - operation_type: "text_config_update"
        target_file: "${DS_CONFIG_DIR}/ds-main-config.txt"
        backup: true
        updates:
          num-source-bins: "0"
          list: ""
          sensor-id-list: ""
          sensor-name-list: ""
          max-batch-size: "${final_stream_count}"
          batch-size: "${final_stream_count}"
          msg-broker-conn-str: "${msg-broker-conn-str}"
          msg-broker-config: "${msg-broker-config}"
          msg-broker-proto-lib: "${msg-broker-proto-lib}"

      # Update DeepStream preprocess config
      - operation_type: "text_config_update"
        target_file: "${DS_CONFIG_DIR}/ds-mtmc-preprocess-config.txt"
        backup: true
        updates:
          network-input-shape: "${final_stream_count};3;540;960"

      # Update VST Configs
      - operation_type: "json_update"
        target_file: ${VSS_APPS_DIR}/industry-profiles/warehouse-operations/warehouse-3d-app/nvstreamer/configs/vst-config.json
        backup: true 
        updates:
          data.nv_streamer_sync_file_count: ${final_stream_count}
          onvif.max_devices_supported: ${effective_max_streams_supported}

      - operation_type: "json_update"
        target_file: "${VSS_APPS_DIR}/industry-profiles/warehouse-operations/warehouse-3d-app/vst/configs/vst_config.json"
        backup: true
        updates:
          notifications.use_message_broker_consumer: "${STREAM_TYPE}"
          onvif.max_devices_supported: ${effective_max_streams_supported}
          data.always_recording: true

      # Warehouse: source/sink driver — kafka vs redisStream (see warehouse_source_sink_type)
      - operation_type: "json_update"
        target_file: "${VSS_APPS_DIR}/industry-profiles/warehouse-operations/warehouse-3d-app/vss-behavior-analytics/configs/vss-behavior-analytics-config.json"
        backup: true
        array_kv_updates:
          - list_key: app
            match_field: name
            updates:
              - match: sourceType
                set_key: value
                set_value: "${warehouse_source_sink_type}"
              - match: sinkType
                set_key: value
                set_value: "${warehouse_source_sink_type}"

      # vss-video-analytics-api (compose mounts VSS_APPS_DIR/services/analytics/video-analytics-api/configs/...)
      - operation_type: "json_update"
        target_file: "${VSS_APPS_DIR}/services/analytics/video-analytics-api/configs/vss-video-analytics-api-config.json"
        backup: true
        updates:
          kafka.brokers: "${vss_video_analytics_kafka_brokers}"

      - operation_type: "file_management"
        target_directories:
          - "${VSS_DATA_DIR}/videos/${SAMPLE_VIDEO_DATASET}"
        file_management:
          action: "keep_count" # Keep only the last ${final_stream_count} videos in the directory
          parameters:
            count: ${final_stream_count}
            pattern: "*.mp4"

    mv3dt:
      # Update DeepStream main config
      - operation_type: "text_config_update"
        target_file: "${DS_CONFIG_DIR}/ds-main-config-mv3dt.txt"
        backup: true
        updates:
          num-source-bins: "0"
          list: ""
          sensor-id-list: ""
          sensor-name-list: ""
          config-file: "ds-pgie-config.yml"
          max-batch-size: "${final_stream_count}"
          batch-size: "${final_stream_count}"
          msg-broker-conn-str: "${msg-broker-conn-str}"
          msg-broker-config: "${msg-broker-config}"
          msg-broker-proto-lib: "${msg-broker-proto-lib}"

      # Update NVStreamer configs
      - operation_type: "json_update"
        target_file: ${VSS_APPS_DIR}/industry-profiles/warehouse-operations/warehouse-mv3dt-app/nvstreamer/configs/vst-config.json
        backup: true
        updates:
          data.nv_streamer_sync_file_count: ${final_stream_count}
          onvif.max_devices_supported: ${effective_max_streams_supported}

      # Update VST config
      - operation_type: "json_update"
        target_file: "${VSS_APPS_DIR}/industry-profiles/warehouse-operations/warehouse-mv3dt-app/vst/configs/vst_config.json"
        backup: true
        updates:
          notifications.use_message_broker_consumer: "${STREAM_TYPE}"
          onvif.max_devices_supported: ${effective_max_streams_supported}
          data.always_recording: true

      # Warehouse: source/sink driver — kafka vs redisStream (see warehouse_source_sink_type)
      - operation_type: "json_update"
        target_file: "${VSS_APPS_DIR}/industry-profiles/warehouse-operations/warehouse-mv3dt-app/vss-behavior-analytics/configs/vss-behavior-analytics-config.json"
        backup: true
        array_kv_updates:
          - list_key: app
            match_field: name
            updates:
              - match: sourceType
                set_key: value
                set_value: "${warehouse_source_sink_type}"
              - match: sinkType
                set_key: value
                set_value: "${warehouse_source_sink_type}"

      # vss-video-analytics-api (compose mounts VSS_APPS_DIR/services/analytics/video-analytics-api/configs/...)
      - operation_type: "json_update"
        target_file: "${VSS_APPS_DIR}/services/analytics/video-analytics-api/configs/vss-video-analytics-api-config.json"
        backup: true
        updates:
          kafka.brokers: "${vss_video_analytics_kafka_brokers}"

      - operation_type: "file_management"
        target_directories:
          - "${VSS_DATA_DIR}/videos/${SAMPLE_VIDEO_DATASET}"
        file_management:
          action: "keep_count" # Keep only the last ${final_stream_count} videos in the directory
          parameters:
            count: ${final_stream_count}
            pattern: "*.mp4"

