services:

  vss-search-analytics-2d-fusion:
    extends:
      file: ${VSS_APPS_DIR}/services/analytics/behavior-analytics/compose.yml
      service: vss-behavior-analytics-base
    profiles: ["bp_developer_search_2d"]
    volumes:
      - $VSS_APPS_DIR/developer-profiles/dev-profile-search/video-analytics-2d-app/vss-search-analytics/configs/vss-search-analytics-$STREAM_TYPE-config.json:/resources/vss-search-analytics-config.json
    container_name: vss-behavior-analytics
    command: python3 apps/fusion_search/main_fusion_search_analytics_app.py --config /resources/vss-search-analytics-config.json
    depends_on:
      broker-health-check:
        condition: service_completed_successfully

  vss-video-analytics-api-fusion:
    extends:
      file: $VSS_APPS_DIR/services/analytics/video-analytics-api/compose.yml
      service: vss-video-analytics-api
    profiles: ["bp_developer_search_2d"]
    container_name: vss-video-analytics-api
    depends_on:
      broker-health-check:
        condition: service_completed_successfully
      elasticsearch-init-container:
        condition: service_completed_successfully


  nvstreamer-2d-fusion:
    container_name: vss-vios-nvstreamer
    image: nvcr.io/nvstaging/vss-core/vss-vios-nvstreamer:${NVSTREAMER_IMAGE_TAG}
    user: "0:0"
    #runtime: nvidia
    profiles: ["bp_developer_search_2d"]
    entrypoint: ["/bin/bash", "-c", "if [ \"$$NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES\" = \"true\" ]; then /home/vst/vst_release/tools/user_additional_install.sh; fi && exec /home/vst/vst_release/launch_vst"]
    environment:
      - NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES=${NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES}
      - ADAPTOR=streamer
      - HTTP_PORT=${NVSTREAMER_HTTP_PORT}
    network_mode: "host"
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 2
      resources:
        reservations:
          devices:
          - capabilities: [gpu]
            device_ids: ["0"]
    volumes:    
      - $VSS_APPS_DIR/developer-profiles/dev-profile-search/video-analytics-2d-app/nvstreamer/configs/vst-config.json:/home/vst/vst_release/configs/vst_config.json
      - $VSS_APPS_DIR/developer-profiles/dev-profile-search/video-analytics-2d-app/nvstreamer/configs/vst-storage.json:/home/vst/vst_release/configs/vst_storage.json
      - $VSS_DATA_DIR/data_log/nvstreamer/vst_data:/home/vst/vst_release/vst_data
    depends_on:
      broker-health-check:
        condition: service_completed_successfully

  perception-2d-init:
    image: debian:12-slim
    profiles: ["bp_developer_search_2d"]
    container_name: vss-rtvi-cv-init
    network_mode: "host"
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          cpus: '2.0'
          memory: 6g
        reservations:
          cpus: '0.5'
          memory: 1g
    volumes:
      - $VSS_DATA_DIR/models/:/opt/storage/
      - $VSS_APPS_DIR/developer-profiles/dev-profile-search/video-analytics-2d-app/deepstream/scripts/download-vision-encoder.sh:/opt/scripts/download-vision-encoder.sh:ro
    environment:
      VISION_ENCODER_MODEL: ${VISION_ENCODER_MODEL:-siglip_v2}
      VISION_ENCODER_VERSION: ${VISION_ENCODER_VERSION:-v1.1}
      NGC_CLI_API_KEY: ${NGC_CLI_API_KEY}
      STORAGE_UID: ${STORAGE_UID:-1001}
      STORAGE_GID: ${STORAGE_GID:-1001}
    command:
      - bash
      - /opt/scripts/download-vision-encoder.sh

  perception-2d-fusion:
    extends:
      file: $VSS_APPS_DIR/services/rtvi/rtvi-cv/compose.yaml
      service: perception
    profiles: ["bp_developer_search_2d"]
    container_name: vss-rtvi-cv
    volumes:
        # Config file mounts (read-only staging; ds-search-start.sh copies to the writable app dir)
      - $VSS_APPS_DIR/developer-profiles/dev-profile-search/video-analytics-2d-app/deepstream/configs/:/opt/ds-configs-ro:ro

      # Search-profile wrapper script (patches configs, then calls ds-start.sh)
      - $VSS_APPS_DIR/developer-profiles/dev-profile-search/video-analytics-2d-app/deepstream/scripts/ds-search-start.sh:/opt/nvidia/deepstream/deepstream/sources/apps/sample_apps/metropolis_perception_app/ds-search-start.sh:ro

      # Models directory — RT-DETR + vision encoder models (downloaded by init container)
      - $VSS_DATA_DIR/models/:/opt/storage/
    command:
      - bash
      - -c
      - /opt/nvidia/deepstream/deepstream/sources/apps/sample_apps/metropolis_perception_app/ds-search-start.sh
    environment:
      GST_PLUGIN_PATH: /opt/nvidia/deepstream/deepstream/sources/gst-plugins/gst-nvdstextembedder
      TRANSFORMERS_OFFLINE: 0
      HF_HUB_OFFLINE: 0
      DS_MODE_FLAG: "1"
      DS_MODEL_FAMILY: rtdetr-warehouse
      DS_TRACKER_REID: "true"
      DS_SHOW_SENSOR_ID: "false"
      VISION_ENCODER_MODEL: ${VISION_ENCODER_MODEL:-siglip_v2}
      VISION_ENCODER_VERSION: ${VISION_ENCODER_VERSION:-v1.1}
    depends_on:
      perception-2d-init:
        condition: service_completed_successfully
      sensor-ms:
        condition: service_started
      broker-health-check:
        condition: service_completed_successfully


volumes:
  mdx-nvstreamer-data:        
  mdx-nvstreamer-videos:
