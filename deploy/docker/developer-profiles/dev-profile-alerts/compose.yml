services:

  vss-behavior-analytics-alerts:
    extends:
      file: ${VSS_APPS_DIR}/services/analytics/behavior-analytics/compose.yml
      service: vss-behavior-analytics-base
    profiles: ["bp_developer_alerts_2d_cv"]
    volumes:
      - $VSS_APPS_DIR/developer-profiles/dev-profile-alerts/vss-behavior-analytics/configs/vss-behavior-analytics-config.json:/resources/vss-behavior-analytics-config.json
    container_name: vss-behavior-analytics
    command: python3 apps/dev_example/main_dev_example_app.py --config /resources/vss-behavior-analytics-config.json
    depends_on:
      broker-health-check:
        condition: service_completed_successfully

  nvstreamer-alerts:
    image: nvcr.io/nvidia/vss-core/vss-vios-nvstreamer:${NVSTREAMER_IMAGE_TAG}
    user: "0:0"
    profiles: ["bp_developer_alerts_2d_cv", "bp_developer_alerts_2d_vlm"]
    entrypoint: [ "/bin/bash", "-c", "if [ \"$$NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES\" = \"true\" ]; then /home/vst/vst_release/tools/user_additional_install.sh; fi && exec /home/vst/vst_release/launch_vst" ]
    environment:
      - NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES=${NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES}
      - ADAPTOR=streamer
      - HTTP_PORT=${NVSTREAMER_HTTP_PORT}
    network_mode: "host"
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 2
    container_name: vss-vios-nvstreamer
    volumes:
      - $VSS_APPS_DIR/developer-profiles/dev-profile-alerts/nvstreamer/configs/vst-config.json:/home/vst/vst_release/configs/vst_config.json
      - $VSS_APPS_DIR/developer-profiles/dev-profile-alerts/nvstreamer/configs/vst-storage.json:/home/vst/vst_release/configs/vst_storage.json
      - $VSS_DATA_DIR/videos/dev-profile-alerts:/home/vst/vst_release/streamer_videos
      - $VSS_DATA_DIR/data_log/nvstreamer/vst_data:/home/vst/vst_release/vst_data
      - $VSS_APPS_DIR/services/vios/scripts/user_additional_install.sh:/home/vst/vst_release/tools/user_additional_install.sh
    depends_on:
      broker-health-check:
        condition: service_completed_successfully

  # perception-sdr-alerts:
  #   extends:
  #     file: $VSS_APPS_DIR/services/rtvi/rtvi-cv/compose.yaml
  #     service: perception-sdr
  #   profiles: ["bp_developer_alerts_2d_cv"]
  #   container_name: vss-rtvi-cv-sdr
  #   volumes:
  #     - $VSS_APPS_DIR/developer-profiles/dev-profile-alerts/sdr:/wdm-configs
  #     - $VSS_APPS_DIR/developer-profiles/dev-profile-alerts/sdr:/wdm-data
  #   environment:
  #     WDM_INITIALIZE_FROM_VST: true
  #     WDM_KFK_ENABLE: false
  #     WDM_PRELOAD_DELAY_FOR_DS_API: true
  #     WDM_WL_THRESHOLD: ${NUM_SENSORS}
  #     WDM_POD_WATCH_DOCKER_DELAY: 0.5
  #     WDM_WL_OBJECT_NAME: sdr-deepstream
  #     WDM_CONSUMER_GRP_ID: sdr-deepstream-cg
  #     WDM_CLUSTER_CONTAINER_NAMES: '["vss-rtvi-cv"]'

  perception-alerts:
    extends:
      file: $VSS_APPS_DIR/services/rtvi/rtvi-cv/compose.yaml
      service: perception
    profiles: ["bp_developer_alerts_2d_cv"]
    container_name: vss-rtvi-cv
    volumes:
      - $VSS_DATA_DIR/models/:/opt/storage/
      - $VSS_APPS_DIR/engines/:/opt/engines/
      - $VSS_APPS_DIR/developer-profiles/dev-profile-alerts/deepstream/configs/:/opt/nvidia/deepstream/deepstream/sources/apps/sample_apps/metropolis_perception_app/mounted-configs/

    environment:
      MODEL_TYPE: ${MODEL_TYPE}
      STREAM_TYPE: ${STREAM_TYPE}
      MODEL_NAME_2D: ${MODEL_NAME_2D}
      NUM_SENSORS: ${NUM_SENSORS}
      DS_MODEL_FAMILY: rtdetr-gdino
      DS_TRACKER_REID: "false"
      DS_SHOW_SENSOR_ID: "true"
      DS_CONFIG_FILE: /opt/nvidia/deepstream/deepstream/sources/apps/sample_apps/metropolis_perception_app/configs/run_config-api-rtdetr-protobuf.txt
    depends_on:
      kafka-topic-init-container:
        condition: service_completed_successfully
      rtvi-vlm:
        condition: service_healthy
        required: false

  kibana-init-container-alerts:
    build:
      context: $VSS_APPS_DIR/developer-profiles/dev-profile-alerts
      dockerfile: $VSS_APPS_DIR/developer-profiles/dev-profile-alerts/Dockerfiles/kibana-dashboard.Dockerfile
    network_mode: "host"
    profiles: ["bp_developer_alerts_2d_cv", "bp_developer_alerts_2d_vlm"]
    container_name: vss-kibana-init
    command: bash /opt/mdx/init-scripts/kibana-import-dashboard.sh
    depends_on:
      kibana:
        condition: service_healthy

  vss-video-analytics-api-alerts:
    extends:
      file: $VSS_APPS_DIR/services/analytics/video-analytics-api/compose.yml
      service: vss-video-analytics-api
    profiles: ["bp_developer_alerts_2d_cv", "bp_developer_alerts_2d_vlm"]
    container_name: vss-video-analytics-api
    depends_on:
      broker-health-check:
        condition: service_completed_successfully
      elasticsearch-init-container:
        condition: service_completed_successfully

volumes:
  mdx-nvstreamer-data:
  mdx-nvstreamer-videos: