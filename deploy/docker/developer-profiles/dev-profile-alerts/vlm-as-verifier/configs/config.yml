# ============================================================================
# SIMPLIFIED ALERT AGENT CONFIGURATION
# ============================================================================
# This configuration supports the simplified alert processing flow:
# JSON Input → Entity Building → VSS Video Analysis → Enhanced JSON Output

# Base directory for media used during alert review (optional)
# If set, components can resolve relative media paths against this base dir
ALERT_REVIEW_MEDIA_BASE_DIR: ""

# VST Configuration
vst_config:
  recording_check_max_attempts: 3
  # Base URL for general VST APIs already used elsewhere in the codebase
  base_url: "http://localhost:30888"
  sensor_list_endpoint: "/vst/api/v1/sensor/streams"
  add_overlay: false
  segment_anchor: "end"          # enable end-anchored window
  segment_duration_seconds: 10   # M (already used today)
  timeout: 60                    # timeout in seconds to get the video url from vst
  retry_without_overlay: true
  verify_time_existence: true

  # Storage service configuration (separate base URL and endpoint similar to vss_agent)
  storage:
    base_url: "http://localhost:30888"
    # Endpoint to fetch media file path by VST id
    media_file_path_by_id_endpoint: "/api/v1/storage/file/path"

# General Kafka Configuration - Message Processing
kafka:
  bootstrap_servers: "localhost:9092"
  group_id: 'kafka-incidents-dumper'
           # Output topic for incidents
  max_poll_records: 10                          # Process one record at a time (immediate processing)
  auto_offset_reset: 'latest'
  enable_auto_commit: false
  max_poll_interval_ms: 600000                  # Reduced to 5 minutes
  session_timeout_ms: 45000
  heartbeat_interval_ms: 15000
  poll_timeout: 5                             # Kafka consumer poll wait timeout in milliseconds
  message_type: "Incident"  # Protobuf message type: "Behavior" or "Incident"
  enhanced_anomaly_topic: "alert-bridge-enhanced-alerts"     # Not currently used will be removed in the next version
  incidents_topic: "alert-bridge-incidents" # Not currently used will be removed in the next version

#VLM Configuration
vlm:
  base_url: ${VLM_BASE_URL}/v1
  model: "${VLM_NAME}"
  max_tokens: 4096
  request_timeout: 5

  # VLM Media Source: how to send video to VLM endpoint
  # false (default) - Pass video URL to VLM (VLM fetches from URL)
  # true - Download video locally, base64-encode, upload to VLM
  vlm_media_source_using_base64: false

  # Response format: auto | cosmos-reason | json | other | <custom>  (default: auto)
  #
  # Case 1 — Auto-detect (default, no change needed):
  #   "auto" detects from model name: cosmos-reason1/2 → cosmos-reason, else → other.
  #
  # Case 2 — Cosmos Reason (explicit):
  #   "cosmos-reason" handles both <answer>-tagged and bare verdict formats from any
  #   Cosmos Reason model (CR1 or CR2). Use when model name doesn't match auto-detect.
  #   "cr1" and "cr2" are accepted as aliases for backward compatibility.
  #
  # Case 3 — JSON output (field names configurable via json_parser):
  #   Set response_format: "json". Prompt must ask VLM to return JSON.
  #   All json_parser fields are optional; defaults shown below.
  #   For nested fields use dot-notation (e.g. "hazard_detection.is_hazardous").
  #   For non-string verdicts (boolean/integer) add verdict_mapping.
  #
  # Case 4 — Custom parser:
  #   1. Create a Python module that calls register_parser("name", fn)
  #   2. Set custom_parser_module to its dotted import path
  #   3. Set response_format to the registered name
  #   Example:
  #     response_format: "xml-verdict"
  #     custom_parser_module: "custom_parsers.xml_verdict_parser"
  #   The module is auto-imported at startup. The parser function must accept
  #   (text: str, json_config: Optional[Dict]) and return a VLMResponse.
  #
  response_format: "auto"
  # custom_parser_module: "custom_parsers.my_parser"  # dotted Python module path

  # Pluggable response parser: external parser class for custom use cases.
  # When set, it fully replaces the default CR1/CR2 verification parsing.
  # The class must expose parse(raw_response: str) -> dict; its output is
  # JSON-stringified into info["vlm_response"] with info["verdict"] = "".
  # Parser modules live outside the AB repo; AB loads the class at startup.
  # IMPORTANT: parser classes MUST be thread-safe — Alert Bridge shares one
  # instance across all worker threads + the async dispatcher.
  #
  # Output-schema contract:
  #   * When UNSET (default) — output schema is unchanged; VLM free-form
  #     text lands in info["reasoning"] via the built-in verification path.
  #   * When SET               — output schema swaps: parser JSON lands in
  #     info["vlm_response"] instead of info["reasoning"]. This is the only
  #     way to opt into the new field name; deployments that never set this
  #     key see zero wire change.
  #
  # response_parser: "my_package.parsers.FireClassifier"

  # ─ Precedence note ────────────────────────────────────────
  # When both `custom_parser_module` and `response_parser` are set, Alert
  # Bridge emits a startup WARN. `response_parser` always wins on the
  # default VLM path; `custom_parser_module` is still consulted anywhere
  # VLMResponse.model_validate_text is called directly. Prefer
  # `response_parser` for new integrations.

  # JSON parser config (only used when response_format: "json").
  # The prompt must ask the VLM to return JSON with matching field names.
  #
  # json_parser:
  #   verdict_field: "prediction_answer"                # default; or "hazard_detection.is_hazardous" for nested
  #   reasoning_fields:                                 # first match wins
  #     - "reasoning"
  #     - "thinking"
  #     - "explanation"
  #     - "video_description"
  #   verdict_mapping:                                  # optional; map non-string values to YES/NO
  #     "true": "YES"
  #     "false": "NO"

  # Media Processing Parameters Toggle
  # When true: Alert Bridge omits these parameters, letting VLM use its server-side defaults
  #            (e.g., VLM defaults: 4 FPS, larger pixel limits for models like CR2)
  use_vlm_media_defaults: false
  # Custom media processing parameters (only used when use_vlm_media_defaults: false)
  # CR2 recommended: 0.6 (with reasoning/think tags), 0.7 (without reasoning)
  temperature: 0.6
  # do_resize: when true (default) Alert Bridge sends mm_processor_kwargs.size built from
  # min_pixels/max_pixels. When false, the size kwarg is omitted and the model uses its
  # server-side default size — useful when the caller-supplied bounds hurt accuracy.
  # Note: the model's per-frame token cost is much higher without size; long high-resolution
  # clips can exceed the NIM's 1B-pixel cap and return 400.
  do_resize: true
  # Beware that these parameters need to be set in accordance with the VLM max context window
  min_pixels: 1568
  max_pixels: 3960000
  num_frames: 5
  enable_sampling: true
  sampling_fps: 4
  # Warmup tuning — override defaults for slow GPUs or large models
  # warmup:
  #   poll_timeout: 300       # seconds to wait for NIM readiness
  #   poll_interval: 10       # seconds between readiness polls
  #   inference_timeout: 120  # seconds for first (cold) inference
  #   num_requests: 3         # number of warmup inferences to send

# Event Bridge Configuration - Choose between kafka and redisStream
event_bridge:
  sourceType: "kafka"                     # redisStream or "kafka"
  sinkType: "kafka"                       # redisStream or "kafka"

  kafka_source:
    group_id: 'alert-bridge-vlm-group'
    topics:
      incident: 'mdx-incidents'
      alert: 'mdx-alerts'

  # Redis Streams Configuration
  redis_source:
    host: "localhost"
    port: 6379
    db: 0
    dedup_ttl_seconds: 5
    protect_confirmed_verdicts:
      enabled: true
      ttl_seconds: 600
    # End time delta filter: blocks incidents unless end time changed significantly
    end_time_delta_filter:
      enabled: true
      threshold_seconds: 3
      ttl_seconds: 3600
    # Categories listed here will retain the incident end timestamp when building the dedup key.
    # Any category not listed will omit the end timestamp for deduplication purposes.
    end_time_in_dedup_key_categories: []
    streams:
      anomaly_stream: "alert-bridge-input-stream"
      heartbeat_stream: "alert-bridge-heartbeats-stream"
    consumer_group: "vlm_agents_group"
    consumer_config:
      block_time: 10
      count: 1
      batch_size: 1

  redis_sink:
    host: "localhost"
    port: 6379
    db: 0
    streams:
      enhanced_anomaly_stream: "alert-bridge-enhanced-stream"
      incidents_stream: "alert-bridge-incidents-stream"

prompt:
  prefer_payload_prompt: false
  override_prompts_on_start: true

# Alert Type Configuration
alert_type_config_file: "alert_type_config.json"

# Alert Agent Configuration - Processing Settings
alert_agent:
  num_workers: 10                                # Number of worker threads
  max_allowed_stream_size: 2                    # Maximum stream size in minutes
  default_stream_interval: 1                    # Default stream interval in minutes
  vst_pass_through_mode: false                   # Use local media files instead of VST stream lookup
  chunk_size: 1
  metrics:
    # Requires PROMETHEUS_METRICS_ENABLED=true (env var) to have any effect.
    # When false (default), the *_BY_SENSOR metric variants are never observed
    # (zero cardinality cost). When true, each distinct sensor ID mints ~12
    # additional Prometheus series per histogram — only enable for deployments
    # with a bounded sensor fleet and a known series budget (~10k per target).
    per_sensor_labels: false
  async_io:
    enabled: true                               # Guardrail: keep sync behavior by default
    vst_enabled: true                           # Guardrail: async-submit VST lookup path
    elastic_enabled: true                       # Guardrail: async-submit Elastic sink publishing path
    redis_enabled: true                         # Guardrail: async-submit Redis dedup/read operations
    external_timeout_seconds: 30                 # Timeout for async-submitted VST/Elastic/Redis operations
    sink_warn_in_flight: 20                      # Warning threshold for in-flight async sink operations

  # URL Transformation - transforms internal IPs to external for VLM/UI access
  url_transform:
    enabled: true                                # Enable URL transformation (default: true)

  media_download:
    enabled: false                                # Enable direct media URL processing
    max_media_count: 5                           # Maximum number of media URLs per request
    timeout_seconds: 30                          # Download timeout per file
    max_size_mb: 50                              # Maximum file size to download
    allow_private_urls: true                     # Allow private/local URLs (development only, SSRF risk)
    use_verdict: false                           # VLM response mode: true=verdict-based, false=freestyle

  # Enrichment Processing Configuration
  enrichment:
    enabled: false                               # Master switch for enrichment processing

  # Always-on VLM alert rules
  always_on: false

# RTVI VLM Configuration - Real-time VLM alert management
# Alert Bridge calls this service to start/stop real-time RTSP analysis
rtvi_vlm:
  base_url: ${RTVI_VLM_BASE_URL}/v1
  timeout: 10                                # HTTP request timeout (seconds)
  default_model: "${VLM_NAME}"  # Default VLM model for caption/alert generation
  captions_ack_timeout: 2.0                  # Seconds to wait for generate_captions initial HTTP ack
  # Stream readiness probe: after the captions ack window expires
  # (streaming mode) the create path polls GET /streams/get-stream-info
  # every ``stream_readiness_poll_interval`` seconds until either the
  # stream id appears in the registry (positive readiness signal) or
  # ``stream_readiness_max_wait`` elapses. The probe is skipped when
  # the rule reused an already-registered stream — existence was just
  # confirmed at resolve time.
  # Total worst-case response latency: captions_ack_timeout +
  # stream_readiness_max_wait (default ~4 s, down from the previous
  # 12 s readiness window). Late caption-task failures are still
  # caught asynchronously via the captions task done callback.
  stream_readiness_poll_interval: 0.2
  stream_readiness_max_wait: 2.0
  # ``stream_readiness_timeout`` is deprecated. The realtime service
  # logs a warning and ignores it — set the two probe knobs above.
  rules_collection: "alert-realtime-rules"   # ES collection name for durable rule storage
  pending_ttl_seconds: 300                   # Stale pending rules older than this are cleaned at startup
  health_check_interval_seconds: 30          # RTVI /ready poll interval; triggers reconcile on recovery
  # Rollback switch for the realtime-rules persistence + replay feature.
  # When false, POST/DELETE on /api/v1/realtime do not write to
  # Elasticsearch and POST /api/v1/realtime/replay returns 501.
  # Independent of `persistence.enabled`: the global flag turns the whole
  # persistence layer (alert configs, prompts, realtime) off, while this
  # one only disables the realtime-rules path.
  enable_realtime_persistence: true

# Webhook Notification — fire-and-forget POST on VLM-verified incidents
# When enabled, every successfully verified incident is POSTed to the
# configured URL (e.g. OpenClaw).  No retry / no queue / no dead-letter.
webhook:
  openclaw:
    enabled: false                               # Master switch (default OFF)
    url: "http://localhost:9090/webhook/alert-notify-slack"                                      # OpenClaw webhook endpoint
    topic: "mdx-vlm-incidents"                   # Kafka topic to consume and forward to webhook
    group_id: "openclaw-webhook-group"            # Kafka consumer group (independent from main AB consumer)
    timeout_seconds: 5                            # HTTP POST timeout
    max_pending: 100                              # Max queued deliveries before dropping

# WebSocket Configuration - Real-time alert broadcasting
websocket:
  enabled: false                                 # Enable/disable WebSocket service
  consumer_group_prefix: "websocket_instance"  # Prefix for consumer groups
  redis_consumer:
    block_time: 1000                           # Redis XREAD block time in milliseconds
    count: 1                                   # Number of messages to read per batch
    reconnect_delay: 5                         # Seconds to wait before reconnecting on failure

cors:
  enabled: true
  allow_origins: ['*']
  allow_methods: ['*']
  allow_headers: ['*']
  allow_credentials: false

elastic:
  enabled: true
  hosts:
    - http://localhost:9200

# Persistence layer — durable storage for configs and prompts
persistence:
  enabled: true
  backend: "elasticsearch"               # Only "elasticsearch" supported for now
  index_prefix: "ab-"                    # Indices created as ab-{collection}
  # elasticsearch:                       # Optional: override hosts (defaults to elastic.hosts above)
  #   hosts:
  #     - http://localhost:9200

vlm_enhanced_sink:
  incident:
    type: "elastic"
    elastic:
      index: "mdx-vlm-incidents"
  alert:
    type: "elastic"
    elastic:
      index: "mdx-vlm-alerts"
