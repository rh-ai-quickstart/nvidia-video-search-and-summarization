# VSS Orchestrator MCP Server
#
# Exposes nine tools:
#   vss_orchestrator__profiles - list all supported deployment profiles
#   vss_orchestrator__prereqs - run Docker/GPU prerequisite checks
#   vss_orchestrator__docker_generate - resolve env + compose YAML artifacts
#   vss_orchestrator__docker_read - fetch generated env/yaml by docker_compose_id
#   vss_orchestrator__docker_list - list docker container names
#   vss_orchestrator__docker_logs - fetch docker logs by container name
#   vss_orchestrator__docker_up - docker compose up -d --build --quiet-pull
#   vss_orchestrator__docker_down - docker compose down -v --remove-orphans
#   vss_orchestrator__docker_status - poll docker operation status/logs
#
# Start with:
#   nat mcp serve --config_file deploy/docker/scripts/vss_orchestrator_mcp_config.yml --port 9988
#
# Server listens at: http://localhost:9988/mcp

function_groups:
  vss_orchestrator:
    mdx_data_dir: "/home/ubuntu/video-search-and-summarization/deployments/data-dir"
    # Required output directory for docker_generate artifacts.
    output_dir: "/home/ubuntu/video-search-and-summarization/.orchestrator-artifacts"
    # ----------------------------------------------------------------------------------------------------------------------------------------------------------------
    _type: vss_orchestrator
    # Absolute path to the deploy/docker root. Set HOST_IP separately via env
    # overrides in the docker_generate tool call, or pre-populate the selected profile .env.
    deployments_dir: "/home/ubuntu/video-search-and-summarization/deploy/docker"
    # Absolute source compose yaml path.
    source_compose_yaml: "/home/ubuntu/video-search-and-summarization/deploy/docker/compose.yml"
    # Absolute source profile env path. Supports {profile}.
    source_env: "/home/ubuntu/video-search-and-summarization/deploy/docker/developer-profiles/dev-profile-{profile}/.env"
    # VSS_DATA_DIR base directory used by orchestrator (profile .env VSS_DATA_DIR is ignored).
    mdx_data_directories:
    - data_log/analytics_cache
    - data_log/calibration_toolkit
    - data_log/elastic/data
    - data_log/elastic/logs
    - data_log/kafka
    - data_log/redis/data
    - data_log/redis/log
    - data_log/vss_video_analytics_api
    - agent_eval/dataset
    - agent_eval/results
    - videos/dev-profile-alerts
    - models
    # NGC packages to download per profile. Each entry groups one package_ref
    # with the artifacts to extract from it (src = path inside the downloaded
    # package, out = destination under <mdx_data_dir>/models/).
    model_artifacts:
      search:
      - package_ref: "nvstaging/tao/rtdetr_2d_warehouse:deployable_rn50_v1.0.2"
        artifacts:
        - src: "rtdetr_2d_warehouse_vdeployable_rn50_v1.0.2/rtdetr_warehouse_v1.0.2.fp16.onnx"  # yamllint disable-line rule:line-length
          out: "rtdetr_warehouse_v1.0.2.fp16.onnx"
          kind: "file"
      alerts:
      - package_ref: "nvidia/tao/trafficcamnet_transformer_lite:deployable_resnet50_v2.0"
        artifacts:
        - src: "trafficcamnet_transformer_lite_vdeployable_resnet50_v2.0/resnet50_trafficcamnet_rtdetr.fp16.onnx"  # yamllint disable-line rule:line-length
          out: "rtdetr-its/model_epoch_035.fp16.onnx"
          kind: "file"
      - package_ref: "nvidia/tao/mask_grounding_dino:mask_grounding_dino_swin_tiny_commercial_deployable_v2.1_wo_mask_arm"  # yamllint disable-line rule:line-length
        artifacts:
        - src: "mask_grounding_dino_vmask_grounding_dino_swin_tiny_commercial_deployable_v2.1_wo_mask_arm/mgdino_mask_head_pruned_dynamic_batch.onnx"  # yamllint disable-line rule:line-length
          out: "gdino/mgdino_mask_head_pruned_dynamic_batch.onnx"
          kind: "file"
    model_resolution:
      hardware:
        edge_profiles:
        - DGX-SPARK
        - IGX-THOR
        - AGX-THOR
        edge_allowed_profiles:
        - base
        - alerts
        edge_device_ids:
          llm: "0"
          vlm: "0"
          rt_vlm: "0"
          rt_cv: "0"
        # Keys define the set of supported hardware profiles.
        # Values are env overrides (empty/null = supported, no overrides).
        hardware_profiles:
          H100:
          L40S:
          RTXPRO6000BW:
          OTHER:
          DGX-SPARK:
            PERCEPTION_TAG: "3.2.0-sbsa-26.05.1"
            RTVI_VLM_IMAGE_TAG: "3.2.0-26.05.4-sbsa"
            base:
              VLM_NIM_KVCACHE_PERCENT: "0.2"
            alerts.verification:
              RTVI_VLLM_GPU_MEMORY_UTILIZATION: "0.25"
              RTVI_VLM_MAX_MODEL_LEN: "8192"  # can raise to 16384 if VLLM_ENFORCE_EAGER=true
              RTVI_VLLM_MAX_NUM_SEQS: "8"
              # VLM_AS_VERIFIER_REQUEST_TIMEOUT: "60"
              # ALERT_AGENT_NUM_WORKERS: "4"
            alerts.real-time:
              RTVI_VLLM_GPU_MEMORY_UTILIZATION: "0.3"
              RTVI_VLM_MAX_MODEL_LEN: "8192"
              RTVI_VLLM_MAX_NUM_SEQS: "8"
              # VLM_AS_VERIFIER_REQUEST_TIMEOUT: "60"
              # ALERT_AGENT_NUM_WORKERS: "4"
          IGX-THOR:
            VLM_NAME_SLUG: none
            VLM_NAME: nim_nvidia_cosmos-reason2-8b_hf-1208
            RTVI_VLM_MODEL_PATH: ngc:nim/nvidia/cosmos-reason2-8b:hf-1208
            RTVI_VLM_MODEL_TO_USE: cosmos-reason2
            RTVI_VLLM_GPU_MEMORY_UTILIZATION: "0.35"
            VLM_MODEL_TYPE: rtvi
          AGX-THOR:
            VLM_NAME_SLUG: none
            VLM_NAME: nim_nvidia_cosmos-reason2-8b_hf-1208
            RTVI_VLM_MODEL_PATH: ngc:nim/nvidia/cosmos-reason2-8b:hf-1208
            RTVI_VLM_MODEL_TO_USE: cosmos-reason2
            RTVI_VLLM_GPU_MEMORY_UTILIZATION: "0.35"
            VLM_MODEL_TYPE: rtvi
    profile_mode_to_env_modes:
      alerts:  # must set modes below for profile that has modes
        verification: 2d_cv
        real-time: 2d_vlm
    include:
    - profiles
    - prereqs
    - docker_generate
    - docker_read
    - docker_list
    - docker_logs
    - docker_up
    - docker_down
    - docker_status

llms:
  nim_llm:
    _type: nim
    model_name: meta/llama-3.1-70b-instruct
    temperature: 0.0
    max_tokens: 1024

# dummy workflow required to start MCP server
workflow:
  _type: react_agent
  tool_names: [vss_orchestrator]
  llm_name: nim_llm
