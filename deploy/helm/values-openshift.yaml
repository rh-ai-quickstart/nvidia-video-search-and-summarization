# values-openshift.yaml — OpenShift overlay for the VSS Blueprint.
#
# Usage:
#   helm install vss ./nvidia-blueprint-vss-2.4.1.tgz \
#     -f values-openshift.yaml \
#     --set nvcf.dockerRegSecrets[0].password=$NGC_API_KEY \
#     --set nvcf.additionalSecrets[0].stringData.value=$NGC_API_KEY \
#     --set nvcf.additionalSecrets[1].stringData.value=$HF_TOKEN \
#     -n vss
#
# This file enables OpenShift-specific resources (Route, SCC, ServiceAccount,
# credential Secrets) and switches from subchart Deployments to NIM Operator
# managed services or vLLM via RHOAI's KServe platform. Cluster-specific
# values (tolerations, storageClass, NGC keys) should be passed via --set
# at install time.

# ---------------------------------------------------------------------------
# NGC and HF secrets — uses NVIDIA's built-in nvcf mechanism
# (templates/nvcf_secrets.yaml)
# ---------------------------------------------------------------------------
nvcf:
  dockerRegSecrets:
    - name: ngc-docker-reg-secret
      username: "$oauthtoken"
      password: ""   # set via --set nvcf.dockerRegSecrets[0].password=$NGC_API_KEY
  additionalSecrets:
    - name: ngc-api-key-secret
      stringData:
        key: NGC_API_KEY
        value: ""    # set via --set nvcf.additionalSecrets[0].stringData.value=$NGC_API_KEY
    - name: hf-token-secret
      stringData:
        key: HF_TOKEN
        value: ""    # set via --set nvcf.additionalSecrets[1].stringData.value=$HF_TOKEN

# ---------------------------------------------------------------------------
# OpenShift features
# ---------------------------------------------------------------------------
openshift:
  enabled: true
  route:
    enabled: true
    host: ""
    tls:
      termination: edge
      insecureEdgeTerminationPolicy: Redirect
  # Grants the anyuid SCC to app service accounts (needed by arango-db,
  # milvus-minio which run as root).
  scc:
    create: true
  # Service credential secrets (arango, minio, neo4j)
  # Defaults inherited from base chart — override for production via --set
  secrets:
    create: true

# ---------------------------------------------------------------------------
# Global environment overrides
# ---------------------------------------------------------------------------
global:
  ngcImagePullSecretName: ngc-docker-reg-secret
  # ucfGlobalEnv appends env vars to all pods
  ucfGlobalEnv:
  - name: LLM_MODEL
    value: meta/llama-3.1-8b-instruct        # chart default: meta/llama-3.1-70b-instruct

# ---------------------------------------------------------------------------
# VSS application overrides
# ---------------------------------------------------------------------------
vss:
  tolerations:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
    # Add cluster-specific tolerations as needed:
    # - key: <your-gpu-taint-key>
    #   operator: Equal
    #   value: "true"
    #   effect: NoSchedule
  # GPU count — 1 for Llama 8B
  resources:
    limits:
      nvidia.com/gpu: 1

# ---------------------------------------------------------------------------
# Disable subchart Deployments — NIM Operator manages the NIM lifecycle.
# ---------------------------------------------------------------------------
nim-llm:
  enabled: false

nemo-embedding:
  enabled: false

nemo-rerank:
  enabled: false

# ---------------------------------------------------------------------------
# NIM Operator integration — each NIM gets a NIMCache + NIMService pair.
# The NIM Operator handles model downloading, caching, and GPU scheduling.
# Requires: NIM Operator installed, NGC image-pull and API secrets in namespace.
# ---------------------------------------------------------------------------
nimOperator:
  nim-llm:
    enabled: true
    replicas: 1
    service:
      name: "llm-nim-svc"
    image:
      repository: nvcr.io/nim/meta/llama-3.1-8b-instruct
      tag: "latest"
      pullPolicy: Always
    resources:
      limits:
        nvidia.com/gpu: 1
      requests:
        nvidia.com/gpu: 1
    storage:
      pvc:
        create: true
        size: "100Gi"
        volumeAccessMode: ReadWriteOnce
        storageClass: ""
    nodeSelector: {}
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      # Add cluster-specific tolerations as needed:
      # - key: <your-gpu-taint-key>
      #   operator: Equal
      #   value: "true"
      #   effect: NoSchedule
    env:
      - name: NIM_HTTP_API_PORT
        value: "8000"
      - name: TOKENIZERS_PARALLELISM
        value: "false"
    expose:
      service:
        name: http
        type: ClusterIP
        port: 8000
    startupProbe:
      enabled: true
      probe:
        httpGet:
          path: /v1/health/ready
          port: 8000
        initialDelaySeconds: 120
        periodSeconds: 30
        failureThreshold: 240

  nemo-embedding:
    enabled: true
    replicas: 1
    service:
      name: "nemo-embedding-embedding-deployment-embedding-service"
    image:
      repository: nvcr.io/nim/nvidia/llama-3.2-nv-embedqa-1b-v2
      tag: "1.9.0"
      pullPolicy: Always
    resources:
      limits:
        nvidia.com/gpu: 1
      requests:
        nvidia.com/gpu: 1
    storage:
      pvc:
        create: true
        size: "50Gi"
        volumeAccessMode: ReadWriteOnce
        storageClass: ""
    nodeSelector: {}
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      # Add cluster-specific tolerations as needed:
      # - key: <your-gpu-taint-key>
      #   operator: Equal
      #   value: "true"
      #   effect: NoSchedule
    env:
      - name: TOKENIZERS_PARALLELISM
        value: "false"
    expose:
      service:
        name: http
        type: ClusterIP
        port: 8000
    startupProbe:
      enabled: true
      probe:
        httpGet:
          path: /v1/health/ready
          port: 8000
        initialDelaySeconds: 60
        periodSeconds: 30
        failureThreshold: 120

  nemo-rerank:
    enabled: true
    replicas: 1
    service:
      name: "nemo-rerank-ranking-deployment-ranking-service"
    image:
      repository: nvcr.io/nim/nvidia/llama-3.2-nv-rerankqa-1b-v2
      tag: "1.7.0"
      pullPolicy: Always
    resources:
      limits:
        nvidia.com/gpu: 1
      requests:
        nvidia.com/gpu: 1
    storage:
      pvc:
        create: true
        size: "50Gi"
        volumeAccessMode: ReadWriteOnce
        storageClass: ""
    nodeSelector: {}
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
      # Add cluster-specific tolerations as needed:
      # - key: <your-gpu-taint-key>
      #   operator: Equal
      #   value: "true"
      #   effect: NoSchedule
    env:
      - name: TOKENIZERS_PARALLELISM
        value: "false"
    expose:
      service:
        name: http
        type: ClusterIP
        port: 8000
    startupProbe:
      enabled: true
      probe:
        httpGet:
          path: /v1/health/ready
          port: 8000
        initialDelaySeconds: 60
        periodSeconds: 30
        failureThreshold: 120

# ---------------------------------------------------------------------------
# vLLM deployment — serves NVIDIA models via RHOAI's KServe platform using
# open weights from HuggingFace.
# To use: enable vllm models and disable nimOperator.
# ---------------------------------------------------------------------------
vllm:
  servingRuntime:
    name: vllm-serving-runtime
    image:
      repository: vllm/vllm-openai
      tag: "v0.22.0"
    secrets:
      huggingFaceToken: "huggingface-secret"

  nim-llm:
    enabled: false
    replicas: 1
    service:
      name: "llm-nim-svc"
    model:
      name: "meta-llama/Llama-3.1-8B-Instruct"
      servedName: "meta/llama-3.1-8b-instruct"
      maxModelLen: ""
    resources:
      limits:
        nvidia.com/gpu: 1
        memory: "32Gi"
        cpu: "4"
      requests:
        nvidia.com/gpu: 1
        memory: "16Gi"
        cpu: "2"
    trustRemoteCode: false
    extraArgs: []
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule

  nemo-embedding:
    enabled: false
    replicas: 1
    service:
      name: "nemo-embedding-embedding-deployment-embedding-service"
    model:
      name: "nvidia/llama-3.2-nv-embedqa-1b-v2"
      servedName: "nvidia/llama-3.2-nv-embedqa-1b-v2"
      task: ""
    resources:
      limits:
        nvidia.com/gpu: 1
        memory: "16Gi"
        cpu: "4"
      requests:
        nvidia.com/gpu: 1
        memory: "8Gi"
        cpu: "2"
    trustRemoteCode: true
    extraArgs: []
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule

  nemo-rerank:
    enabled: false
    replicas: 1
    service:
      name: "nemo-rerank-ranking-deployment-ranking-service"
    model:
      name: "nvidia/llama-3.2-nv-rerankqa-1b-v2"
      servedName: "nvidia/llama-3.2-nv-rerankqa-1b-v2"
      task: ""
    resources:
      limits:
        nvidia.com/gpu: 1
        memory: "16Gi"
        cpu: "4"
      requests:
        nvidia.com/gpu: 1
        memory: "8Gi"
        cpu: "2"
    trustRemoteCode: true
    extraArgs: []
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
