apiVersion: v2
name: vss
description: "VSS stack - Helm chart for developer profiles - LVS (Long Video Summarization)"
type: application
version: 3.2.0
appVersion: "1.0"
dependencies:
  - name: infra
    version: 3.2.0
    repository: "file://../../services/infra"
    condition: infra.enabled
  - name: vios
    version: 3.2.0
    repository: "file://../../services/vios"
    condition: vios.enabled
  - name: agent
    version: 3.2.0
    repository: "file://../../services/agent"
    condition: agent.enabled
  - name: vss-agent-ui
    version: 3.2.0
    repository: "file://../../services/ui"
    condition: vss-agent-ui.enabled
  - name: nims
    version: 3.2.0
    repository: "file://../../services/nims"
    condition: nims.enabled
  - name: vss-summarization
    version: 3.2.0
    repository: "file://../../services/video-summarization"
    condition: vss-summarization.enabled
  - name: rtvi
    version: 3.2.0
    repository: "file://../../services/rtvi"
    condition: rtvi.enabled
  # Optional HAProxy Kubernetes Ingress controller was previously vendored here; it pulled
  # https://haproxytech.github.io/helm-charts on every `helm dependency build`. Install the
  # controller cluster-wide instead (see README). Re-enable as a dependency if you need it back:
  # - name: kubernetes-ingress
  #   alias: haproxyingress
  #   version: "1.49.0"
  #   repository: "https://haproxytech.github.io/helm-charts"
  #   condition: haproxyingress.enabled
maintainers: []
