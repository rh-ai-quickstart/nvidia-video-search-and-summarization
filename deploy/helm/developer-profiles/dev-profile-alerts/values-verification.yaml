# Alerts profile — verification mode (MODE=2d_cv)
# Single-file install: helm upgrade --install vss-alerts . -f values-verification.yaml -n vss-alerts --create-namespace
#
# Before install: set ngc.apiKey, global.storageClass, and global.externalHost (+ optional externalScheme/externalPort).
# Replace EXTERNAL_HOST / EXTERNAL_PORT placeholders. Leave global.kibanaPublicUrl empty to auto-derive http(s)://kibana.<base> from externalHost (or set an explicit URL).
# Verification stack defaults live in chart values.yaml.

profile: alerts
mode: verification
vlmName: "nim_nvidia_cosmos-reason2-8b_hf-1208"

ngc:
  createSecrets: true
  apiKey: ""

global:
  # Repeat with override files so nested NIM subcharts still see false (same pattern as chart values.yaml + global).
  useReleaseNamePrefix: false
  storageClass: "" # e.g. oci-bv-high, gp3, standard, local-path
  externalScheme: "http" # http or https
  externalHost: "EXTERNAL_HOST" # e.g. vss-alerts.140.238.75.84.nip.io
  externalPort: "" # Default 80 (http) / 443 (https): use "" — chart omits :port in URLs. Non-default port only: e.g. "8080", "8443".
  kibanaPublicUrl: ""
  llmBaseUrl: ""
  vlmBaseUrl: ""
  llmName: "nvidia/nvidia-nemotron-nano-9b-v2"
  vlmName: "nvidia/cosmos-reason2-8b"

# Shared umbrella helm/services/nims — override gpuType here (see dev-profile-alerts/values.yaml for full nims.* defaults).
nims:
  enabled: true
  gpuType: RTXPRO6000BW

# VIOS umbrella (../../services/vios): parent Chart.yaml uses condition: vios.enabled — keep true here or in values.yaml or the whole VST stack is skipped.
vios:
  enabled: true

# Verification: vss-rtvi-vlm off; RTVI_VLM_BASE_URL follows VLM NIM (same as legacy working pod), not the rtvi-vlm microservice.
agent:
  vss-agent:
    rtviVlmEnabled: true
    cosmosEmbedEnabled: false
    vlmName: "nim_nvidia_cosmos-reason2-8b_hf-1208"

vssIngress:
  enabled: true
  ingressClassName: haproxy
  host: ""
  vssUiPort: 3000
  vssAgentPort: 8000
  vstIngressPort: 30888
  videoAnalyticsApiPort: 8081
  alertBridgePort: 9080
  kibanaPort: 5601
  phoenixPort: 6006
  streamerPort: 31000

rtvi:
  vss-rtvi-vlm:
    enabled: true
    useSharedNim: false
    kafkaBootstrapServers: ""
    redisHost: ""
    env:
      - name: OPENAI_API_KEY
        value: "NOAPIKEYSET"
      - name: OPENAI_API_VERSION
        value: ""
      - name: NVIDIA_API_KEY
        value: "NOAPIKEYSET"
      - name: NVIDIA_VISIBLE_DEVICES
        value: "all"
      - name: VLM_MODEL_TO_USE
        value: "cosmos-reason2"
      - name: KAFKA_ENABLED
        value: "true"
      # Match Compose: docker-compose-out-alert-realtime.yaml (mdx-vlm, mdx-vlm-incidents)
      - name: KAFKA_TOPIC
        value: "mdx-vlm"
      - name: KAFKA_INCIDENT_TOPIC
        value: "mdx-vlm-incidents"
      - name: ERROR_MESSAGE_TOPIC
        value: "vision-llm-errors"
      - name: LOG_LEVEL
        value: "INFO"
      - name: ENABLE_OTEL_MONITORING
        value: "false"
      - name: ENABLE_REDIS_ERROR_MESSAGES
        value: "false"
      - name: OTEL_EXPORTER_OTLP_ENDPOINT
        value: "http://otel-collector:4318"
      - name: OTEL_METRIC_EXPORT_INTERVAL
        value: "60000"
      - name: OTEL_RESOURCE_ATTRIBUTES
        value: ""
      - name: OTEL_TRACES_EXPORTER
        value: "otlp"
      - name: NUM_GPUS
        value: "1"
      - name: NUM_VLM_PROCS
        value: ""
      - name: MODEL_IMPLEMENTATION_PATH
        value: ""
      - name: HF_TOKEN
        value: ""
      - name: INSTALL_PROPRIETARY_CODECS
        value: "false"
      - name: FORCE_SW_AV1_DECODER
        value: ""
      - name: RTVI_ADD_TIMESTAMP_TO_VLM_PROMPT
        value: ""
      - name: RTVI_EXTRA_ARGS
        value: ""
      - name: RTVI_RTSP_LATENCY
        value: ""
      - name: RTVI_RTSP_TIMEOUT
        value: ""
      - name: RTVI_RTSP_RECONNECTION_INTERVAL
        value: "5"
      - name: RTVI_RTSP_RECONNECTION_WINDOW
        value: "60"
      - name: RTVI_RTSP_RECONNECTION_MAX_ATTEMPTS
        value: "10"
      - name: VLLM_GPU_MEMORY_UTILIZATION
        value: ""
      - name: VLM_BATCH_SIZE
        value: ""
      # For edge (DGX-SPARK, IGX-THOR, AGX-THOR): dev-profile.sh sets 860, 467, 20. Override when using edge hardware.
      - name: VLM_DEFAULT_NUM_FRAMES_PER_SECOND_OR_FIXED_FRAMES_CHUNK
        value: "1"
      - name: VLM_INPUT_WIDTH
        value: ""
      - name: VLM_INPUT_HEIGHT
        value: ""
      - name: VLM_SYSTEM_PROMPT
        value: ""
      - name: VSS_NUM_GPUS_PER_VLM_PROC
        value: ""
      - name: VSS_SKIP_INPUT_MEDIA_VERIFICATION
        value: ""
      # Enable native audio for Omni models (replaces ENABLE_AUDIO); disables Riva ASR.
      - name: VLM_MODEL_SUPPORTS_AUDIO
        value: "false"
      # Required for Nemotron Nano Omni models.
      - name: VLM_TRUST_REMOTE_CODE
        value: "false"
      # EVS pruning rate 0.0-1.0.
      - name: VLM_VIDEO_PRUNING_RATE
        value: "0.0"
        
