enabled: false

image:
  repository: nvcr.io/nvidia/vss-core/vss-video-analytics-ui
  tag: "3.2.0"
  pullPolicy: IfNotPresent

replicas: 1

appName: its

service:
  type: ClusterIP
  port: 3002

googleMapsApiKey: ""

# UI config mounted as default-ui-config.json
uiConfig: |
  {
    "debugAnomaly": false,
    "uiDelaySeconds": 20,
    "docType": "uiConfig",
    "alertQueryDurationInHours": 2,
    "alertListLength": 20,
    "apiRefreshIntervalSeconds": 2,
    "intersectionInactiveInSec": 60,
    "defaultCorridor": "Montague",
    "mapOptions": {
      "map": "Google",
      "city": {
        "zoom": { "default": 14, "min": 13, "max": 15 },
        "mapType": { "showControl": true, "id": "roadmap" }
      },
      "intersection": {
        "zoom": { "default": 18, "min": 18, "max": 20 },
        "mapType": { "showControl": true, "id": "roadmap" }
      }
    }
  }

env: []

resources: {}
nodeSelector: {}
tolerations: []

global:
  imagePullSecrets: []
  externalHost: ""
  externalScheme: "http"
