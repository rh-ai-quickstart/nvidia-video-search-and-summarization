enabled: false
global: {}

image:
  repository: nvcr.io/nvidia/vss-core/vss-vios-nvstreamer
  tag: "3.2.0"
  pullPolicy: IfNotPresent
replicas: 1

# K8s service addresses (default: release-based). Override if services are in another namespace.
kafkaServerAddress: ""   # default: kafka-kafka:9092 (<release>-kafka-kafka:9092 if global.useReleaseNamePrefix)
redisServerAddress: ""   # default: <release>-redis:6379 (host:port for redis_server_env_var or direct address)
videoMetadataServerUrl: ""   # default: http://<release>-elasticsearch:9200/mdx-raw*

env:
  ADAPTOR: "streamer"
  HTTP_PORT: "31000"
  NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES: "true"

service:
  port: 31000
  type: ClusterIP

# Run as root (0:0) to match Compose user
securityContext:
  runAsUser: 0
  runAsGroup: 0

# Use emptyDir for streamer_videos and vst_data (no host path)
resources: {}
nodeSelector: {}
tolerations: []
