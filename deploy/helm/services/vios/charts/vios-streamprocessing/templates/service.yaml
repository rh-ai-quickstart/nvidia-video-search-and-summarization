{{- if .Values.enabled }}
# Headless service for SDRC discovery (k8sHeadlessBaseDomain). Selects Deployment pods; name must match SDRC config k8sHeadlessBaseDomain for vios.
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vss-vios-streamprocessing.headlessServiceName" . }}
  labels:
    app.kubernetes.io/name: vss-vios-streamprocessing
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: vss-vios-streamprocessing
    app.kubernetes.io/instance: {{ .Release.Name }}
---
# ClusterIP service for clients (vss-vios-ingress, vss-vios-sensor, SDR provisioning_address). Expose RTSP port so vss-rtvi-vlm can connect to rtsp://<svc>:30554/live/<uuid>.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vss-vios-streamprocessing.fullname" . }}
  labels:
    app.kubernetes.io/name: vss-vios-streamprocessing
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.rtspPort | default 30554 }}
      targetPort: {{ .Values.service.rtspPort | default 30554 }}
      protocol: TCP
      name: rtsp
  selector:
    app.kubernetes.io/name: vss-vios-streamprocessing
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
