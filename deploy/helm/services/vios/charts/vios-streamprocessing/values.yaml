enabled: false
global: {}
image:
  repository: nvcr.io/nvidia/vss-core/vss-vios-streamprocessing
  tag: "3.2.0"
  pullPolicy: IfNotPresent
replicas: 1
# When true: create StatefulSet named vss-vios-streamprocessing (required for SDR). When false: create Deployment (vss-alerts-vss-vios-streamprocessing).
# SDR looks for a StatefulSet with metadata.name == WDM_WL_OBJECT_NAME ("vss-vios-streamprocessing"); it does not support Deployment.
useStatefulSet: true
# Headless service name for SDR discovery. When useSdrEnvoyStyleHeadless: <Release>-streamprocessing-ms-headless; else if headlessServiceName set use it; else <fullname>-headless (e.g. vss-vios-streamprocessing-headless).
useSdrEnvoyStyleHeadless: false
headlessServiceName: ""
service:
  port: 30001
  type: ClusterIP
  # RTSP server port (live streams). Service exposes this so vss-rtvi-vlm (or other in-cluster clients) can connect to rtsp://<release>-vss-vios-streamprocessing:30554/live/<uuid>.
  rtspPort: 30554
# Compose parity: entrypoint, healthcheck, env and volumes
command: ["/bin/bash", "-c"]
args: ["if [ \"$VST_INSTALL_ADDITIONAL_PACKAGES\" = \"true\" ]; then /home/vst/vst_release/tools/user_additional_install.sh; fi && exec /home/vst/vst_release/launch_vst"]
# Compose healthcheck: tcp 30001; timeout 3s, interval 15s, retries 30, start_period 20s
livenessProbe:
  tcpSocket:
    port: 30001
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 30
readinessProbe:
  tcpSocket:
    port: 30001
  initialDelaySeconds: 20
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 30
sensorModuleEndpoint: ""
vstIngressEndpoint: ""   # default: <Release>-vss-vios-ingress:30888/vst (host:port/path, no scheme). When global.vlmBaseUrl and global.externalHost are set, defaults to <externalHost>[:externalPort]/vst so incident URLs work for remote VLM. Override explicitly if needed.
# Redis: used in vst_config.json notifications.redis_server_env_var. Default "" means use Release.Name (e.g. vss-redis:6379).
redisServerAddress: ""
# Kafka / video metadata / cloud storage / MQTT: vst_config.json placeholders. Empty = release-based or Compose default.
kafkaServerAddress: ""
videoMetadataServerUrl: ""
cloudStorageEndpoint: ""
mqttBrokerAddress: ""
# Centralized DB: host/port from template (Release-vss-vios-postgres:5432). Password from postgres-cm unless overridden.
# Override for external DB: centralizedDbHost, centralizedDbPort, centralizedDbPassword.
centralizedDbHost: ""
centralizedDbPort: ""
centralizedDbPassword: ""   # leave empty to use postgres-cm; set for external DB
env:
  - name: HOST_IP
    value: "0.0.0.0"
  # Set to "true" to run user_additional_install.sh at startup (installs e.g. libav/ffmpeg for upload media info). Script must exist in image at /home/vst/vst_release/tools/user_additional_install.sh.
  - name: VST_INSTALL_ADDITIONAL_PACKAGES
    value: "true"
  - name: CONTAINER_NAME
    value: vss-vios-streamprocessing
  - name: ADAPTOR
    value: vst_rtsp
  - name: HTTP_PORT
    value: "30001"
  - name: RTSP_SERVER_PORT
    value: "30554"
  - name: CENTRALIZE_DB_NAME
    value: nvcentralizedb
  - name: CENTRALIZE_DB_USERNAME
    value: vst
  # Compose parity: services/vios/sdr/streamprocessing/docker-compose.yaml hardcodes ENABLE_AGING_POLICY=true on every streamprocessing service.
  - name: ENABLE_AGING_POLICY
    value: "true"
  # Compose parity: services/vios/vst.env sets VST_VIDEO_STORAGE_SIZE_MB=100000 (in MB). Caps on-disk video storage before aging policy reclaims.
  - name: VST_VIDEO_STORAGE_SIZE_MB
    value: "100000"
  # SENSOR_MODULE_ENDPOINT and VST_INGRESS_ENDPOINT are set by the template from sensorModuleEndpoint / vstIngressEndpoint (with release-based defaults)

# Persistence: compose mounts VST_DATA_PATH, VST_VIDEO_STORAGE_PATH, CLIP_STORAGE_PATH. Optional PVCs for vst-data, vst-video, streamer-videos. temp-files stays EmptyDir.
# When existingClaim is empty, defaults are <Helm release>-vst-data / -vst-video / -vst-streamer-videos (top-level release; matches vios templates/vst-storage-pvc.yaml when vios.vstStorage.createSharedPvcs is true).
# To share with vss-vios-sensor, set the same existingClaim in both charts. Single-node: ReadWriteOnce is enough; use ReadWriteMany only if pods can run on different nodes.
persistence:
  vstData:
    enabled: false
    create: true
    existingClaim: ""
    size: 10Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  vstVideo:
    enabled: false
    create: true
    existingClaim: ""
    size: 20Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  streamerVideos:
    enabled: false
    create: true
    existingClaim: ""
    size: 20Gi
    storageClass: ""
    accessMode: ReadWriteOnce
  # temp-files: always EmptyDir (ephemeral scratch)
# When using PVC, the app (running as user vst) must be able to write. runAsUser/fsGroup ensure volume is writable; initContainer chowns when needed.
securityContext:
  runAsUser: 0
  runAsGroup: 0
  fsGroup: 0

# Request 1 GPU for HW encode/decode (matches Docker runtime: nvidia). Set to {} to run without GPU (software mode). Requires NVIDIA device plugin on nodes.
resources:
  limits:
    nvidia.com/gpu: 1
  requests:
    nvidia.com/gpu: 1
nodeSelector: {}
tolerations: []
