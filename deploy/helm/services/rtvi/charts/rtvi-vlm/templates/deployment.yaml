{{- if .Values.enabled }}
{{- $g := .Values.global | default dict }}
{{- $pfx := default false (coalesce .Values.useReleaseNamePrefix (index $g "useReleaseNamePrefix")) }}
{{- $kafkaH := ternary (printf "%s-kafka-kafka" .Release.Name) "kafka-kafka" $pfx }}
{{- $redisH := ternary (printf "%s-redis" .Release.Name) "redis" $pfx }}
{{- $kafkaBs := .Values.kafkaBootstrapServers | default (printf "%s:9092" $kafkaH) }}
{{- $wfk := .Values.waitForKafka | default dict }}
{{- $wfkImg := $wfk.image | default dict }}
{{- $wfkRepo := $wfkImg.repository | default "confluentinc/cp-kafka" }}
{{- $wfkTag := $wfkImg.tag | default "8.2.0" }}
{{- $wfkTopics := $wfk.topics | default (list "mdx-vlm" "mdx-vlm-incidents") }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vss-rtvi-vlm.fullname" . }}
  labels:
    app.kubernetes.io/name: vss-rtvi-vlm
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: vss-rtvi-vlm
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vss-rtvi-vlm
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or (not (hasKey $wfk "enabled")) $wfk.enabled }}
      initContainers:
        - name: wait-for-kafka
          image: {{ printf "%s:%s" $wfkRepo $wfkTag }}
          imagePullPolicy: {{ $wfk.imagePullPolicy | default "IfNotPresent" }}
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ $kafkaBs | quote }}
            - name: WAIT_TIMEOUT_SECONDS
              value: {{ $wfk.timeoutSeconds | default 1200 | quote }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              BS="${KAFKA_BOOTSTRAP_SERVERS}"
              MAX="${WAIT_TIMEOUT_SECONDS:-1200}"
              echo "wait-for-kafka: bootstrap ${BS} (timeout ${MAX}s)"
              ELAPSED=0
              while [ "${ELAPSED}" -lt "${MAX}" ]; do
                if kafka-broker-api-versions --bootstrap-server "${BS}" >/dev/null 2>&1; then
                  echo "wait-for-kafka: broker is up"
                  break
                fi
                echo "wait-for-kafka: broker not ready, sleeping 2s (${ELAPSED}s elapsed)"
                sleep 2
                ELAPSED=$((ELAPSED + 2))
              done
              if ! kafka-broker-api-versions --bootstrap-server "${BS}" >/dev/null 2>&1; then
                echo "wait-for-kafka: timeout waiting for Kafka broker"
                exit 1
              fi
              {{- range $wfkTopics }}
              echo "wait-for-kafka: waiting for topic {{ . }}"
              ELAPSED=0
              while [ "${ELAPSED}" -lt "${MAX}" ]; do
                if kafka-topics --bootstrap-server "${BS}" --list 2>/dev/null | grep -Fxq "{{ . }}"; then
                  echo "wait-for-kafka: topic {{ . }} exists"
                  break
                fi
                echo "wait-for-kafka: topic {{ . }} missing, sleeping 2s (${ELAPSED}s elapsed)"
                sleep 2
                ELAPSED=$((ELAPSED + 2))
              done
              if ! kafka-topics --bootstrap-server "${BS}" --list 2>/dev/null | grep -Fxq "{{ . }}"; then
                echo "wait-for-kafka: timeout waiting for topic {{ . }}"
                exit 1
              fi
              {{- end }}
              echo "wait-for-kafka: done"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      {{- end }}
      containers:
        - name: vss-rtvi-vlm
          image: {{ include "vss-rtvi-vlm.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ $kafkaBs | quote }}
            - name: REDIS_HOST
              value: {{ .Values.redisHost | default $redisH | quote }}
            - name: REDIS_PORT
              value: {{ .Values.redisPort | quote }}
            - name: REDIS_DB
              value: {{ .Values.redisDb | quote }}
            {{- if .Values.redisPassword }}
            - name: REDIS_PASSWORD
              value: {{ .Values.redisPassword | quote }}
            {{- end }}
            {{- if .Values.useSharedNim }}
            {{- /* vss-rtvi-vlm.nims.enabled mirrors root nims.enabled in values files; --set nims.enabled=false does NOT update it. Use remote VIA_VLM when vss-rtvi-vlm.nims.enabled is false OR global.vlmBaseUrl is set (vss-agent-style: explicit remote URL wins). */}}
            {{- $nims := .Values.nims | default dict }}
            {{- $nimsEnabled := true }}
            {{- if hasKey $nims "enabled" }}{{- $nimsEnabled = index $nims "enabled" }}{{- end }}
            {{- /* Prefer non-empty vss-rtvi-vlm.vlmBaseUrl; do not use coalesce — empty string would hide global.vlmBaseUrl. */}}
            {{- $subVlm := trim (default "" .Values.vlmBaseUrl) }}
            {{- $globVlm := trim (default "" (index $g "vlmBaseUrl")) }}
            {{- $vlmBase := $subVlm | default $globVlm }}
            {{- $slug := trim (default "nvidia-cosmos-reason2-8b" .Values.vlmNameSlug) }}
            {{- $nimHost := ternary (printf "%s-%s" .Release.Name $slug) $slug $pfx }}
            {{- $localSvc := coalesce .Values.sharedNimService $nimHost }}
            {{- $inClusterEp := printf "http://%s:%s/v1" $localSvc .Values.sharedNimPort }}
            {{- $useRemote := or (not $nimsEnabled) (ne $vlmBase "") }}
            {{- $viaEp := $inClusterEp }}
            {{- /* NGC model id (e.g. nvidia/cosmos-reason2-8b). Do not derive from vlmNameSlug (that yields nvidia/nvidia-cosmos-reason2-8b). */}}
            {{- $vlmModel := trim (default "" (coalesce .Values.vlmName (index $g "vlmName") "nvidia/cosmos-reason2-8b")) }}
            {{- $deployName := .Values.viaVlmOpenAiModelDeploymentName | default $vlmModel }}
            {{- if $useRemote }}
            {{- if ne $vlmBase "" }}
            {{- $vb := trimSuffix "/" (trim $vlmBase) }}
            {{- if hasSuffix "/v1" $vb }}
            {{- $viaEp = $vb }}
            {{- else }}
            {{- $viaEp = print $vb "/v1" }}
            {{- end }}
            {{- end }}
            {{- else }}
            {{- $viaEp = $inClusterEp }}
            {{- end }}
            - name: MODEL_PATH
              value: "none"
            - name: VIA_VLM_ENDPOINT
              value: {{ $viaEp | quote }}
            - name: VIA_VLM_OPENAI_MODEL_DEPLOYMENT_NAME
              value: {{ $deployName | quote }}
            {{- else }}
            - name: MODEL_PATH
              value: {{ .Values.modelPath | default "ngc:nim/nvidia/cosmos-reason2-8b:hf-1208" | quote }}
            {{- end }}
            {{- $ngcSecret := .Values.ngcApiSecret.name | default (index (index .Values.global "ngcApiSecret") "name") | default "ngc-api" }}
            {{- $ngcKey := .Values.ngcApiSecret.key | default (index (index .Values.global "ngcApiSecret") "key") | default "NGC_API_KEY" }}
            - name: NGC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $ngcSecret }}
                  key: {{ $ngcKey }}
            - name: VIA_VLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $ngcSecret }}
                  key: {{ $ngcKey }}
            {{- $hfTok := .Values.hfTokenSecret | default dict }}
            {{- $hfTokName := trim (default "" $hfTok.name) }}
            {{- if ne $hfTokName "" }}
            {{- $hfTokKey := $hfTok.key | default "HF_TOKEN" }}
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $hfTokName }}
                  key: {{ $hfTokKey }}
            {{- end }}
            {{- range .Values.env }}
            {{- if or (eq $hfTokName "") (ne .name "HF_TOKEN") }}
            - name: {{ .name }}
              value: {{ .value | quote }}
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          volumeMounts:
            - name: clip-storage
              mountPath: /home/vst/vst_release/streamer_videos
            - name: shm
              mountPath: /dev/shm
          # Holds liveness/readiness until first success; if the app never becomes ready, ~15 min before restart (31 failures @ 30s).
          startupProbe:
            httpGet:
              path: /v1/health/ready
              port: http
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 31
          livenessProbe:
            httpGet:
              path: /v1/health/ready
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /v1/health/ready
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: clip-storage
          emptyDir: {}
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: {{ .Values.shmSize }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
