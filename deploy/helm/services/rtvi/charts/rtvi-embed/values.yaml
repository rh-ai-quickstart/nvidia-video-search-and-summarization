imagePullSecrets:
  - name: ngc-docker-reg-secret

replicas: 1
image:
  repository: nvcr.io/nvidia/vss-core/vss-rt-embed
  tag: "3.2.0"
  pullPolicy: IfNotPresent
port: 8000
service:
  type: ClusterIP

# Pin a specific GPU device id (e.g. "1") to set NVIDIA_VISIBLE_DEVICES on
# the container. Leave empty to let the container see whatever GPUs the
# pod's resource request exposed (runtime default).
gpuDeviceId: ""

# Stream-affinity routing via HAProxy consistent-hash on an HTTP header.
# When enabled, the rendered Service carries `haproxy.org/*` annotations
# that ask a HAProxy Ingress controller to consistent-hash every request
# with the same hashHeader value to the same vss-rtvi-embed replica
# (Karger's consistent hash). Required for replica count > 1 so the
# Cosmos-Embed1 model session stays coherent for the stream.
#
# IMPORTANT — these annotations are only honored when traffic actually
# flows through HAProxy Ingress. In the default chart deployment the
# vss-agent connects to `vss-rtvi-embed:8000` (ClusterIP), so kube-proxy
# load-balances directly and these annotations are inert. To make them
# functional you need to (a) install the HAProxy Technologies
# kubernetes-ingress controller, (b) add an Ingress that routes to this
# Service, and (c) repoint the agent's RTVI_EMBED_BASE_URL at the ingress
# endpoint. This toggle only emits the annotations; it does not create
# the Ingress.
streamAffinity:
  enabled: true
  hashHeader: x-stream-id
dshm:
  enabled: true
  sizeLimit: "16Gi"
clearCachedEnginesOnStart: false
kafkaEnabled: true
kafkaTopic: "mdx-embed"
kafkaBootstrapServers: ""
# Wait for Kafka before starting the workload (busybox nc). Set enabled: false for standalone
# installs where no broker exists yet.
waitForKafka:
  enabled: true
redisHost: ""
redisPort: "6379"
modelImplementationPath: "/opt/nvidia/rtvi/rtvi/models/custom/samples/cosmos-embed1"
modelPath: "git:https://huggingface.co/nvidia/Cosmos-Embed1-448p"
modelRepositoryScriptPath: "/opt/nvidia/rtvi/rtvi/models/custom/samples/cosmos-embed1/create_triton_model_repo.py"
logLevel: "INFO"
enableOtelMonitoring: false
enableRedisErrorMessages: false
enableRequestProfiling: false
otelTracesExporter: "otlp"
otelExporterOtlpEndpoint: "http://otel-collector:4318"
otelMetricExportInterval: "60000"
otelResourceAttributes: ""
forceSwAv1Decoder: ""
numGpus: ""
numVlmProcs: ""
vlmBatchSize: "8"
rtspTimeout: ""
rtspLatency: ""
installProprietaryCodes: false
rtspReconnectionInterval: "5"
rtspReconnectionMaxAttempts: "10"
rtspReconnectionWindow: "60"
startupProbe:
  initialDelaySeconds: 240
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 40
livenessProbe:
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3
readinessProbe:
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3
ngcApiKey: ""
nvidiaApiKey: ""
hfToken: ""
# Optional: pull HF token from an existing Kubernetes secret instead of plain value.
# If set, HF_TOKEN uses secretKeyRef and hfToken is ignored.
hfTokenSecret:
  name: ""
  key: "HF_TOKEN"
resources:
  limits:
    nvidia.com/gpu: 1
podSecurityContext:
  fsGroup: 1001
securityContext:
  runAsUser: 1001
  runAsGroup: 1001
persistence:
  storageClass: ""
  ngcModelCache:
    size: 50Gi
  hfCache:
    size: 50Gi
clipStorage:
  enabled: false
  existingClaim: ""
  hostPath: ""
nodeSelector: {}
tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"
