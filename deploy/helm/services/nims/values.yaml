# Default values for the nims umbrella chart.
#
# USAGE – select GPU at install time with a single flag:
#   helm install nims ./nims --set gpuType=H100
#   helm install nims ./nims --set gpuType=L40S
#   helm install nims ./nims --set gpuType=RTXPRO6000BW
#
# The parent chart (nims/templates/nim-env-configmaps.yaml) renders one
# ConfigMap per enabled NIM using the gpuProfiles lookup table below.
# Override-values files are kept as thin convenience wrappers for CI/scripts.

global:
  # NGC API key for model download and NIM authentication
  ngcApiKey: ""
  # Pre-existing pull secret name (auto-created by parent chart or by user)
  pullSecretName: "ngc-nim-docker-reg-secret"
  # Pre-existing API key secret name
  authSecretName: "ngc-nim-api-key-secret"
  # Default storage class used by all NIMCache PVCs (can be overridden per subchart)
  storageClass: ""

# ---------------------------------------------------------------------------
# GPU selection
# Sets which entry in gpuProfiles is used when rendering the nim-env ConfigMaps.
# Valid values: H100 | L40S | RTXPRO6000BW
# ---------------------------------------------------------------------------
gpuType: "H100"

# ---------------------------------------------------------------------------
# GPU profile lookup table
# Each entry contains env vars keyed by NIM alias (nemotron / cosmos).
# Only non-empty values end up in the rendered ConfigMap.
# ---------------------------------------------------------------------------
gpuProfiles:
  # Full-GPU H100: same env key shape as RTXPRO6000BW nemotron (NIMService reads these from *-nim-env).
  H100:
    nemotron:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      NIM_KVCACHE_PERCENT: "0.8"
      NIM_GPU_MEM_FRACTION: "0.8"
      NIM_LOW_MEMORY_MODE: "1"
      NIM_MAX_MODEL_LEN: "128000"
      NIM_MAX_NUM_SEQS: "4"
    cosmos:
      NIM_KVCACHE_PERCENT: "0.7"
      NIM_PASSTHROUGH_ARGS: "--gpu-memory-utilization 0.7"
      NIM_DISABLE_MM_PREPROCESSOR_CACHE: "1"
    cosmos3:
      NIM_KVCACHE_PERCENT: "0.7"
      NIM_GPU_MEMORY_UTILIZATION: "0.7"
      NIM_PASSTHROUGH_ARGS: "--gpu-memory-utilization 0.7"
      NIM_DISABLE_MM_PREPROCESSOR_CACHE: "1"

  L40S:
    nemotron:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      NIM_KVCACHE_PERCENT: "0.8"
      NIM_GPU_MEM_FRACTION: "0.8"
      NIM_MAX_NUM_SEQS: "4"
      NIM_MAX_MODEL_LEN: "128000"
      NIM_LOW_MEMORY_MODE: "1"
    cosmos:
      NIM_KVCACHE_PERCENT: "0.8"
      NIM_PASSTHROUGH_ARGS: "--gpu-memory-utilization 0.8"
      NIM_MAX_MODEL_LEN: "32768"
      NIM_MAX_NUM_SEQS: "4"
      MAX_JOBS: "4"
    cosmos3:
      NIM_KVCACHE_PERCENT: "0.8"
      NIM_GPU_MEMORY_UTILIZATION: "0.8"
      NIM_PASSTHROUGH_ARGS: "--gpu-memory-utilization 0.8"
      NIM_MAX_MODEL_LEN: "32768"
      NIM_MAX_NUM_SEQS: "4"
      MAX_JOBS: "4"

  # Matches live nim-env ConfigMaps when gpuType=RTXPRO6000BW (e.g. vss-summarization namespace).
  RTXPRO6000BW:
    nemotron:
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
      NIM_KVCACHE_PERCENT: "0.4"
      NIM_GPU_MEM_FRACTION: "0.4"
      NIM_LOW_MEMORY_MODE: "1"
      NIM_MAX_MODEL_LEN: "128000"
      NIM_MAX_NUM_SEQS: "4"
    cosmos:
      NIM_KVCACHE_PERCENT: "0.7"
      NIM_PASSTHROUGH_ARGS: "--gpu-memory-utilization 0.7"
      NIM_DISABLE_MM_PREPROCESSOR_CACHE: "1"
    cosmos3:
      NIM_KVCACHE_PERCENT: "0.7"
      NIM_GPU_MEMORY_UTILIZATION: "0.7"
      NIM_PASSTHROUGH_ARGS: "--gpu-memory-utilization 0.7"
      NIM_DISABLE_MM_PREPROCESSOR_CACHE: "1"

# ---------------------------------------------------------------------------
# Nemotron Nano 9B v2 – LLM NIM (alias: nemotron)
# Deploys NIMCache + NIMService via NVIDIA NIM Operator CRDs.
# ---------------------------------------------------------------------------
nemotron:
  enabled: true
  # Override the NIMCache/NIMService resource name (default: nvidia-nemotron-nano-9b-v2, or <release>-nvidia-nemotron-nano-9b-v2 with prefix).
  # Useful for cross-chart references.
  fullnameOverride: ""

  image:
    repository: nvcr.io/nim/nvidia/nvidia-nemotron-nano-9b-v2
    tag: latest
    pullPolicy: IfNotPresent

  replicas: 1

  resources:
    limits:
      nvidia.com/gpu: "1"
    requests:
      nvidia.com/gpu: "1"

  storage:
    pvc:
      # Leave empty to inherit global.storageClass
      storageClass: ""
      size: "50Gi"

  metrics:
    enabled: false

  service:
    type: ClusterIP
    port: 8000

  nodeSelector: {}

  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"

# ---------------------------------------------------------------------------
# Cosmos Reason2 8B – VLM NIM (alias: cosmos)
# Deploys NIMCache + NIMService via NVIDIA NIM Operator CRDs.
# ---------------------------------------------------------------------------
cosmos:
  enabled: false
  # Override the NIMCache/NIMService resource name (default: nvidia-cosmos-reason2-8b, or <release>-nvidia-cosmos-reason2-8b with prefix).
  # Useful for cross-chart references.
  fullnameOverride: ""

  image:
    repository: nvcr.io/nim/nvidia/cosmos-reason2-8b
    tag: "1.6.0"
    pullPolicy: IfNotPresent

  replicas: 1

  # GPU-only defaults. Another profile can add cpu/memory under limits/requests; Helm merges keys
  # into this map (same path: nims.cosmos.resources in the parent values file).
  resources:
    limits:
      nvidia.com/gpu: "1"
    requests:
      nvidia.com/gpu: "1"

  storage:
    pvc:
      # Leave empty to inherit global.storageClass
      storageClass: ""
      size: "200Gi"
    sharedMemorySizeLimit: "32Gi"

  metrics:
    enabled: false

  service:
    type: ClusterIP
    port: 8000

  nodeSelector: {}

  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"
  env:
    CUDA_VISIBLE_DEVICES: "1"
    NIM_KVCACHE_PERCENT: "0.75"
    NIM_PASSTHROUGH_ARGS: "--gpu-memory-utilization 0.75"
    NIM_MAX_MODEL_LEN: "16384"
    NIM_LOW_MEMORY_MODE: "1"
  # Imported from <cosmos-fullname>-nim-env ConfigMap into NIMService.spec.env.
  # Missing keys are ignored (optional: true).
  envConfigMapKeys:
    - NIM_KVCACHE_PERCENT
    - NIM_PASSTHROUGH_ARGS
    - NIM_DISABLE_MM_PREPROCESSOR_CACHE

# ---------------------------------------------------------------------------
# Cosmos3 Reasoner – VLM NIM staging RC (alias: cosmos3)
# Opt-in alternative to cosmos (Cosmos Reason2 8B). NIM_MODEL_SIZE picks the
# nano (default) or super variant baked into the staging container.
# Deploys NIMCache + NIMService via NVIDIA NIM Operator CRDs.
# ---------------------------------------------------------------------------
cosmos3:
  enabled: false
  # Override the NIMCache/NIMService resource name (default: nvidia-cosmos3-reasoner, or <release>-nvidia-cosmos3-reasoner with prefix).
  fullnameOverride: ""

  image:
    repository: nvcr.io/nvstaging/nim/cosmos3-reasoner
    tag: "1.7.1.rc0-51870194"
    pullPolicy: IfNotPresent

  replicas: 1

  resources:
    limits:
      nvidia.com/gpu: "1"
    requests:
      nvidia.com/gpu: "1"

  storage:
    pvc:
      storageClass: ""
      size: "200Gi"
    sharedMemorySizeLimit: "32Gi"

  metrics:
    enabled: false

  service:
    type: ClusterIP
    port: 8000

  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"

  # Selects the staging RC variant: nano (default) or super.
  nimModelSize: "nano"

  # Imported from <cosmos3-fullname>-nim-env ConfigMap into NIMService.spec.env.
  # Missing keys are ignored (optional: true).
  envConfigMapKeys:
    - NIM_KVCACHE_PERCENT
    - NIM_GPU_MEMORY_UTILIZATION
    - NIM_PASSTHROUGH_ARGS
    - NIM_DISABLE_MM_PREPROCESSOR_CACHE
  