enabled: false
global: {}

image:
  repository: nvcr.io/nvstaging/vss-core/sdr-mw-l
  tag: 3.0.0-prd.4
  pullPolicy: IfNotPresent
imagePullSecrets: []

replicas: 1

service:
  controller:
    type: ClusterIP
    port: 5003
    # nodePort: 30010
  sdrcDirectListener:
    type: ClusterIP
    port: 8011
  envoyAdmin:
    type: ClusterIP
    port: 9902

config:
  configMapName: sdrc-config
  key: config.yml
  mountPath: /config.yml
  rolloutVersion: ""

runtimeEnv:
  WDM_WL_REDIS_SERVER: redis
  WDM_WL_REDIS_PORT: "6379"
  OTEL_SDK_DISABLED: "true"
  KUBERNETES_HOST: kubernetes.default.svc
  KUBERNETES_PORT: "443"
  WDM_CONTROLLER_HOST: "127.0.0.1"
  HOST_IP: "127.0.0.1" # TODO
  WDM_CLUSTER_TYPE: "k8s-headless"

serviceAccount:
  create: true
  name: ""

rbac:
  create: true
