# Video-IO KPI Definition
service: Video-IO
schema_version: "0.0.1"

# ---------------------------------------------------------------------------
# Platform configs
# ---------------------------------------------------------------------------
platform_configs:
  - platform:
      gpu: {model: "H100", count: 1}
    config:
      - id: h100-rtsp
        stream_type: "rtsp"
      - id: h100-file
        stream_type: "file"

  - platform:
      gpu: {model: "RTX6000Pro", count: 1}
    config:
      - id: rtx6000pro-rtsp
        stream_type: "rtsp"
      - id: rtx6000pro-file
        stream_type: "file"

  - platform:
      gpu: {model: "Spark", count: 1}
    config:
      - id: spark-rtsp
        stream_type: "rtsp"
      - id: spark-file
        stream_type: "file"

  - platform:
      gpu: {model: "Thor", count: 1}
    config:
      - id: thor-rtsp
        stream_type: "rtsp"
      - id: thor-file
        stream_type: "file"

# ---------------------------------------------------------------------------
# KPIs
# Baseline keys = test_case_id values from vss_perf_vst_adaptor.py
# ---------------------------------------------------------------------------
kpis:
  # -- Primary: Average Latency -----------------------------------------------
  - name: avg_latency
    description: "Average Latency (ms)"
    path: test_cases[*].metrics.latency.avg_ms
    unit: ms
    direction: lower
    aggregation: avg
    dashboard: {chart: primary, trend: true, summary_stat: true}
    thresholds: {warning_percent: 10, critical_percent: 20}
    baselines:
      h100-rtsp:
        video-download_15s_2000ms_without-transcode: 40
        video-download_15s_1000ms_without-transcode: 20
        video-download_15s_500ms_without-transcode: 20
        video-download_15s_200ms_without-transcode: 80
        video-download_30s_1000ms_without-transcode: 30
        video-download_30s_10000ms_without-transcode: 40
        video-download_60s_1000ms_without-transcode: 70
        video-download_60s_10000ms_without-transcode: 70
        video-download_5-concurrent_without-transcode: 70
        video-download_10-concurrent_without-transcode: 150
        video-download_20-concurrent_without-transcode: 260
        video-download_50-concurrent_without-transcode: 790
      h100-file:
        # video-download without-transcode
        video-download_15s_2000ms_without-transcode: 20
        video-download_15s_1000ms_without-transcode: 20
        video-download_15s_500ms_without-transcode: 20
        video-download_15s_200ms_without-transcode: 20
        video-download_30s_1000ms_without-transcode: 20
        video-download_30s_10000ms_without-transcode: 20
        video-download_60s_1000ms_without-transcode: 30
        video-download_60s_10000ms_without-transcode: 30
        # video-download with-transcode
        video-download_15s_2000ms_with-transcode: 550
        video-download_15s_1000ms_with-transcode: 550
        video-download_15s_500ms_with-transcode: 550
        video-download_15s_200ms_with-transcode: 550
        video-download_15s_10000ms_with-transcode: 550
        video-download_30s_1000ms_with-transcode: 810
        video-download_30s_10000ms_with-transcode: 800
        video-download_60s_1000ms_with-transcode: 1050
        video-download_60s_10000ms_with-transcode: 1050
        # picture-api
        picture-api_NA_1000ms_without-overlay: 200
        picture-api_NA_10000ms_without-overlay: 220
        picture-api_NA_1000ms_with-overlay: 230
        picture-api_NA_10000ms_with-overlay: 200
        # concurrent video-download without-transcode
        video-download_5-concurrent_without-transcode: 60
        video-download_10-concurrent_without-transcode: 70
        video-download_20-concurrent_without-transcode: 90
        video-download_50-concurrent_without-transcode: 470
        # concurrent video-download with-transcode
        video-download_5-concurrent_with-transcode: 1490
        video-download_10-concurrent_with-transcode: 3130
        video-download_20-concurrent_with-transcode: 6800
        video-download_50-concurrent_with-transcode: 16930
        # concurrent picture-api without-overlay
        picture-api_5-concurrent_without-overlay: 360
        picture-api_10-concurrent_without-overlay: 1010
        picture-api_20-concurrent_without-overlay: 1970
        picture-api_50-concurrent_without-overlay: 5270
        # concurrent picture-api with-overlay
        picture-api_5-concurrent_with-overlay: 1210
        picture-api_10-concurrent_with-overlay: 1680
        picture-api_20-concurrent_with-overlay: 3380
        picture-api_50-concurrent_with-overlay: 9220

