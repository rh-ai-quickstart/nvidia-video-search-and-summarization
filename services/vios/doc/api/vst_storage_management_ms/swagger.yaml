    TimelineEntry:
      type: object
      required:
        - startTime
        - endTime
      properties:
        startTime:
          type: string
          format: date-time
          description: Start time of the recording segment (ISO 8601 UTC).
          example: '2026-04-20T05:02:22.445Z'
        endTime:
          type: string
          format: date-time
          description: End time of the recording segment (ISO 8601 UTC).
          example: '2026-04-20T05:03:22.445Z'

    StreamTimelinesResponse:
      type: array
      maxItems: 10000
      items:
        $ref: '#/components/schemas/TimelineEntry'
      description: Array of recording timeline segments for a single stream.

    AllStreamTimelinesResponse:
      type: object
      additionalProperties:
        type: array
        items:
          $ref: '#/components/schemas/TimelineEntry'
      description: Object mapping streamId values to their recording timeline segments.

    HelpEntry:
      type: object
      properties:
        endpoint:
          type: string
          pattern: ".*"
          maxLength: 256
          example: "/api/v1/storage/size"
        method:
          type: string
          pattern: ".*"
          maxLength: 256
          example: "GET - To get total used storage size and used storage size for each recorded streams"
      required:
        - endpoint
        - method

    Error:
      required:
        - error_code
        - error_message
      type: object
      properties:
        error_code:
          type: string
          maxLength: 128
          pattern: "^[a-zA-Z0-9_-]+$"
          example: VMSInternalError
        error_message:
          type: string
          maxLength: 128
          pattern: "^[a-zA-Z0-9_-]+$"
          example: VMS internal processing error

    OverlayConfiguration:
      type: object
      description: |
        Unified overlay configuration for visual overlays including bounding boxes, pose, proximity, and safety features.
      properties:
        bbox:
          type: object
          description: Bounding box overlay configuration
          properties:
            showAll:
              type: boolean
              description: Show all detected objects (true) or filter by objectId/classType (false)
              example: true
            objectId:
              type: array
              description: Specific object IDs to show (only when showAll=false)
              items:
                type: integer
              example: [521, 517, 496, 333]
            classType:
              type: array
              description: Object class types to filter (only when showAll=false)
              items:
                type: string
              example: ["Person", "Pallet", "Forklift"]
            showObjId:
              type: boolean
              description: Display object ID as text on bounding box
              example: true
            objIdPosition:
              type: integer
              description: Position of object ID text (0=MIDDLE, 1=TOP_LEFT, 2=TOP_RIGHT, 3=BOTTOM_LEFT, 4=BOTTOM_RIGHT)
              minimum: 0
              maximum: 4
              example: 1
            objIdTextColor:
              type: string
              description: Color of object ID text
              example: "white"
            objIdTextBGColor:
              type: string
              description: Background color for object ID text
              example: "green"
        color:
          type: string
          description: Default overlay color (e.g., green, red, blue, white, yellow)
          example: "green"
        thickness:
          type: integer
          description: Line thickness for overlays
          minimum: 1
          maximum: 10
          example: 5
        debug:
          type: boolean
          description: Enable debug mode for additional information
          example: true
        opacity:
          type: integer
          description: Opacity level (0=transparent, 255=opaque)
          minimum: 0
          maximum: 255
          example: 254
        pose:
          type: boolean
          description: Enable pose detection overlays
          example: false
        framerate:
          type: integer
          description: Frame rate for overlay processing
          example: 15
        proximityClass:
          type: array
          description: Classes to track for proximity detection
          items:
            type: string
          example: ["Person", "Forklift"]
        entrantClass:
          type: array
          description: Classes that can enter safety zones
          items:
            type: string
          example: ["nova_carter", "person"]
        proximityAreaFactor:
          type: number
          description: Scaling factor for proximity areas
          example: 1.3
        proximityAnimation:
          type: string
          description: Animation style for proximity visualization
          example: "ellipseAndLine"
        overlayColorCode:
          type: array
          description: Custom RGBA colors per class type [R, G, B, A] where values are 0-255
          items:
            type: object
            additionalProperties:
              type: array
              items:
                type: integer
                minimum: 0
                maximum: 255
          example:
            - Person: [118, 185, 0, 255]
            - Humanoid: [0, 113, 197, 255]
            - NovaCarter: [250, 194, 0, 255]
            - Transporter: [0, 133, 100, 255]
            - Forklift: [0, 113, 197, 255]
            - Box: [250, 194, 0, 255]
            - Pallet: [93, 22, 130, 255]
            - Crate: [94, 94, 94, 255]
            - proximity_bubble: [0, 255, 0, 75]
            - proximity_bubble_inner: [255, 0, 0, 75]
            - proximity_bubble_outer: [204, 85, 0, 75]
            - proximity_bubble_border: [255, 255, 255, 255]
            - proximity_line: [255, 255, 255, 255]
        needBbox:
          type: boolean
          description: (Deprecated) Use bbox.showAll instead
          example: true
          deprecated: true
        needTripwire:
          type: boolean
          description: (Deprecated) Use tripwire.showAll instead
          example: false
          deprecated: true
        needRoi:
          type: boolean
          description: (Deprecated) Use roi.showAll instead
          example: false
          deprecated: true
        objectId:
          type: array
          description: (Deprecated) Use bbox.objectId instead
          items:
            type: integer
          example: [23, 42]
          deprecated: true
        classType:
          type: array
          description: (Deprecated) Use bbox.classType instead
          items:
            type: string
          example: ["Person"]
          deprecated: true
