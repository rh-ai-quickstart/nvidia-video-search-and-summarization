openapi: 3.0.3
info:
  title: VST Live Stream Service
  description: |
    The Live Stream Service is designed to facilitate the live or real time streaming of sensors. This service encompasses:

    - Live streaming: Live streaming of sensors using WebRTC protocol
    - Listing live streams: The list of available live streams can be queried
    - Snapshop capturing: Ability to capture snapshot or picture of a live stream
    - Live stream monitoring: Real-time status update for the live stream
    - Sub-stream support: A sensor can have a main stream and multiple sub-streams. Streaming of both type of streams is supported.
    - Performance Analytics: Ability to get stats for live stream to measure performance
    - Stream operations: The stream supported various operations like querying the stream to get the current position and metadata of stream, pause and play the live stream etc.

    NOTE: All JSON responses from this service are emitted with HTTP header `Content-Type: text/plain`. The body itself is JSON-encoded as documented under `application/json` content blocks below.
    Clients must parse the body as JSON and ignore the wire Content-Type header. Binary endpoints (image/jpeg snapshots, application/octet-stream clip downloads) set their own proper Content-Type
    and are unaffected.

  version: 1.0.0
  license:
    name: Apache-2.0
    url: http://www.apache.org/licenses/LICENSE-2.0
servers:
  - url: https://localhost/api
tags:
  - name: nSpectId
    description: NSPECT-1H82-JYCQ
    externalDocs:
      url: https://nspect.nvidia.com/review?id=NSPECT-1H82-JYCQ
  - name: v1
    description: VST Live Stream API Schema v1
paths:
  /v1/live/streams:
    get:
      tags:
        - v1
      summary: Get list of available live streams
      description: Get list of available live streams. Each sensor can have multiple streams like main and sub-streams of different resolution or quality.
        The API returns all the live streams supported by all the sensors. Each stream has fields like stream ID, name, metadata and a flag to detect if its the main stream of the sensor.

      operationId: getLiveStream
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                description: >-
                  The actual number of streams depends on hardware capabilities. For VIOS/VST it is bounded by the max_sensors_supported config value. For NVStreamer there is no enforced limit.
                maxItems: 10000
                items:
                  $ref: '#/components/schemas/StreamInfoWrapper'

        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/live/stream/settings:
    post:
      tags:
        - v1
      summary: Set stream settings
      description: >-
        Set stream settings for a particular stream. The settings like framerate, resolution, overlay, pose, proximity, safety features, color of overlay, thickness of overlay etc. can be adjusted.
      operationId: postStreamSettings
      security:
        - bearerAuth: []
      parameters:
        - name: streamId
          in: header
          description: The ID of the stream
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
            maxLength: 100
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamConfig'
      responses:
        '200':
          description: Success
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/live/stream/query:
    get:
      tags:
        - v1
      summary: Query live stream for timestamp and metadata
      description: |
        Query the live stream to get stream's last played timestamp and related metadata
        if it's available. Contract: send `peerId` (camelCase). Source planned to accept
        both `peerId` and `peerid`; in earlier builds only the lowercase `peerid` was read,
        matching `/stream/start`'s backward-compatibility fallback.
      operationId: getLiveStreamQuery
      parameters:
        - name: streamId
          in: header
          description: The ID of the stream
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
            maxLength: 100
        - name: peerId
          in: query
          required: true
          description: Peer ID — camelCase preferred. Older builds accept only lowercase `peerid`; prefer `peerId` for forward compatibility.
          schema:
            type: string
            maxLength: 100
        - name: metadata
          in: query
          required: true
          schema:
            type: boolean
      responses:
        '200':
          description: qos stats of each device
          content:
            application/json:
              schema:
                type: object
                properties:
                  metadata:
                    $ref: '#/components/schemas/Metadata'
                  ts:
                    type: integer
                    format: int64
                    description: Last played timestamp as reported by the underlying media pipeline. Units depend on the pipeline implementation — do not assume seconds, milliseconds, or percent.
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/live/stream/start:
    post:
      tags:
        - v1
      summary: Start live WebRTC streaming
      description: |
        Start live WebRTC streaming for a particular sensor. In this API the SDP offer is shared by the client and SDP answer is returned by the live stream service.
        Clients need to take care of further WebRTC related steps like ICE Candidate exchange. The API takes in the stream ID of the stream which the client meant to stream and a unique peer ID to
        identify
        the Peer Connection. The stream can be configured using the 'options' field. For example:-

        1. To stream video wall or use the video wall feature the 'doComposite' flag needs to be true and streamId(s) should be filled with relevant streamId(s). The streamId at the root level is
        ignored in this case.
        2. The quality of stream can be changed using the 'quality' field. The supported values are low, medium, high and auto.
        3. The overlay related settings can be configured using the 'overlay' field.

      operationId: postLiveStreamStart
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamStartRequest'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamStartResponse'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/live/stream/swap:
    post:
      tags:
        - v1
      summary: Switch stream type from recorded to live
      description: Switch stream type from recorded stream to live stream. This is useful when a recorded stream is already running for a sensor and users need to
        view the live stream immediately. The switch happens without much delay and its faster than stopping recorded stream and starting a fresh live stream.
      operationId: postSwitchString
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              required:
                - peerId
                - streamId
              type: object
              properties:
                peerId:
                  type: string
                  format: uuid
                  maxLength: 100
                streamId:
                  type: string
                  pattern: "^[a-zA-Z0-9_-]+$"
                  maxLength: 100
        required: true
      responses:
        '200':
          description: Success
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/live/stream/stop:
    post:
      tags:
        - v1
      summary: Stop live WebRTC streaming
      description: Stop the live WebRTC stream. Calling this API will stop the live streaming with the specified Peer ID and free resources. Note that
        live stream service can automatically free resources if it detects that the client has disconnected. Calling the API is faster because automatic
        detection can have a delay.
      operationId: postLiveStreamStop
      security:
        - bearerAuth: []
      parameters:
        - name: streamId
          in: header
          description: The ID of the stream
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
            maxLength: 100
      requestBody:
        content:
          application/json:
            schema:
              required:
                - peerId
                - mediaSessionId
              type: object
              properties:
                peerId:
                  type: string
                  format: uuid
                  maxLength: 100
                mediaSessionId:
                  type: string
                  pattern: "^[a-zA-Z0-9_-]+$"
                  maxLength: 100
        required: true
      responses:
        '200':
          description: Success
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/live/stream/pause:
    post:
      tags:
        - v1
      summary: Pause the live stream WebRTC playback
      description: Pause the live stream WebRTC playback. To resume the stream the resume API needs to be called.
      operationId: postLiveStreamPause
      security:
        - bearerAuth: []
      parameters:
        - name: streamId
          in: header
          description: The ID of the stream
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
            maxLength: 100
      requestBody:
        content:
          application/json:
            schema:
              required:
                - peerId
                - mediaSessionId
              type: object
              properties:
                peerId:
                  type: string
                  format: uuid
                  maxLength: 100
                mediaSessionId:
                  type: string
                  pattern: "^[a-zA-Z0-9_-]+$"
                  maxLength: 100
        required: true
      responses:
        '200':
          description: Success
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/live/stream/resume:
    post:
      tags:
        - v1
      summary: Resume the live stream WebRTC playback
      description: Resume the live stream WebRTC playback. Calling this API for a paused stream will resume it. If the stream is already playing calling this
        API will have no effect.
      operationId: postLiveStreamResume
      security:
        - bearerAuth: []
      parameters:
        - name: streamId
          in: header
          description: The ID of the stream
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
            maxLength: 100
      requestBody:
        content:
          application/json:
            schema:
              required:
                - peerId
                - mediaSessionId
              type: object
              properties:
                peerId:
                  type: string
                  format: uuid
                  maxLength: 100
                mediaSessionId:
                  type: string
                  pattern: "^[a-zA-Z0-9_-]+$"
                  maxLength: 100
        required: true
      responses:
        '200':
          description: Success
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/live/stream/status:
    get:
      tags:
        - v1
      summary: Get live stream playback status
      description:
        Get live stream WebRTC playback status. It can be used to check the error flag. If the error flag is set as true that means the stream is erroneous.
        The playback status can also be queried. The playback status can have values like PLAYING, NOT PLAYING, PAUSED and ERROR.
      operationId: getLiveStreamStatus
      parameters:
        - name: peerId
          in: query
          required: true
          schema:
            type: string
            format: uuid
            maxLength: 100
        - name: mediaSessionId
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
            maxLength: 100
        - name: streamId
          in: header
          description: The ID of the stream
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
            maxLength: 100
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamStatus'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/live/stream/{streamId}/picture:
    get:
      tags:
        - v1
      summary: Get picture or snapshot of live streaming
      description: Get picture (jpeg) of the live streaming. Calling this API will return the most recent available frame from the sensor.
      operationId: getLiveStreamPicture
      parameters:
        - name: streamId
          in: header
          description: The ID of the stream
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
            maxLength: 100
        - name: streamId
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
            maxLength: 100
        - name: width
          in: query
          schema:
            type: integer
            maximum: 8000
            minimum: 0
          example: 1920
        - name: height
          in: query
          schema:
            type: integer
            maximum: 4000
            minimum: 0
          example: 1080
        - name: frameId
          in: query
          schema:
            type: string
            pattern: ".*"
            maxLength: 128
          example: '20'
          description: 'Applicable for NvStreamer use-case'
        - name: overlay
          in: query
          description: |
            JSON object specifying unified overlay configuration. Supports bounding boxes, pose, proximity, and safety features.
          schema:
            $ref: '#/components/schemas/OverlayConfiguration'
          # yamllint disable-line rule:line-length
          example: '{"bbox":{"showAll":false,"objectId":[521,517,496,333,23,441],"classType":["Person","Pallet"],"showObjId":true,"objIdPosition":0,"objIdTextColor":"white","objIdTextBGColor":"green"},"color":"green","thickness":5,"debug":true,"opacity":254}'
      responses:
        '200':
          description: Success
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
                maxLength: 128
        default:
          description: Unexpected error
          content:
            image/jpeg:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/live/stream/{streamId}/picture/url:
    get:
      tags:
        - v1
      summary: Get temporary URL for accessing live picture
      description: Get temporary URL for accessing live picture from a camera stream. This does not download the picture, but provides a temporary URL that can be used to access the image file.
      operationId: getLiveStreamPictureUrl
      parameters:
        - name: streamId
          in: path
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
            maxLength: 100
        - name: expiryMinutes
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 10080
          example: 10080
          description: Expiration time in minutes for the URL (default 10080 - 7 days)
        - name: overlay
          in: query
          description: |
            JSON object specifying unified overlay configuration. Supports bounding boxes, pose, proximity, and safety features.
          schema:
            $ref: '#/components/schemas/OverlayConfiguration'
          example: '{"bbox":{"showAll":true},"color":"green","thickness":5,"debug":true,"opacity":254}'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  absolutePath:
                    type: string
                    description: Full file path on server
                    example: "/tmp/live_picture_abc123.jpg"
                  imageUrl:
                    type: string
                    description: Direct URL to access the image file
                    example: "https://example.com/temp/live_picture_abc123.jpg"
                  expiryISO:
                    type: string
                    format: date-time
                    description: URL expiration time in ISO format
                    example: "2025-09-26T12:45:52.685Z"
                  expiryMinutes:
                    type: integer
                    description: Expiry minutes as provided
                    example: 10080
                  streamId:
                    type: string
                    description: Stream ID as provided
                    example: "stream123"
                  type:
                    type: string
                    enum: ["live"]
                    description: Always "live"
                required:
                  - absolutePath
                  - imageUrl
                  - expiryISO
                  - expiryMinutes
                  - streamId
                  - type
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/live/stream/stats:
    get:
      tags:
        - v1
      summary: Get live stream stats
      description: Get live stream stats like framerate, total encoded-decoded frames, encoding profile, network bandwidth of interfaces etc.
      operationId: getLiveStreamStats
      parameters:
        - name: peerId
          in: query
          required: true
          schema:
            type: string
            format: uuid
            maxLength: 100
        - name: mediaSessionId
          in: query
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
            maxLength: 100
        - name: streamId
          in: header
          description: The ID of the stream
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
            maxLength: 100
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StreamStats'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/live/setAnswer:
    post:
      tags:
        - v1
      summary: Share SDP answer with live streaming service
      description: Share SDP answer with live stream service. This is useful in case where live streaming service has shared a SDP
        offer with client using websocket.
        After processing SDP offer the client can share the respective SDP answer by calling this API.
      operationId: postLiveSetAnswer
      security:
        - bearerAuth: []
      parameters:
        - name: peerId
          in: query
          required: true
          schema:
            type: string
            format: uuid
            maxLength: 100
        - name: streamId
          in: header
          description: The ID of the stream
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
            maxLength: 100
      requestBody:
        content:
          application/json:
            schema:
              required:
                - sessionDescription
              type: object
              properties:
                sessionDescription:
                  type: object
                  description: 'SDP answer object (same shape as the offer in /stream/start).'
                  required:
                    - sdp
                    - type
                  properties:
                    type:
                      type: string
                      example: answer
                      maxLength: 128
                      pattern: ".*"
                    sdp:
                      type: string
                      maxLength: 65535
                      pattern: ".*"
                mediaSessionId:
                  type: string
                  pattern: "^[a-zA-Z0-9_-]+$"
                  maxLength: 100
                  description: 'Accepted but not validated by the handler.'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/live/iceCandidate:
    post:
      tags:
        - v1
      summary: Share client's ICE candidate with live streaming service
      description: The client can share its ICE candidate with live streaming service through this API.
      operationId: postLiveAddIceCandidate
      security:
        - bearerAuth: []
      parameters:
        - name: streamId
          in: header
          description: The ID of the stream
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
            maxLength: 100
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddIceCandidate'
        required: true
      responses:
        '200':
          description: Success
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags:
        - v1
      summary: Get list of ICE Candidates generated by live streaming service
      description: Get list of ICE candidates of the live streaming service. The ICE candidates
        are generated asynchronously and the client needs to poll the API until peer connection goes into connected state.
      operationId: getLiveGetIceCandidate
      parameters:
        - name: peerId
          in: query
          required: true
          schema:
            type: string
            format: uuid
            maxLength: 100
        - name: streamId
          in: header
          description: The ID of the stream
          required: true
          schema:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
            maxLength: 100
      responses:
        '200':
          description: Success array
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetIceCandidate'

        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/live/iceServers:
    get:
      tags:
        - v1
      summary: Get list of ICE servers
      description:
        Get URL or URLs of the ICE servers to be used for ICE negotiations. These
        are typically STUN and/or TURN servers. peerId is optional; the server
        returns the configured ICE servers regardless of peerId.
      operationId: getLiveGetIceServers
      parameters:
        - name: peerId
          in: query
          required: false
          schema:
            type: string
            format: uuid
            maxLength: 100
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IceServersResponse'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/live/configuration:
    get:
      tags:
        - v1
      summary: Get live stream service configuration
      description: Get Live Stream service configuration. The configuration includes information regarding HTTP port, maximum number of streams supported,
        enabling reverse proxy, enabling software path etc.
      operationId: getSensorConfiguration
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetConfiguration'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - v1
      summary: Set live stream service configuration
      description: Set Live Stream service configuration like stun or turn URL list, enabling reverse proxy etc.
      operationId: postSensorConfiguration
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetConfiguration'
      responses:
        '200':
          description: Success
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/live/version:
    get:
      tags:
        - v1
      summary: Get live stream service version
      description: Get live stream service version
      operationId: getVersion
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  type:
                    type: string
                    pattern: ".*"
                    maxLength: 128
                    example: "vst"
                  version:
                    type: string
                    pattern: ".*"
                    maxLength: 128
                    example: "2.1.0-26.02.1.3"
                required:
                  - type
                  - version
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/live/help:
    get:
      tags:
        - v1
      summary: Get list of supported APIs by live stream service
      description: Get list of supported APIs by live stream service. Returns a flat array of endpoint path strings.
      operationId: gethelp
      responses:
        '200':
          description: Successs
          content:
            application/json:
              schema:
                type: array
                maxItems: 100
                items:
                  type: string
                  maxLength: 256
                  pattern: ".*"
                  example: "/api/v1/live/streams"
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    StreamConfig:
      type: object
      properties:
        framerate:
          type: integer
          example: 30
          maximum: 100
          minimum: 0
        resolution:
          type: string
          example: "1920x1080"
          pattern: ".*"
          maxLength: 128
        peerId:
          type: string
          format: uuid
          maxLength: 100
        overlay:
          $ref: '#/components/schemas/OverlayConfiguration'
    Options:
      type: object
      required:
        - quality
        - rtptransport
        - timeout
      properties:
        quality:
          type: string
          enum: [low, medium, high, auto]
        rtptransport:
          type: string
          enum: [udp, tcp]
        timeout:
          type: integer
          example: 60
        composite:
          description: (Deprecated) Video wall/composite configuration inside options. Use root-level composite field instead.
          deprecated: true
          $ref: '#/components/schemas/CompositeConfiguration'
        overlay:
          $ref: '#/components/schemas/OverlayConfiguration'

    StreamStartRequest:
      required:
        - options
        - peerId
        - sessionDescription
      type: object
      properties:
        streamId:
          type: string
          pattern: "^[a-zA-Z0-9_-]+$"
          maxLength: 100
        tag:
          type: string
          pattern: "^[a-zA-Z0-9_-]+$"
          maxLength: 100
        peerId:
          type: string
          format: uuid
          maxLength: 100
        composite:
          description: |
            (New format) Video wall/composite configuration at root level.
            For backward compatibility, composite can also be specified inside options.composite (deprecated).
            If both are provided, root level takes precedence.
          $ref: '#/components/schemas/CompositeConfiguration'
        options:
          $ref: '#/components/schemas/Options'
        sessionDescription:
          required:
            - sdp
            - type
          type: object
          properties:
            type:
              type: string
              pattern: ".*"
              maxLength: 128
              example: offer
            sdp:
              type: string
              maxLength: 65535
              pattern: ".*"

    StreamStartResponse:
      required:
        - sdp
        - type
      type: object
      properties:
        sdp:
          type: string
          maxLength: 65535
          pattern: ".*"
        type:
          type: string
          pattern: ".*"
          maxLength: 128
          example: answer
        mediaSessionId:
          type: string
          pattern: "^[a-zA-Z0-9_-]+$"
          maxLength: 100

    IceServer:
      type: object
      properties:
        urls:
          type: string
          pattern: ".*"
          maxLength: 128
      required:
        - urls

    IceServersResponse:
      type: object
      properties:
        iceServers:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/IceServer'
      required:
        - iceServers

    StreamStatus:
      type: object
      properties:
        error:
          type: boolean
        state:
          type: string
          enum:
            - PLAYING
            - NOT PLAYING
            - PAUSED
            - ERROR

    StreamInfoWrapper:
      type: object
      description: |
        Single-entry map of `sensorId` → array of streams. Each element in the outer array
        (returned by GET /v1/live/streams) is one such map. Use `jq 'add'` to flatten.
      additionalProperties:
        type: array
        description: Streams for one sensor. Bounded by max_sensors_supported on VIOS/VST.
        maxItems: 10000
        items:
          $ref: '#/components/schemas/StreamInfo'

    StreamInfo:
      type: object
      properties:
        streamId:
          type: string
          pattern: "^[a-zA-Z0-9_-]+$"
          maxLength: 100
        isMain:
          type: boolean
          example: true
        type:
          type: string
          maxLength: 128
          description: 'Stream type'
          example: 'Rtsp'
          enum:
            - Http
            - Hls
            - Rtsp
            - FileDownload
            - Udp
            - Webrtc
            - Native
            - NotSupported
        storageLocation:
          type: string
          maxLength: 128
          pattern: ".*"
          description: 'Storage location type for the stream'
          example: 'Local'
          enum:
            - Local
            - Cloud
            - Unknown
        url:
          type: string
          maxLength: 256
          format: uri
          description: 'Live RTSP URL.'
          example: 'rtsp://<HOST>:30554/live/TruckAccident'
        vodUrl:
          type: string
          maxLength: 256
          format: uri
          description: 'VOD (replay) RTSP URL. Supports startTs/endTs query parameters.'
          example: 'rtsp://<HOST>:30562/vod/TruckAccident'
        name:
          type: string
          pattern: ".*"
          maxLength: 128
          example: 'HIKVISION%20DS-2CD2T43G0-I5'
        metadata:
          type: object
          properties:
            bitrate:
              type: string
              pattern: ".*"
              maxLength: 128
              example: '8000'
            codec:
              type: string
              pattern: ".*"
              maxLength: 128
              example: 'H264'
            framerate:
              type: string
              pattern: ".*"
              maxLength: 128
              example: '30'
            govlength:
              type: string
              pattern: ".*"
              maxLength: 128
              example: '60'
            resolution:
              type: string
              pattern: ".*"
              maxLength: 128
              example: '1920x1080'

    AddIceCandidate:
      required:
        - candidate
        - peerId
      type: object
      properties:
        peerId:
          type: string
          format: uuid
          maxLength: 100
        candidate:
          required:
            - candidate
            - sdpMLineIndex
            - sdpMid
          type: object
          properties:
            candidate:
              type: string
              maxLength: 500
              pattern: ".*"
            sdpMLineIndex:
              type: integer
              maximum: 100
              minimum: 0
              example: 0
            sdpMid:
              type: string
              pattern: ".*"
              maxLength: 128
              example: '0'

    GetIceCandidate:
      type: array
      maxItems: 100
      items:
        required:
          - candidate
          - sdpMLineIndex
          - sdpMid
        type: object
        properties:
          candidate:
            type: string
            pattern: ".*"
            maxLength: 500
          sdpMLineIndex:
            type: integer
            maximum: 100
            minimum: 0
            example: 0
          sdpMid:
            type: string
            pattern: ".*"
            maxLength: 128
            example: '0'

    GetConfiguration:
