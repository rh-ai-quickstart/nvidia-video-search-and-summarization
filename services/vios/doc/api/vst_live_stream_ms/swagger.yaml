          items:
            type: string
            pattern: ".*"
            maxLength: 128
        useCoturnAuthSecret:
          type: boolean
          default: false

    BoundingBox:
      type: object
      properties:
        bottomY:
          type: number
        leftX:
          type: number
        rightX:
          type: number
        topY:
          type: number
    Object:
      type: object
      properties:
        bbox:
          $ref: '#/components/schemas/BoundingBox'
        confidence:
          type: number
        coordinate:
          type: object
        dir:
          type: array
          maxItems: 100
          items:
            type: string
            pattern: ".*"
            maxLength: 128
        embedding:
          type: object
        gaze:
          type: object
        id:
          type: string
          pattern: ".*"
          maxLength: 128
        info:
          type: object
        lipActivity:
          type: object
        location:
          type: object
        pose:
          type: object
        speed:
          type: number
        type:
          type: string
          pattern: ".*"
          maxLength: 128
    Metadata:
      type: object
      properties:
        epocTime:
          type: number
        id:
          type: string
          pattern: ".*"
          maxLength: 128
        objects:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/Object'

    StreamStatsSettings:
      type: object
      properties:
        Encoding:
          type: string
          pattern: ".*"
          maxLength: 128
        Resolution:
          type: object
          properties:
            height:
              type: string
              pattern: ".*"
              maxLength: 128
            width:
              type: string
              pattern: ".*"
              maxLength: 128
        streamId:
          type: string
          pattern: "^[a-zA-Z0-9_-]+$"
          maxLength: 128
        encodingProfile:
          type: string
          pattern: ".*"
          maxLength: 128
        framerate:
          type: string
          pattern: ".*"
          maxLength: 128
    NetworkBandwidth:
      type: object
      properties:
        interfaceList:
          type: string
          pattern: ".*"
          maxLength: 128

    CompositeConfiguration:
      type: object
      description: |
        Video wall/composite stream configuration. Allows combining multiple camera streams into a single composite view.
        Supports grid layouts, floor plan overlay, and sensor name display.
      properties:
        doComposite:
          type: boolean
          description: Enable composite/video wall mode
          example: true
        streamIds:
          type: array
          description: Array of stream IDs to include in the composite
          maxItems: 100
          items:
            type: string
            pattern: "^[a-zA-Z0-9_-]+$"
          example: ["35da25cf-d9a2-4a62-8b06-faf244bdb24b", "9529c2db-3da8-4c1f-b452-cb3820eca053"]
        includeFloorPlan:
          type: boolean
          description: Include floor plan/God's eye view in composite
          example: false
        quality:
          type: string
          description: Quality setting for composite stream
          enum: [low, medium, high, auto]
          example: "high"
        showSensorName:
          type: object
          description: Display sensor names on composite streams
          properties:
            enable:
              type: boolean
              description: Enable sensor name display
              example: true
            position:
              type: array
              description: Position [x, y] for sensor name text
              items:
                type: integer
              minItems: 2
              maxItems: 2
              example: [10, 10]
        gridLayout:
          type: object
          description: Custom grid layout configuration for composite
          additionalProperties: true
          example: {"rows": 2, "cols": 2}

    OverlayConfiguration:
      type: object
      description: |
        Unified overlay configuration for visual overlays including bounding boxes, pose, proximity, and safety features.
      properties:
        bbox:
          type: object
          description: Bounding box overlay configuration
          properties:
            showAll:
              type: boolean
              description: Show all detected objects (true) or filter by objectId/classType (false)
              example: true
            objectId:
              type: array
              description: Specific object IDs to show (only when showAll=false)
              maxItems: 100
              items:
                type: integer
              example: [521, 517, 496, 333]
            classType:
              type: array
              description: Object class types to filter (only when showAll=false)
              maxItems: 100
              items:
                type: string
              example: ["Person", "Pallet", "Forklift"]
            showObjId:
              type: boolean
              description: Display object ID as text on bounding box
              example: true
            objIdPosition:
              type: integer
              description: Position of object ID text (0=MIDDLE, 1=TOP_LEFT, 2=TOP_RIGHT, 3=BOTTOM_LEFT, 4=BOTTOM_RIGHT)
              minimum: 0
              maximum: 4
              example: 1
            objIdTextColor:
              type: string
              description: Color of object ID text
              example: "white"
            objIdTextBGColor:
              type: string
              description: Background color for object ID text
              example: "green"
        color:
          type: string
          description: Default overlay color (e.g., green, red, blue, white, yellow)
          example: "green"
        thickness:
          type: integer
          description: Line thickness for overlays
          minimum: 1
          maximum: 10
          example: 5
        debug:
          type: boolean
          description: Enable debug mode for additional information
          example: true
        opacity:
          type: integer
          description: Opacity level (0=transparent, 255=opaque)
          minimum: 0
          maximum: 255
          example: 254
        pose:
          type: boolean
          description: Enable pose detection overlays
          example: false
        framerate:
          type: integer
          description: Frame rate for overlay processing
          example: 15
        proximityClass:
          type: array
          description: Classes to track for proximity detection
          maxItems: 100
          items:
            type: string
          example: ["Person", "Forklift"]
        entrantClass:
          type: array
          description: Classes that can enter safety zones
          maxItems: 100
          items:
            type: string
          example: ["nova_carter", "person"]
        proximityAreaFactor:
          type: number
          description: Scaling factor for proximity areas
          example: 1.3
        proximityAnimation:
          type: string
          description: Animation style for proximity visualization
          example: "ellipseAndLine"
        overlayColorCode:
          type: array
          description: Custom RGBA colors per class type [R, G, B, A] where values are 0-255
          maxItems: 100
          items:
            type: object
            additionalProperties:
              type: array
              items:
                type: integer
                minimum: 0
                maximum: 255
          example:
            - Person: [118, 185, 0, 255]
            - Humanoid: [0, 113, 197, 255]
            - NovaCarter: [250, 194, 0, 255]
            - Transporter: [0, 133, 100, 255]
            - Forklift: [0, 113, 197, 255]
            - Box: [250, 194, 0, 255]
            - Pallet: [93, 22, 130, 255]
            - Crate: [94, 94, 94, 255]
            - proximity_bubble: [0, 255, 0, 75]
            - proximity_bubble_inner: [255, 0, 0, 75]
            - proximity_bubble_outer: [204, 85, 0, 75]
            - proximity_bubble_border: [255, 255, 255, 255]
            - proximity_line: [255, 255, 255, 255]
        needBbox:
          type: boolean
          description: (Deprecated) Use bbox.showAll instead
          example: true
          deprecated: true
        needTripwire:
          type: boolean
          description: (Deprecated) Use tripwire.showAll instead
          example: false
          deprecated: true
        needRoi:
          type: boolean
          description: (Deprecated) Use roi.showAll instead
          example: false
          deprecated: true
        objectId:
          type: array
          description: (Deprecated) Use bbox.objectId instead
          maxItems: 100
          items:
            type: integer
          example: [23, 42]
          deprecated: true
        classType:
          type: array
          description: (Deprecated) Use bbox.classType instead
          maxItems: 100
          items:
            type: string
          example: ["Person"]
          deprecated: true
    StreamStats:
      type: object
      properties:
        streamSettings:
          $ref: '#/components/schemas/StreamStatsSettings'
        frameRetrievalAccuracy:
          type: string
          pattern: ".*"
          maxLength: 128
        networkBandwidth:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/NetworkBandwidth'
        streamStats:
          type: object
          properties:
            currentFrameRate:
              type: string
              pattern: ".*"
              maxLength: 128
            decode:
              type: string
              pattern: ".*"
              maxLength: 128
            encode:
              type: string
              pattern: ".*"
              maxLength: 128
            inboundAudio:
              type: string
              pattern: ".*"
              maxLength: 128
            inboundVideo:
              type: string
              pattern: ".*"
              maxLength: 128
        timestamp:
          type: string
          pattern: ".*"
          maxLength: 128

    Error:
      required:
        - error_code
        - error_message
      type: object
      properties:
        error_code:
          type: string
          maxLength: 128
          pattern: "^[a-zA-Z0-9_-]+$"
          example: VMSInternalError
        error_message:
          type: string
          maxLength: 512
          pattern: ".*"
          example: VMS internal processing error
