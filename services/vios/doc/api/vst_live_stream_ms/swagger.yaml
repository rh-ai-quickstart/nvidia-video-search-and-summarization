          pattern: ".*"
          maxLength: 128
          default: ''
        httpPort:
          type: string
          pattern: ".*"
          maxLength: 128
          default: '30001'
        maxStreamsSupported:
          type: integer
          minimum: 0
          default: 500
        maxWebrtcInConnections:
          type: integer
          minimum: 0
          default: 8
        maxWebrtcOutConnections:
          type: integer
          minimum: 0
          default: 8
        enableFrameDrop:
          type: boolean
          default: true
        prometheusPort:
          type: string
          pattern: ".*"
          maxLength: 128
          default: '8087'
        stunUrlList:
          type: array
          maxItems: 100
          items:
            type: string
            pattern: ".*"
            maxLength: 128
          example:
            - stun.l.google.com:19302
            - stun1.l.google.com:19302
        useTwilioStunTurn:
          type: boolean
          default: false
        twilioAccountSid:
          type: string
          pattern: ".*"
          maxLength: 128
          default: ''
        twilioAuthToken:
          type: string
          pattern: ".*"
          maxLength: 128
        useReverseProxy:
          type: boolean
          default: false
        reverseProxyServerAddress:
          type: string
          pattern: ".*"
          maxLength: 128
        staticTurnUrlList:
          type: array
          maxItems: 100
          nullable: true
          items:
            type: string
            pattern: ".*"
            maxLength: 128
        useCoturnAuthSecret:
          type: boolean
          default: false
        useHttpDigestAuthentication:
          type: boolean
          default: false
        useHttps:
          type: boolean
          default: false
        enablePerfLogging:
          type: boolean
          default: true
        useSoftwarePath:
          type: boolean
          default: false
        useVideoMetadataProtobuf:
          type: boolean
          default: true
        videoMetadataQueryBatchSizeNumFrames:
          type: integer
          minimum: 0
          default: 300
        videoMetadataServer:
          type: string
          pattern: ".*"
          maxLength: 128
        vstDataPath:
          type: string
          pattern: ".*"
          maxLength: 256
        webrtcLatencyMs:
          type: integer
          minimum: 0
          default: 1000
        webrtcOutEnableInsertSpsPps:
          type: boolean
          default: true
        webrtcOutMinDrcInterval:
          type: integer
          minimum: 0
          default: 5
        webrtcOutSetIdrInterval:
          type: integer
          minimum: 0
          default: 256
        webrtcOutSetIframeInterval:
          type: integer
          minimum: 0
          default: 30
        webserviceAccessControlList:
          type: string
          pattern: ".*"
          maxLength: 128
        enableGstDebugProbes:
          type: boolean
          default: true
        enableUserCleanup:
          type: boolean
          default: false
        multiUserExtraOptions:
          type: string
          pattern: ".*"
          maxLength: 128
          default: 'Secure, SameSite=none'
        useMultiUser:
          type: boolean
          default: false
        vstIp:
          type: string
          pattern: ".*"
          maxLength: 128
        3dOverlaySensorName:
          type: string
          pattern: ".*"
          maxLength: 128
        WebrtcOutDefaultResolution:
          type: string
          pattern: ".*"
          maxLength: 32
          example: '1920x1080'
        analyticServerAddress:
          type: string
          pattern: ".*"
          maxLength: 256
          example: 'http://:30080/emdx'
        calibrationFilePath:
          type: string
          pattern: ".*"
          maxLength: 256
        calibrationMode:
          type: string
          pattern: ".*"
          maxLength: 64
          example: 'synthetic'
        enableDecLowLatencyMode:
          type: boolean
        enableRecentering:
          type: boolean
        floorMapFilePath:
          type: string
          pattern: ".*"
          maxLength: 256
        overlayClassLabels:
          type: array
          items:
            type: string
            maxLength: 128
            pattern: ".*"
        overlayColorCode:
          type: array
          description: 'List of single-key objects mapping a class label to an RGBA color array.'
          items:
            type: object
            additionalProperties:
              type: array
              minItems: 4
              maxItems: 4
              items:
                type: integer
                minimum: 0
                maximum: 255
        overlayProximityLabels:
          type: array
          items:
            type: string
            maxLength: 128
            pattern: ".*"
        overlayTextFontType:
          type: string
          pattern: ".*"
          maxLength: 128
          example: 'DejaVuSansMono.ttf'
        useCameraGroups:
          type: boolean
        webrtc_video_quality_tunning:
          type: object
          description: 'Per-resolution encoder tuning. Keys are resolution_480, resolution_720, resolution_1080, resolution_1440, resolution_2160.'
          additionalProperties:
            type: object
            properties:
              bitrate_range:
                type: array
                minItems: 2
                maxItems: 2
                items:
                  type: integer
                  minimum: 0
              bitrate_start:
                type: integer
                minimum: 0
              qp_range_I:
                type: array
                minItems: 2
                maxItems: 2
                items:
                  type: integer
                  minimum: 0
              qp_range_P:
                type: array
                minItems: 2
                maxItems: 2
                items:
                  type: integer
                  minimum: 0
        webrtcpeerConnTimeoutSec:
          type: integer
          minimum: 0
          example: 10

    SetConfiguration:
      type: object
      properties:
        coturnTurnUrlListWithSecret:
          type: array
