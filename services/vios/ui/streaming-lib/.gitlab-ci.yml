image:
  name: node:latest
  pull_policy: always

stages:
  - build
  - lint

cache:
  paths:
    - node_modules/

build:
  stage: build
  tags:
    - vst_streaming_lib
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

lint:
  stage: lint
  tags:
    - vst_streaming_lib
  script:
    - npm ci
    - npm run lint
  dependencies:
    - build

format-check:
  stage: lint
  tags:
    - vst_streaming_lib
  script:
    - npm ci
    - npm run format:check
  dependencies:
    - build
