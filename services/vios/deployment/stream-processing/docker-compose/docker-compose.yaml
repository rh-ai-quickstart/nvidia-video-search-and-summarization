include:
  - path: ./sdr-streamprocessing/sdr-compose.yaml
  - path: ./monitoring/docker-compose.yml

services:
  sensor-ms:
    image: ${VST_SENSOR_IMAGE}
    user: "0:0"
    runtime: nvidia
    entrypoint: ["/bin/bash", "-c", "exec /home/vst/vst_release/launch_vst"]
    environment:
      - CONTAINER_NAME=sensor-ms
      - ADAPTOR=${VST_ADAPTOR}
      - NEED_RECORDING=false
      - NEED_RTSPSERVER=false
      - NEED_STORAGE=false
      - NEED_STREAM_MONITORING=true
      - HTTP_PORT=${SENSOR_HTTP_PORT}
      - PROMETHEUS_PORT=${SENSOR_PROMETHEUS_PORT}
      - CENTRALIZE_DB_NAME=${CENTRALIZE_DB_NAME}
      - CENTRALIZE_DB_USERNAME=${CENTRALIZE_DB_USERNAME}
      - CENTRALIZE_DB_PASSWORD=${CENTRALIZE_DB_PASSWORD}
      - CENTRALIZE_DB_PORT=${CENTRALIZE_DB_PORT}
      - CENTRALIZE_DB_HOSTADDR=${CENTRALIZE_DB_HOSTADDR}
      - STREAM_PROCESSOR_MODULE_ENDPOINT=${STREAM_PROCESSOR_MODULE_ENDPOINT}
    volumes:
      - ${VST_CONFIG_PATH}:/home/vst/vst_release/configs
      - ${VST_DATA_PATH}:/home/vst/vst_release/vst_data
      - ${VST_VIDEO_STORAGE_PATH}:/home/vst/vst_release/vst_video
    network_mode: host
    container_name: sensor-ms
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -ec 'exec 3<>/dev/tcp/127.0.0.1/$${HTTP_PORT}; printf "GET /v1/ready HTTP/1.1\r\nHost: 127.0.0.1\r\nConnection: close\r\n\r\n" >&3;
          read -r status <&3; [[ "$${status}" == HTTP/*" 200 "* ]]'
      timeout: 3s
      interval: 15s
      retries: 60
      start_period: 5s
    depends_on:
      redis:
        condition: service_healthy
      centralizedb:
        condition: service_healthy
      sdr-streamprocessing:
        condition: service_started
      envoy-streamprocessing:
        condition: service_started

  centralizedb:
    image: ${POSTGRES_IMAGE}
    user: "0:0"
    environment:
      - POSTGRES_USER=${CENTRALIZE_DB_USERNAME}
      - POSTGRES_DB=${CENTRALIZE_DB_NAME}
      - POSTGRES_PASSWORD=${CENTRALIZE_DB_PASSWORD}
    volumes:
      - vst_pg_data:/var/lib/postgresql/data
      - ${VST_CONFIG_PATH}/postgresql.conf:/etc/postgresql/postgresql.conf
    network_mode: host
    container_name: centralizedb
    restart: always
    command:
      - "postgres"
      - "-c"
      - "config_file=/etc/postgresql/postgresql.conf"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" >/dev/null 2>&1"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 2s

  vst-ingress:
    image: ${NGINX_IMAGE}
    user: "0:0"
    volumes:
      - ${VST_CONFIG_PATH}/nginx-${NGINX_MODE:-vst}.conf:/etc/nginx/nginx.conf
    network_mode: host
    container_name: vst-ingress
    restart: always    # Nginx should always restart as it's critical for routing
    healthcheck:
      test:
        - CMD-SHELL
        - >
          bash -ec 'exec 3<>/dev/tcp/127.0.0.1/30888; printf "GET /health HTTP/1.1\r\nHost: 127.0.0.1\r\nConnection: close\r\n\r\n" >&3; read -r status <&3; [[ "$${status}" == HTTP/*" 200 "* ]]'
          || (test -s /tmp/nginx/nginx.pid && kill -0 "$(cat /tmp/nginx/nginx.pid)" >/dev/null 2>&1 && nginx -t -q)
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 2s
    depends_on:
      sensor-ms:
        condition: service_healthy

  redis:
    image: ${REDIS_IMAGE}
    user: "0:0"
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    network_mode: host
    container_name: redis-server
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 60
      start_period: 2s

volumes:
  vst_pg_data:
