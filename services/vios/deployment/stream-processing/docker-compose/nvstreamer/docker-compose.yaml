x-nvstreamer-base: &nvstreamer-base  # Base configuration
  image: ${NVSTREAMER_IMAGE}
  user: "0:0"
  network_mode: "host"
  deploy:
    restart_policy:
      condition: always

services:
  nvstreamer-1:
    <<: *nvstreamer-base
    container_name: nvstreamer-1
    profiles: ["nvstreamer-1"]
    entrypoint:
      - /bin/bash
      - "-c"
      - >-
        if [ "$$NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES" = "true" ]; then
        /home/vst/vst_release/tools/user_additional_install.sh; fi && exec
        /home/vst/vst_release/launch_vst
    environment:
      - NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES=${NVSTREAMER_INSTALL_ADDITIONAL_PACKAGES}
      - ADAPTOR=streamer
      - HTTP_PORT=${NVSTREAMER_HTTP_PORT_1}
      - RTSP_SERVER_PORT=${NVSTREAMER_RTSP_PORT_1}
    volumes:
      - ${NVSTREAMER_CONFIG}/vst_config.json:/home/vst/vst_release/configs/vst_config.json
      - ${NVSTREAMER_CONFIG}/vst_storage.json:/home/vst/vst_release/configs/vst_storage.json
      - ${NVSTREAMER_VIDEO_1}:/home/vst/vst_release/streamer_videos
      - ${NVSTREAMER_CONFIG}/../vst_data/nvstreamer-1:/home/vst/vst_release/vst_data
      - ${NVSTREAMER_CONFIG}/user_additional_install.sh:/home/vst/vst_release/tools/user_additional_install.sh

