input {
  kafka {
    bootstrap_servers        => "${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}"
    topics                   => ["${KAFKA_TOPIC:mdx-vlm-captions}", "${KAFKA_STRUCTURED_SUMMARY_TOPIC:mdx-structured-events-summary}"]
    group_id                 => "${KAFKA_CONSUMER_GROUP:logstash-vlm-es-writer}"
    client_id                => "logstash-visionllm-1"
    auto_offset_reset        => "earliest"
    enable_auto_commit       => true
    decorate_events          => "basic"
    # Kafka key is a UTF-8 string from the producer (request_id:chunkIdx);
    # use StringDeserializer so `decorate_events` can put it into
    # [@metadata][kafka][key] without tripping Logstash's Valuefier on a
    # Java byte[] value (uncaught MissingConverterException → worker death).
    key_deserializer_class   => "org.apache.kafka.common.serialization.StringDeserializer"
    value_deserializer_class => "org.apache.kafka.common.serialization.ByteArrayDeserializer"

    codec => protobuf {
      # proto3 class names use single dots (lower-case package + PascalCase
      # message); the codec docs are explicit on this format.
      class_name              => "nv.VisionLLM"
      class_file              => "/etc/logstash/pb_definitions/nv_pb.rb"
      protobuf_root_directory => "/etc/logstash/pb_definitions"
      protobuf_version        => 3
      stop_on_error           => false
    }
  }
}

filter {
  # text = llm.queries[0].response (single rule; both topics use the same
  # RTVI-native VisionLLM shape).
  if [llm][queries] {
    mutate {
      add_field => { "text" => "%{[llm][queries][0][response]}" }
    }
  }

  # Build content_metadata + metadata.source + ES routing keys + zero-vector.
  # Mirrors ElasticsearchDBTool.add_summary's normalization exactly:
  #   - hoist `source` out of info[source] / info[file], default "N/A"
  #   - empty strings -> nil
  #   - everything else lives under metadata.content_metadata
  ruby {
    init => '
      require "digest"

      # Port of via-ctx-rag dev/pshekdar/kafka-elastic NullEmbedding
      # (services/kafka_consumer/vector_db_writer.py). Generates a
      # deterministic non-zero pseudo-random vector seeded from the SHA-256
      # of the document text. ES (and Milvus) cosine similarity reject
      # zero-magnitude vectors with
      #     document_parsing_exception: "The [cosine] similarity does not
      #     support vectors with zero magnitude"
      # so we cannot just write Array.new(dim, 0.0) here. We use SHA-256
      # rather than Ruby String#hash so the seed is stable across logstash
      # restarts and across replicas (Ruby String#hash is salted per
      # process, the same as Python hash()).
      def null_embedding(text, dim, seed)
        digest_hex = Digest::SHA256.hexdigest(text.to_s)
        text_seed  = digest_hex[0, 16].to_i(16)  # 64 bits
        rng        = Random.new(seed + text_seed)
        Array.new(dim) { rng.rand }
      end
    '
    code => '
      info = event.get("info") || {}
      cm   = info.dup

      # Construct the ES index name. via-engine produced docs (structured_events
      # / aggregated_summary on mdx-structured-events-summary topic) carry an
      # explicit info["collection_name"] — use it verbatim. RTVI raw_events
      # messages do NOT carry collection_name (no rtvi-microservices change),
      # so derive it from info["streamId"] which baseline RTVI populates with
      # chunk.streamId (the asset UUID) when asset.sensor_name is empty —
      # /v1/stream/add must be called with camera_id="" for this to hold.
      raw_sid = (cm["streamId"] || "unknown").to_s
      safe_sid = raw_sid.gsub(/[-\/\\ ]/, "_")
      coll = cm.delete("collection_name") || "default_#{safe_sid}"

      cm["doc_type"] ||= "raw_events"
      q = (event.get("[llm][queries]") || [])[0]
      q_id = (q && q["id"]).to_s
      # q["id"] is a composite "requestId:chunkIdx" string, not a plain integer.
      # Passing it to the mutate integer convert below raises a BigDecimal
      # exception in Logstash 9.x, leaving the field as-is and causing ES to
      # reject the document. Use q_id only if it is already a pure integer;
      # otherwise fall back to chunkIdx from the info map, which is always an integer.
      cm["doc_i"] ||= (q_id =~ /\A\d+\z/ ? q_id : cm["chunkIdx"] || "")

      # uuid is set explicitly by via-engine on its own publishes; for RTVI
      # raw_events fall back to streamId (= the asset UUID).
      cm["uuid"] ||= raw_sid

      # Derive chunk-level timestamp floats from baseline VisionLLM proto
      # Timestamps. RTVI populates vision_llm.timestamp + vision_llm.end as
      # google.protobuf.Timestamp (seconds + nanos) — observability only.
      # The streaming aggregate read path filters by per-event times
      # (event.start_time/end_time inside the VLM JSON in doc["text"]),
      # NOT by these doc-level fields. They are present here so operators
      # can introspect raw_events docs and so a future ES-level pre-filter
      # optimisation has the data to query.
      ts = event.get("timestamp")
      if ts && !cm["start_ntp_float"]
        cm["start_ntp_float"] = ts["seconds"].to_f + (ts["nanos"] || 0).to_f / 1_000_000_000.0
      end
      end_ts = event.get("end")
      if end_ts && !cm["end_ntp_float"]
        cm["end_ntp_float"] = end_ts["seconds"].to_f + (end_ts["nanos"] || 0).to_f / 1_000_000_000.0
      end

      source = cm.delete("source") || cm["file"] || "N/A"

      cm.each_pair do |k, v|
        cm[k] = nil if v == ""
      end

      event.set("[metadata][source]", source)
      event.set("[metadata][content_metadata]", cm)
      event.set("[@metadata][collection]", coll)
      event.set("[@metadata][es_id]",
        "#{coll}:#{cm["uuid"] || ""}:#{cm["doc_type"]}:" \
        "#{cm["chunkIdx"] || cm["batch_i"] || cm["doc_i"] || ""}")

      # Deterministic non-zero embedding vector — LVS_EMB_ENABLE=false in
      # the streaming Kafka path. Replicates NullEmbedding from
      # via-ctx-rag dev/pshekdar/kafka-elastic so cosine kNN search stays
      # usable when LVS_EMB_ENABLE=true is later enabled (no template flip
      # or reindex needed).
      dim   = ENV.fetch("LVS_EMB_DIMENSIONS", "1024").to_i
      seed  = ENV.fetch("LVS_EMB_SEED", "42").to_i
      event.set("vector", null_embedding(event.get("text"), dim, seed))
    '
  }

  # Type coercion. proto map<string,string> stringifies on the wire; restore
  # native types so the ES index template + range queries / aggregations on
  # batch_i, start_ntp_float, etc. continue to work as they do for
  # add_summary-written docs.
  mutate {
    convert => {
      "[metadata][content_metadata][doc_i]"           => "integer"
      "[metadata][content_metadata][chunkIdx]"        => "integer"
      "[metadata][content_metadata][batch_i]"         => "integer"
      "[metadata][content_metadata][event_count]"     => "integer"
      "[metadata][content_metadata][total_events]"    => "integer"
      "[metadata][content_metadata][pts_offset_ns]"   => "integer"
      "[metadata][content_metadata][start_pts]"       => "integer"
      "[metadata][content_metadata][end_pts]"         => "integer"
      "[metadata][content_metadata][start_ntp_float]" => "float"
      "[metadata][content_metadata][end_ntp_float]"   => "float"
      "[metadata][content_metadata][is_first]"        => "boolean"
      "[metadata][content_metadata][is_last]"         => "boolean"
    }
  }

  # Drop fields we no longer need on the indexed document.
  mutate {
    remove_field => ["info", "llm", "@version", "event"]
  }
}

output {
  elasticsearch {
    hosts           => ["http://${ES_HOST:elasticsearch}:${ES_PORT:9200}"]
    index           => "%{[@metadata][collection]}"
    document_id     => "%{[@metadata][es_id]}"
    action          => "index"
    manage_template => false
  }
}
