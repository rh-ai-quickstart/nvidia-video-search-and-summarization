# Generated by blueprint_builder Docker Compose builder
# https://docs.docker.com/compose/compose-file/

# GPU configuration - define once, reference everywhere
x-gpu-config: &gpu-config
  driver: nvidia
  device_ids: ['0']  # ⬅️ CHANGE THIS to use different GPU
  capabilities: [gpu]

name: video-summarization

services:
  wait-for-llm:
    image: curlimages/curl:latest
    command:
    - sh
    - -c
    - |
      RETRY=0
      MAX_RETRIES=60
      until curl -f http://${LVS_LLM_HOST}:${LVS_LLM_PORT}/v1/health/ready; do
        echo "Check if Metropolis hosted LLM server is ready... (attempt $$RETRY/$$MAX_RETRIES)"
        RETRY=$$((RETRY + 1))
        if [ $$RETRY -ge $$MAX_RETRIES ]; then
          echo "ERROR: Metropolis hosted LLM server not ready after $$MAX_RETRIES attempts (2 minutes)"
          exit 1
        fi
        sleep 2
      done
      echo 'LLM server is live!'
    networks:
    - app-network
    restart: 'no'
  wait-for-elasticsearch:
    image: curlimages/curl:latest
    command:
    - sh
    - -c
    - until nc -z elasticsearch 9300; do echo 'Waiting for elasticsearch to be ready...'; sleep 2; done; echo 'elasticsearch
      is ready!'
    networks:
    - app-network
    restart: 'no'
  lvs:
    image: via-engine-${USER:-user}
    container_name: lvs
    environment:
      NGC_API_KEY: ${NGC_API_KEY:-}
      ARTIFACTORY_USER: ${ARTIFACTORY_USER:-}
      ARTIFACTORY_TOKEN: ${ARTIFACTORY_TOKEN:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      BACKEND_PORT: '38111'
      FRONTEND_PORT: '38123'
      LVS_MCP_PORT: '38112'
      CA_RAG_CONFIG: /opt/nvidia/via/config/default_config.yaml
      DISABLE_CA_RAG: ${DISABLE_CA_RAG:-false}
      ENABLE_AUDIO: ${ENABLE_AUDIO:-false}
      ENABLE_DENSE_CAPTION: ${ENABLE_DENSE_CAPTION:-}
      ENABLE_VIA_HEALTH_EVAL: ${ENABLE_VIA_HEALTH_EVAL:-false}
      LVS_ENABLE_MCP: ${LVS_ENABLE_MCP:-true}
      VLM_MODEL_TO_USE: openai-compat
      MODEL_PATH: ${MODEL_PATH}
      VIA_ENABLE_OTEL: ${VIA_ENABLE_OTEL:-false}
      VIA_OTEL_ENDPOINT: ${VIA_OTEL_ENDPOINT:-http://otel-collector:4318}
      VIA_OTEL_EXPORTER: ${VIA_OTEL_EXPORTER:-console}
      VIA_CTX_RAG_ENABLE_OTEL: ${VIA_CTX_RAG_ENABLE_OTEL:-false}
      VIA_CTX_RAG_EXPORTER: ${VIA_OTEL_EXPORTER:-console}
      VIA_CTX_RAG_OTEL_ENDPOINT: ${VIA_OTEL_ENDPOINT:-http://otel-collector:4318}
      VSS_LOG_LEVEL: ${VSS_LOG_LEVEL:-DEBUG}
      VSS_EXTRA_ARGS: ${VSS_EXTRA_ARGS:-}
      LVS_EMB_ENABLE: ${LVS_EMB_ENABLE:-false}
      LVS_EMB_BASE_URL: ${LVS_EMB_BASE_URL:-}
      LVS_EMB_MODEL_NAME: ${LVS_EMB_MODEL_NAME:-}
      LVS_LLM_ENABLE: 'true'
      LVS_LLM_HOST: ${LVS_LLM_HOST}
      LVS_LLM_PORT: ${LVS_LLM_PORT}
      LVS_LLM_BASE_URL: http://${LVS_LLM_HOST}:${LVS_LLM_PORT}/v1
      LVS_ENABLE_LLM_MERGING: ${LVS_ENABLE_LLM_MERGING:-false}
      LVS_DROP_EMPTY_EVENT_FIELDS: ${LVS_DROP_EMPTY_EVENT_FIELDS:-true}
      ES_HOST: elasticsearch
      ES_PORT: '9200'
      LVS_DATABASE_BACKEND: ${LVS_DATABASE_BACKEND:-elasticsearch_db}
      ES_TRANSPORT_PORT: '9300'
      USE_RTVI_VLM: ${USE_RTVI_VLM:-true}
      RTVI_VLM_URL: ${RTVI_VLM_URL:-http://rtvi-vlm:8000}
      LVS_INGESTION_FUNCTION: ${LVS_INGESTION_FUNCTION:-graph_ingestion}
      LVS_RETRIEVER_FUNCTION: ${LVS_RETRIEVER_FUNCTION:-graph_retrieval}
      LVS_QA_DATABASE_BACKEND: ${LVS_QA_DATABASE_BACKEND:-graph_db}
      LVS_EMB_DIMENSIONS: ${LVS_EMB_DIMENSIONS:-2048}
      # Required: /files (POST/GET/DELETE) and /summarize (root-prefixed) are
      # registered inside `_setup_dev_routes()` which is gated by VIA_DEV_API.
      # Without this, DELETE /files/{id} returns 404 from FastAPI before any
      # handler runs, so cleanup_asset and drop_collection_for_asset are never
      # invoked and Logstash-populated ES indices linger after asset deletion.
      VIA_DEV_API: ${VIA_DEV_API:-true}
      # Streaming RTVI -> Kafka -> Logstash -> ES path. KAFKA_ENABLED is
      # streaming-only in via-engine. Broker lives in the rtvi-microservices
      # compose stack (or the in-stack `rtvi-vlm` profile already wires it up
      # alongside this stack — see kafka service further below when present).
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_STRUCTURED_SUMMARY_TOPIC: ${KAFKA_STRUCTURED_SUMMARY_TOPIC:-mdx-structured-events-summary}
      LVS_DISABLE_DB_RESET_ON_REQUEST_DONE: ${LVS_DISABLE_DB_RESET_ON_REQUEST_DONE:-true}
      LVS_LLM_MODEL_NAME: ${LVS_LLM_MODEL_NAME:-openai/gpt-oss-20b}
      LVS_CAPTION_SOURCE: ${LVS_CAPTION_SOURCE:-db}
    ports:
    - 38123
    - ${LVS_BACKEND_PORT:-38111}:38111
    - '38112:38112'
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
    - ${VIA_LOG_DIR:-/dummy/logs}${VIA_LOG_DIR:+:/tmp/via-logs}
    - ../../config/config.yaml:/opt/nvidia/via/config/default_config.yaml:ro
    depends_on:
      elasticsearch:
        condition: service_started
      wait-for-elasticsearch:
        condition: service_completed_successfully
      wait-for-llm:
        condition: service_completed_successfully
    networks:
    - app-network
    restart: 'no'
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:38111/v1/live
      interval: 10s
      timeout: 1s
      retries: 100
  elasticsearch:
    image: elasticsearch:9.1.2
    container_name: elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      cluster.max_shards_per_node: ${ES_MAX_SHARDS_PER_NODE:-2000}
      ES_JAVA_OPTS: ${ES_JAVA_OPTS:--Xms4g -Xmx4g}
    ports:
    - 9200:9200
    - 9300:9300
    networks:
    - app-network
    restart: 'no'
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Streaming RTVI -> Kafka -> Logstash -> ES path (profile-gated: kafka) ──
  # The broker normally lives in the rtvi-microservices compose; for
  # self-contained Blueprint test runs we colocate a single-node broker here.
  #
  # Host-port mappings are env-driven so the operator can run multiple
  # Kafka stacks on the same host without collisions:
  #   KAFKA_PORT          host port for the in-Docker PLAINTEXT listener
  #                       (in-network clients still use kafka:9092 via
  #                       Docker DNS, this only affects host-side access)
  #   KAFKA_EXTERNAL_PORT host port for the EXTERNAL listener that
  #                       host-side / cross-stack clients should use
  #
  # KAFKA_ADVERTISED_LISTENERS is wired to the same KAFKA_EXTERNAL_PORT so
  # the broker tells external clients the correct host port to reconnect to
  # (otherwise they connect to localhost:<host-port> once, then the broker's
  # metadata reply sends them to localhost:9094 and they silently fail).
  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    ports:
    - "${KAFKA_PORT:-9092}:9092"
    - "${KAFKA_EXTERNAL_PORT:-9094}:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://${KAFKA_ADVERTISED_HOST:-localhost}:${KAFKA_EXTERNAL_PORT:-9094}"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test:
      - CMD-SHELL
      - /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
    - app-network
    profiles:
    - kafka
    restart: 'no'

  # Logstash sidecar: consumes nv.VisionLLM proto from Kafka topics
  # `mdx-vlm-captions` and `mdx-structured-events-summary` and writes
  # documents into ES in the ElasticsearchDBTool.add_summary shape.
  # The visionllm index template is registered by lvs at startup
  # (ElasticsearchDBTool._ensure_index_template); we gate logstash on the
  # lvs healthcheck so the template is in place before any ES write.
  logstash:
    # NOTE: this block is duplicated in docker/logstash/logstash-compose.yml
    # for the standalone workflow. Keep the two in sync when changing
    # image, command, plugin version, or bind-mount layout.
    image: docker.elastic.co/logstash/logstash:${LOGSTASH_VERSION:-9.3.3}
    container_name: logstash
    # The stock image's ENTRYPOINT is /usr/local/bin/docker-entrypoint. We
    # override it so the conditional plugin install can run first, then
    # exec the original entrypoint so normal boot continues.
    #
    # NOTE: the script MUST live inside `entrypoint` as a 3-element list
    # (not `command:` as a pipe-block string). When `command:` is a
    # multi-line string, Compose shell-splits it into separate CMD args,
    # which turns `set -e\nif ! ...` into ["set","-e","if","!",...] — see
    # https://github.com/docker/compose/issues/8506. Putting the script
    # as the third element of the entrypoint list preserves it as a
    # single arg to `bash -c`.
    entrypoint:
    - bash
    - -c
    - |
      set -e
      if ! bin/logstash-plugin list logstash-codec-protobuf >/dev/null 2>&1; then
        echo "[init] Installing logstash-codec-protobuf (first boot)..."
        # The plugin installer's JRuby invocation needs more heap than
        # logstash itself; override LS_JAVA_OPTS for this one command so
        # the install doesn't OOM under the 512m runtime cap.
        LS_JAVA_OPTS="-Xms512m -Xmx2g" \
          bin/logstash-plugin install logstash-codec-protobuf
      else
        echo "[init] logstash-codec-protobuf already present, skipping install"
      fi
      exec /usr/local/bin/docker-entrypoint
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-logstash-vlm-es-writer}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-mdx-vlm-captions}
      KAFKA_STRUCTURED_SUMMARY_TOPIC: ${KAFKA_STRUCTURED_SUMMARY_TOPIC:-mdx-structured-events-summary}
      ES_HOST: elasticsearch
      ES_PORT: '9200'
      LVS_EMB_DIMENSIONS: ${LVS_EMB_DIMENSIONS:-2048}
      LVS_EMB_SEED: ${LVS_EMB_SEED:-42}
      LS_JAVA_OPTS: -Xms${LOGSTASH_HEAP:-512m} -Xmx${LOGSTASH_HEAP:-512m}
    volumes:
    # Plugin gem tree persists across container recreates. When bumping
    # LOGSTASH_VERSION, `docker volume rm` this volume so the plugin is
    # re-installed against the new JRuby runtime (see docker/logstash/README.md).
    - logstash-plugins:/usr/share/logstash/vendor/bundle
    # Bind mounts: editing any of these files on the host takes effect
    # without an image rebuild. `config.reload.automatic: true` in
    # logstash.yml hot-reloads pipeline changes within 10s.
    - ../logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    - ../logstash/pipeline:/usr/share/logstash/pipeline:ro
    - ../logstash/pb_definitions:/etc/logstash/pb_definitions:ro
    healthcheck:
      # Moved from the former Dockerfile HEALTHCHECK. start_period bumped
      # from 60s to 180s to accommodate first-boot plugin install time
      # (empty volume, cold network fetch from rubygems).
      test: ["CMD-SHELL", "curl -fsS http://localhost:9600 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s
    depends_on:
      elasticsearch:
        condition: service_healthy
      lvs:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
    - app-network
    profiles:
    - kafka
    restart: unless-stopped
    ports:
    - ${LOGSTASH_API_PORT:-9600}:9600


  # ── RTVI VLM service (profile-gated: only starts when COMPOSE_PROFILES includes "rtvi") ──
  rtvi-vlm:
    image: ${RTVI_VLM_IMAGE:-nvcr.io/nvidia/vss-core/vss-rt-vlm:3.2.0}
    container_name: rtvi-vlm
    shm_size: '16gb'
    runtime: nvidia
    user: "1001:1001"
    profiles:
    - rtvi
    ports:
    - ${RTVI_VLM_PORT:-8000}:8000
    tmpfs:
    - /tmp/assets:size=4g,mode=1777
    - /tmp/rtvi:size=2g,mode=1777
    volumes:
    - ${RTVI_ASSET_STORAGE_DIR:-/dummy/rtvi-assets}${RTVI_ASSET_STORAGE_DIR:+:/tmp/assets}
    - ${MODEL_ROOT_DIR:-/dummy/model-root}${MODEL_ROOT_DIR:+:${MODEL_ROOT_DIR:-}}
    - rtvi-ngc-model-cache:/opt/nvidia/rtvi/.rtvi/ngc_model_cache
    - rtvi-hf-cache:/tmp/huggingface
    environment:
      NGC_API_KEY: ${RTVI_VLM_API_KEY:-${NGC_CLI_API_KEY:-}}
      HF_TOKEN: ${HF_TOKEN:-}
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-NOAPIKEYSET}
      NVIDIA_VISIBLE_DEVICES: ${RTVI_VLM_GPU:-0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-NOAPIKEYSET}
      OPENAI_API_VERSION: ${OPENAI_API_VERSION:-}
      VIA_VLM_OPENAI_MODEL_DEPLOYMENT_NAME: ${VIA_VLM_OPENAI_MODEL_DEPLOYMENT_NAME:-}
      VIA_VLM_ENDPOINT: ${VIA_VLM_ENDPOINT:-}
      VIA_VLM_API_KEY: ${RTVI_VLM_API_KEY:-${NGC_CLI_API_KEY:-}}
      VLM_MODEL_TO_USE: ${VLM_MODEL_TO_USE:-openai-compat}
      VLM_BATCH_SIZE: ${VLM_BATCH_SIZE:-}
      MODEL_PATH: ${MODEL_PATH:-}
      NUM_VLM_PROCS: ${NUM_VLM_PROCS:-}
      NUM_GPUS: ${NUM_GPUS:-}
      VLM_INPUT_WIDTH: ${VLM_INPUT_WIDTH:-}
      VLM_INPUT_HEIGHT: ${VLM_INPUT_HEIGHT:-}
      VLM_DEFAULT_NUM_FRAMES_PER_SECOND_OR_FIXED_FRAMES_CHUNK: ${VLM_DEFAULT_NUM_FRAMES_PER_SECOND_OR_FIXED_FRAMES_CHUNK:-30}
      VLM_SYSTEM_PROMPT: ${VLM_SYSTEM_PROMPT:-}
      VSS_NUM_GPUS_PER_VLM_PROC: ${VSS_NUM_GPUS_PER_VLM_PROC:-}
      VLM_TRUST_REMOTE_CODE: ${VLM_TRUST_REMOTE_CODE:-false}
      VLM_MODEL_SUPPORTS_AUDIO: ${VLM_MODEL_SUPPORTS_AUDIO:-false}
      INSTALL_PROPRIETARY_CODECS: ${INSTALL_PROPRIETARY_CODECS:-false}
      LOG_LEVEL: ${VSS_LOG_LEVEL:-DEBUG}
      # Kafka producer (raw VLM events). Only effective when the `kafka`
      # compose profile is also active and a broker is reachable on
      # KAFKA_BOOTSTRAP_SERVERS. Topic name overridden so messages land on
      # the consumer-expected topic.
      KAFKA_ENABLED: ${KAFKA_ENABLED:-false}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-mdx-vlm-captions}
      ENABLE_REDIS_ERROR_MESSAGES: false
      ENABLE_REQUEST_PROFILING: ${ENABLE_REQUEST_PROFILING:-false}
      VIA_SKIP_PIPELINE_WARMUP: ${VIA_SKIP_PIPELINE_WARMUP:-0}
      VLLM_GPU_MEMORY_UTILIZATION: ${VLLM_GPU_MEMORY_UTILIZATION:-}
      REMOTE_VIDEO_INPUT: ${REMOTE_VIDEO_INPUT:-false}
      ASSET_DOWNLOAD_SSL_SKIP_VERIFY_DOMAINS: ${ASSET_DOWNLOAD_SSL_SKIP_VERIFY_DOMAINS:-}
      ASSET_DOWNLOAD_MAX_REDIRECTS: ${ASSET_DOWNLOAD_MAX_REDIRECTS:-5}
      ASSET_DOWNLOAD_AUTH_TOKENS: ${ASSET_DOWNLOAD_AUTH_TOKENS:-}
      ENABLE_LVS_CR2_TIMESTAMP_PROMPT: true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack: 67108864
      nofile:
        soft: 65535
        hard: 65535
    ipc: host
    networks:
    - app-network
    # rtvi-vlm initializes its Kafka producer once at startup with no retry.
    # If Kafka isn't healthy yet the producer init fails and every chunk
    # logs `Kafka producer not available` -- raw_events never land in ES
    # (see Pitfall #6 in docs/streaming_rtvi_kafka_logstash.md). Gating on
    # kafka's healthcheck eliminates the cold-start race.
    #
    # `required: false` (Compose >=2.20) means: skip the dependency if the
    # `kafka` service is not part of the active profile set. So `--profile
    # rtvi` alone (no `kafka`) still works for non-Kafka deployments.
    depends_on:
      kafka:
        condition: service_healthy
        required: false
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/v1/health/ready
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    restart: 'no'
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            device_ids:
            - ${RTVI_VLM_GPU:-0}
            capabilities:
            - gpu


volumes:
  via-hf-cache:
    driver: local
    external: false
  via-ngc-model-cache:
    driver: local
    external: false
  rtvi-ngc-model-cache:
    driver: local
    external: false
  rtvi-hf-cache:
    driver: local
    external: false
  # Plugin gem tree for the stock Logstash image (logstash-codec-protobuf
  # is installed at first container boot — see the logstash service's
  # entrypoint script). Persists across recreates so subsequent boots
  # skip the gem download. `docker volume rm` this when bumping
  # LOGSTASH_VERSION (the cached gems are compiled for the OLD JRuby).
  logstash-plugins:
    driver: local
    external: false
networks:
  app-network:
    driver: bridge
    external: false
