services:

  analytics-stream-playback:
    image: py-behavior-analytics:latest
    network_mode: "host"
    volumes:
      - $MDX_SAMPLE_APPS_DIR/apps/${APP_NAME}${APP_MODE}/analytics-stream-$STREAMING_SERVICE-config.json:/resources/analytics-stream-config.json
      - $MDX_DATA_DIR/playback/${APP_NAME}${APP_MODE}_playback_data.txt:/opt/mdx/playback/playback_data.txt
    container_name: mdx-analytics-playback
    command: python3 apps/playback/playback_frames.py --config /resources/analytics-stream-config.json --playback-filepath /opt/mdx/playback/playback_data.txt $PLAYBACK_MODE
    depends_on:
      - logstash

  analytics-stream:
    image: py-behavior-analytics:latest
    network_mode: "host"
    volumes:
      - $MDX_SAMPLE_APPS_DIR/apps/${APP_NAME}${APP_MODE}/analytics-stream-$STREAMING_SERVICE-config.json:/resources/analytics-stream-config.json
      - $MDX_SAMPLE_APPS_DIR/apps/${APP_NAME}${APP_MODE}/calibration.json:/resources/calibration.json
    restart: always
    container_name: mdx-analytics
    command: python3 apps/${APP_DIR}/main_${APP_DIR}${APP_MODE}_app.py --config /resources/analytics-stream-config.json --calibration /resources/calibration.json
    depends_on:
      kafka-topic-init-container:
        condition: service_completed_successfully
