services:
  rtvi-server:
    image: ${RTVI_IMAGE:-nvcr.io/nvidia/vss-core/vss-rt-vlm:3.2.0}
    shm_size: '16gb'
    runtime: nvidia
    user: "1001:1001"
    ports:
      - "${BACKEND_PORT?}:8000"
    tmpfs:
      - /tmp/assets:size=${ASSET_TMPFS_SIZE:-8g},mode=1777    # uploaded assets (RAM-backed; overridden by ASSET_STORAGE_DIR bind-mount if set)
      - /tmp/rtvi:size=2g,mode=1777      # per-request MP4 encode temp files
    volumes:
      - "${ASSET_STORAGE_DIR:-/dummy}${ASSET_STORAGE_DIR:+:/tmp/assets}"
      - "${MODEL_ROOT_DIR:-/dummy}${MODEL_ROOT_DIR:+:${MODEL_ROOT_DIR:-}}"
      - "${NGC_MODEL_CACHE:-rtvi-ngc-model-cache}:/opt/nvidia/rtvi/.rtvi/ngc_model_cache"
      - "${RTVI_SRC_DIR:-/dummy}${RTVI_SRC_DIR:+:/opt/nvidia/rtvi:ro}"
      - "${RTVI_LOG_DIR:-/dummy}${RTVI_LOG_DIR:+:/opt/nvidia/rtvi/log/rtvi/}"
      - rtvi-hf-cache:/tmp/huggingface

    environment:
      AZURE_OPENAI_API_KEY: "${AZURE_OPENAI_API_KEY:-}"
      AZURE_OPENAI_ENDPOINT: "${AZURE_OPENAI_ENDPOINT:-}"
      MODEL_PATH: "${MODEL_PATH:-ngc:nim/nvidia/cosmos-reason2-8b:0303-fp8-dynamic-kv8}"
      MODEL_IMPLEMENTATION_PATH: "${MODEL_IMPLEMENTATION_PATH:-}"
      NGC_API_KEY: "${NGC_API_KEY:-}"
      HF_TOKEN: "${HF_TOKEN:-}"
      NV_LLMG_CLIENT_ID: "${NV_LLMG_CLIENT_ID:-}"
      NV_LLMG_CLIENT_SECRET: "${NV_LLMG_CLIENT_SECRET:-}"
      NVIDIA_API_KEY: "${NVIDIA_API_KEY:-NOAPIKEYSET}"
      NVIDIA_VISIBLE_DEVICES: "${NVIDIA_VISIBLE_DEVICES:-all}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-NOAPIKEYSET}"
      OPENAI_API_VERSION: "${OPENAI_API_VERSION:-}"
      VIA_VLM_OPENAI_MODEL_DEPLOYMENT_NAME: "${VIA_VLM_OPENAI_MODEL_DEPLOYMENT_NAME:-}"
      VIA_VLM_ENDPOINT: "${VIA_VLM_ENDPOINT:-}"
      VIA_VLM_API_KEY: "${VIA_VLM_API_KEY:-}"
      VLM_BATCH_SIZE: "${VLM_BATCH_SIZE:-}"
      VLM_MODEL_TO_USE: "${VLM_MODEL_TO_USE:-cosmos-reason2}"
      NUM_VLM_PROCS: "${NUM_VLM_PROCS:-}"
      NUM_GPUS: "${NUM_GPUS:-}"
      VLM_INPUT_WIDTH: "${VLM_INPUT_WIDTH:-}"
      VLM_INPUT_HEIGHT: "${VLM_INPUT_HEIGHT:-}"
      VLM_DEFAULT_NUM_FRAMES_PER_SECOND_OR_FIXED_FRAMES_CHUNK: "${VLM_DEFAULT_NUM_FRAMES_PER_SECOND_OR_FIXED_FRAMES_CHUNK:-30}"
      VLM_USE_FPS_FOR_CHUNKING: "${VLM_USE_FPS_FOR_CHUNKING:-}"
      ENABLE_DENSE_CAPTION: "${ENABLE_DENSE_CAPTION:-}"
      VLM_MODEL_SUPPORTS_AUDIO: "${VLM_MODEL_SUPPORTS_AUDIO:-false}"
      VLM_TRUST_REMOTE_CODE: "${VLM_TRUST_REMOTE_CODE:-false}"
      INSTALL_PROPRIETARY_CODECS: "${INSTALL_PROPRIETARY_CODECS:-false}"
      FORCE_SW_AV1_DECODER: "${FORCE_SW_AV1_DECODER:-}"
      LOG_LEVEL: "${LOG_LEVEL:-}"
      RTVI_EXTRA_ARGS: "${RTVI_EXTRA_ARGS:-}"
      RTVI_RTSP_LATENCY: "${RTVI_RTSP_LATENCY:-}"
      RTVI_RTSP_TIMEOUT: "${RTVI_RTSP_TIMEOUT:-}"
      RTVI_RTSP_RECONNECTION_INTERVAL: "${RTVI_RTSP_RECONNECTION_INTERVAL:-5}"
      RTVI_RTSP_RECONNECTION_WINDOW: "${RTVI_RTSP_RECONNECTION_WINDOW:-60}"
      RTVI_RTSP_RECONNECTION_MAX_ATTEMPTS: "${RTVI_RTSP_RECONNECTION_MAX_ATTEMPTS:-10}"
      RTVI_RTPJITTERBUFFER_DROP_ON_LATENCY: "${RTVI_RTPJITTERBUFFER_DROP_ON_LATENCY:-false}"
      RTVI_RTPJITTERBUFFER_FASTSTART_MIN_PACKETS: "${RTVI_RTPJITTERBUFFER_FASTSTART_MIN_PACKETS:-2}"
      RTVI_ENABLE_LIVE_TIMESTAMP_FILTER: "${RTVI_ENABLE_LIVE_TIMESTAMP_FILTER:-false}"
      RTVI_ENABLE_FILE_TIMESTAMP_FILTER: "${RTVI_ENABLE_FILE_TIMESTAMP_FILTER:-true}"
      RTVI_EMPTY_CUDA_CACHE_ON_RESULT: "${RTVI_EMPTY_CUDA_CACHE_ON_RESULT:-false}"
      RTVI_STREAM_DELETE_BLOCKING_TIMEOUT_SEC: "${RTVI_STREAM_DELETE_BLOCKING_TIMEOUT_SEC:-300}"
      RTVI_ENABLE_GOP_DECODE_OPT: "${RTVI_ENABLE_GOP_DECODE_OPT:-true}"
      VSS_CACHE_VIDEO_EMBEDS: "${VSS_CACHE_VIDEO_EMBEDS:-false}"
      VSS_NUM_GPUS_PER_VLM_PROC: "${VSS_NUM_GPUS_PER_VLM_PROC:-}"
      VLM_SYSTEM_PROMPT: "${VLM_SYSTEM_PROMPT:-}"
      VLM_SYSTEM_PROMPT_MAX_LENGTH: "${VLM_SYSTEM_PROMPT_MAX_LENGTH:-10240}"
      VLM_PROMPT_MAX_LENGTH: "${VLM_PROMPT_MAX_LENGTH:-10240}"
      # OpenTelemetry Configuration (Full VIA Engine)
      ENABLE_VIA_HEALTH_EVAL: "${ENABLE_VIA_HEALTH_EVAL:-false}"
      # Standard OTEL environment variables (see https://opentelemetry.io/docs/specs/otel/configuration/sdk-environment-variables/)
      ENABLE_OTEL_MONITORING: "${ENABLE_OTEL_MONITORING:-false}"  # Set to 'true' to enable OpenTelemetry
      OTEL_RESOURCE_ATTRIBUTES: "${OTEL_RESOURCE_ATTRIBUTES:-}"
      OTEL_TRACES_EXPORTER: "${OTEL_TRACES_EXPORTER:-otlp}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318}"
      OTEL_METRIC_EXPORT_INTERVAL: "${OTEL_METRIC_EXPORT_INTERVAL:-60000}"  # Metrics export interval in milliseconds
      KAFKA_ENABLED: "${KAFKA_ENABLED:-true}"
      KAFKA_TOPIC: "${KAFKA_TOPIC:-mdx-vlm-captions}"
      KAFKA_INCIDENT_TOPIC: "${KAFKA_INCIDENT_TOPIC:-mdx-vlm-incidents}"
      KAFKA_BOOTSTRAP_SERVERS: "${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}"
      KAFKA_LOG4J_ROOT_LOGLEVEL: ERROR
      ERROR_MESSAGE_TOPIC: "${ERROR_MESSAGE_TOPIC:-vision-llm-errors}"
      ENABLE_REDIS_ERROR_MESSAGES: "${ENABLE_REDIS_ERROR_MESSAGES:-false}"
      REDIS_HOST: "${REDIS_HOST:-redis}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      REDIS_DB: "${REDIS_DB:-0}"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      ENABLE_REQUEST_PROFILING: "${ENABLE_REQUEST_PROFILING:-false}"
      RTVI_ADD_TIMESTAMP_TO_VLM_PROMPT: "${RTVI_ADD_TIMESTAMP_TO_VLM_PROMPT:-}"
      ENABLE_LVS_CR2_TIMESTAMP_PROMPT: "${ENABLE_LVS_CR2_TIMESTAMP_PROMPT:-false}"
      VLLM_MAX_NUM_SEQS: "${VLLM_MAX_NUM_SEQS:-1024}"
      VLM_MAX_MODEL_LEN: "${VLM_MAX_MODEL_LEN:-32768}"
      # Additional VLLM Runtime Configuration
      VSS_SKIP_INPUT_MEDIA_VERIFICATION: "${VSS_SKIP_INPUT_MEDIA_VERIFICATION:-}"
      SKIP_PIPELINE_WARMUP: "${SKIP_PIPELINE_WARMUP:-0}"
      VLLM_GPU_MEMORY_UTILIZATION: "${VLLM_GPU_MEMORY_UTILIZATION:-}"
      VLLM_MAX_NUM_BATCHED_TOKENS: "${VLLM_MAX_NUM_BATCHED_TOKENS:-16384}"
      VLLM_IGNORE_EOS: "${VLLM_IGNORE_EOS:-false}"
      VLLM_HAS_FLASHINFER_CUBIN: "${VLLM_HAS_FLASHINFER_CUBIN:-1}"
      VLLM_MM_PROCESSOR_VIDEO_NUM_FRAMES: "${VLLM_MM_PROCESSOR_VIDEO_NUM_FRAMES:-256}"
      VLM_VIDEO_PRUNING_RATE: "${VLM_VIDEO_PRUNING_RATE:-}"
      VLLM_NUM_SCHEDULER_STEPS: "${VLLM_NUM_SCHEDULER_STEPS:-8}"
      VLLM_WORKER_MULTIPROC_METHOD: "${VLLM_WORKER_MULTIPROC_METHOD:-spawn}"
      VLLM_ENABLE_PREFIX_CACHING: "${VLLM_ENABLE_PREFIX_CACHING:-false}"
      VLLM_DISABLE_MM_PREPROCESSOR_CACHE: "${VLLM_DISABLE_MM_PREPROCESSOR_CACHE:-true}"
      VLLM_MM_TENSOR_IPC: "${VLLM_MM_TENSOR_IPC:-}"
      VLLM_MULTIMODAL_TENSOR_IPC: "${VLLM_MULTIMODAL_TENSOR_IPC:-}"
      VLLM_MM_ENCODER_ATTN_BACKEND: "${VLLM_MM_ENCODER_ATTN_BACKEND:-}"
      VLLM_DISABLED_KERNELS: "${VLLM_DISABLED_KERNELS:-MacheteLinearKernel}"
      VLLM_ROOT: "${VLLM_ROOT:-/usr/local/lib/python3.12/dist-packages/vllm}"
      VLLM_USE_STANDALONE_COMPILE: "${VLLM_USE_STANDALONE_COMPILE:-0}"
      VLLM_ENFORCE_EAGER: "${VLLM_ENFORCE_EAGER:-false}"
      VLLM_USE_NVFP4_CT_EMULATIONS: "${VLLM_USE_NVFP4_CT_EMULATIONS:-0}"
      # API cap on output tokens.
      VLM_MAX_GENERATION_TOKENS: "${RTVI_VLM_MAX_GENERATION_TOKENS:-16384}"
      # MoE backend override (empty by default; code auto-picks triton on B200 for Qwen3.5).
      VLLM_MOE_BACKEND: "${RTVI_VLLM_MOE_BACKEND:-}"
      # vLLM multimodal preprocessor cache size in GiB.
      VLLM_MM_PROCESSOR_CACHE_GB: "${RTVI_VLLM_MM_PROCESSOR_CACHE_GB:-1}"
      # Bounded queue size for the async Kafka sender.
      KAFKA_ASYNC_SEND_QUEUE_MAXSIZE: "${RTVI_VLM_KAFKA_ASYNC_SEND_QUEUE_MAXSIZE:-1024}"
      GST_ENABLE_CUSTOM_PARSER_MODIFICATIONS: "${GST_ENABLE_CUSTOM_PARSER_MODIFICATIONS:-1}"
      REMOTE_VIDEO_INPUT: "${REMOTE_VIDEO_INPUT:-true}"
      MAX_ASSET_STORAGE_SIZE_GB: "${MAX_ASSET_STORAGE_SIZE_GB:-}"
      ASSET_MAX_AGE_HOURS: "${ASSET_MAX_AGE_HOURS:-0}"
      ASSET_DOWNLOAD_SSL_SKIP_VERIFY_DOMAINS: "${ASSET_DOWNLOAD_SSL_SKIP_VERIFY_DOMAINS:-}"
      ASSET_DOWNLOAD_MAX_REDIRECTS: "${ASSET_DOWNLOAD_MAX_REDIRECTS:-0}"
      ASSET_DOWNLOAD_MAX_FILE_SIZE_GB: "${ASSET_DOWNLOAD_MAX_FILE_SIZE_GB:-8}"
      ASSET_DOWNLOAD_AUTH_TOKENS: "${ASSET_DOWNLOAD_AUTH_TOKENS:-}"
      FILE_URL_ALLOWED_DIRS: "${FILE_URL_ALLOWED_DIRS:-}"

    ulimits:
      memlock:
        soft: -1
        hard: -1
      stack: 67108864
      nofile:
        soft: 65535
        hard: 65535
    ipc: host
    stdin_open: true
    tty: true
    extra_hosts:
      host.docker.internal: host-gateway
    depends_on:
      - kafka
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s

  kafka:
    image: apache/kafka:4.1.1
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # OpenTelemetry Collector - Collects and exports OTEL metrics/traces
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8889:8889"   # Prometheus metrics export
    restart: unless-stopped
    depends_on:
      - jaeger
    profiles:
      - with-monitoring

  # Prometheus - Metrics collection and storage for monitoring
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=2d'
    restart: unless-stopped
    depends_on:
      - otel-collector
    profiles:
      - with-monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Jaeger - Distributed tracing system
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger collector HTTP
      - "4319:4317"    # OTLP gRPC
      - "4320:4318"    # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - LOG_LEVEL=error
    restart: unless-stopped
    profiles:
      - with-monitoring
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:14269/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # DCGM Exporter - GPU metrics collection
  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:4.2.0-4.1.0-ubuntu22.04
    runtime: nvidia
    ports:
      - "${DCGM_EXPORTER_PORT:-9400}:9400"
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - DCGM_EXPORTER_INTERVAL=${DCGM_EXPORTER_INTERVAL:-500}
    volumes:
      - ../../perf/dcgm/dcgm-metrics-config.csv:/etc/dcgm-exporter/custom-metrics.csv:ro
    cap_add:
      - SYS_ADMIN
    profiles:
      - with-monitoring
    networks:
      - default

  # Node Exporter - CPU and system metrics collection
  node-exporter:
    image: prom/node-exporter:latest
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|run|snap|boot)($$|/)'
      - '--collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs|nfs|nfs4|cifs|smbfs|fuse\.sshfs)$$'
      - '--no-collector.netstat'    # slow on systems with many connections
      - '--no-collector.ntp'        # may time out on some systems
      - '--no-collector.wifi'       # not needed on server hardware
      - '--no-collector.arp'        # not needed for benchmarking
      - '--no-collector.ipvs'       # not needed for benchmarking
      - '--no-collector.nfsd'       # not needed for benchmarking
    restart: unless-stopped
    profiles:
      - with-monitoring
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 10s

volumes:
  rtvi-hf-cache:
  rtvi-ngc-model-cache:
  prometheus-data:
  redis-data:
